// ── QTY MODAL
function QtyModal({art,onOk,onClose,initialMenge}){
  const GEBINDE_EINH=/(KI|KT|KA|PAL|GEB|TRY|VPE|Kiste|Karton|Palette)/i;
  const istGebinde=GEBINDE_EINH.test(art.einheit||'');
  // Stückzahl aus Einheit lesen: "12 ST KI" oder "1 KI" → 12 oder unbekannt
  const parseAnzahl=(einheit)=>{const m=(einheit||'').match(/(\d+)\s*(?:ST|STK|Stk|stk)/i);return m?parseInt(m[1]):0;};
  const vpeAnz=parseAnzahl(art.einheit); // 0 = unbekannt

  const [modus,setModus]=useState(istGebinde?'stueck':'normal');
  const [stueckImGebinde,setStueckImGebinde]=useState(vpeAnz||12);
  const [stueckEingabeAktiv,setStueckEingabeAktiv]=useState(istGebinde&&vpeAnz===0);
  const [m,setM]=useState(initialMenge||1);
  const [inputVal,setInputVal]=useState(String(initialMenge||1));

  const isKgEinh=isKg(art.einheit);
  const step=isKgEinh?.1:1;

  const preisProStueck=istGebinde?Math.round((art.preis/stueckImGebinde)*1000)/1000:art.preis;
  const aktivPreis=modus==='stueck'?preisProStueck:art.preis;
  const aktivEinheit=modus==='stueck'?'Stk':art.einheit;
  const w=Math.round(aktivPreis*m*100)/100;
  const adj=d=>{
    const next=Math.max(step,Math.round((m+d)*10)/10);
    setM(next);
    setInputVal(String(next));
  };

  return(<div className="mo" onClick={onClose}>
    <div className="md" onClick={e=>e.stopPropagation()}>
      <div className="mh-handle"/>
      <div className="mh"><div className="mt">{art.name}</div>
        <div className="ms">
          {(art.marke||art.liefKuerzel)&&<span style={{color:'var(--amber)',marginRight:8}}>{art.marke||art.liefKuerzel}</span>}
          {fN(art.preis)} € EK/{dispEinh(art.einheit)} · <span style={{color:art.mwst===7?'var(--lime2)':'var(--blue)'}}>{art.mwst}% MwSt</span>
        </div>
      </div>
      <div className="mb">
        {/* Modus-Umschalter für Gebinde */}
        {istGebinde&&<div style={{display:'flex',gap:6,marginBottom:12}}>
          <button onClick={()=>{setModus('stueck');setM(1);}} style={{flex:1,padding:'8px',borderRadius:8,border:`1px solid ${modus==='stueck'?'var(--lime)':'var(--border)'}`,background:modus==='stueck'?'var(--lm)':'none',color:modus==='stueck'?'var(--lime)':'var(--t2)',cursor:'pointer',fontSize:12}}>
            Einzelstück
          </button>
          <button onClick={()=>{setModus('normal');setM(1);}} style={{flex:1,padding:'8px',borderRadius:8,border:`1px solid ${modus==='normal'?'var(--lime)':'var(--border)'}`,background:modus==='normal'?'var(--lm)':'none',color:modus==='normal'?'var(--lime)':'var(--t2)',cursor:'pointer',fontSize:12}}>
            Ganze Kiste
          </button>
        </div>}

        {/* Stückzahl pro Gebinde eingeben wenn unbekannt oder änderbar */}
        {istGebinde&&modus==='stueck'&&<div style={{display:'flex',alignItems:'center',gap:8,marginBottom:12,padding:'8px 12px',background:'var(--s2)',borderRadius:8}}>
          <span style={{fontSize:12,color:'var(--t2)',flex:1}}>Stück in der Kiste:</span>
          <button onClick={()=>setStueckImGebinde(s=>Math.max(1,s-1))} style={{width:28,height:28,borderRadius:6,border:'1px solid var(--border)',background:'none',color:'var(--text)',cursor:'pointer',fontSize:16}}>−</button>
          <input type="number" value={stueckImGebinde} onChange={e=>setStueckImGebinde(Math.max(1,parseInt(e.target.value)||1))} style={{width:48,textAlign:'center',background:'none',border:'1px solid var(--border)',borderRadius:6,color:'var(--text)',fontFamily:'Geist Mono,monospace',fontSize:14,padding:'4px'}} min={1}/>
          <button onClick={()=>setStueckImGebinde(s=>s+1)} style={{width:28,height:28,borderRadius:6,border:'1px solid var(--border)',background:'none',color:'var(--text)',cursor:'pointer',fontSize:16}}>+</button>
          <span style={{fontSize:11,color:'var(--t2)',minWidth:60}}>{fN(preisProStueck)} €/Stk</span>
        </div>}

        <div className="qr">
          <button className="qb" onClick={()=>adj(-step)}>−</button>
          <input className="qd" type="number"
            value={inputVal}
            onChange={e=>{
              const raw=e.target.value;
              setInputVal(raw); // immer anzeigen was getippt wird
              const n=parseFloat(raw.replace(',','.'));
              if(!isNaN(n)&&n>=step) setM(Math.round(n*10)/10);
            }}
            onBlur={e=>{
              // beim Verlassen: ungültige Werte auf step korrigieren
              const n=parseFloat(e.target.value.replace(',','.'));
              const valid=(!isNaN(n)&&n>=step)?Math.round(n*10)/10:step;
              setM(valid);setInputVal(String(valid));
            }}
            onFocus={e=>e.target.select()}
            step={step} min={step}/>
          <button className="qb" onClick={()=>adj(step)}>+</button>
        </div>
        <div style={{textAlign:'center',fontSize:11,color:'var(--t2)',marginTop:-10,marginBottom:14,letterSpacing:.5}}>{aktivEinheit}</div>
        <div className="wb"><div className="wn">{fN(w)} €</div><div className="wl">Wert der Entnahme</div></div>
        <div className="br"><button className="btn btn-g" onClick={onClose}>Abbrechen</button><button className="btn btn-l" onClick={()=>w>0&&onOk(art,m,aktivPreis,aktivEinheit)}>✓ Erfassen</button></div>
      </div>
    </div>
  </div>);
}

// BMF Pauschbeträge 2026 für Gaststätten (Jahreswerte netto pro Person)
// BMF Sachbezugspauschalen 2026 nach Betriebsart (Jahreswerte netto)
const BETRIEBE = {
  gaststaetten: {label:'Gaststätten / Restaurant',  ust7:3173, ust19:828},
  cafe:         {label:'Café / Eisdiele',            ust7:2041, ust19:515},
  imbiss:       {label:'Imbiss / Schnellgastro',     ust7:2041, ust19:515},
  baeckerei:    {label:'Bäckerei / Konditorei',      ust7:1871, ust19:0},
  fleischerei:  {label:'Fleischerei / Metzgerei',    ust7:1685, ust19:0},
  hotel:        {label:'Hotel / Beherbergung',        ust7:3173, ust19:828},
  sonstige:     {label:'Sonstige Lebensmittelbetriebe', ust7:1476, ust19:0},
};
const PM_FAKTOR = { inhaber:1, partner:1, kind_gross:0.5, kind_klein:0.5, kind_teen:1, kind:0.5 };

function calcPausch(persons, betrieb){
  const b=BETRIEBE[betrieb||'gaststaetten']||BETRIEBE.gaststaetten;
  const aktiv = persons.filter(p=>p.aktiv);
  const j7  = aktiv.reduce((s,p)=>s+(b.ust7  *(PM_FAKTOR[p.typ]||1)),0);
  const j19 = aktiv.reduce((s,p)=>s+(b.ust19 *(PM_FAKTOR[p.typ]||1)),0);
  return { j7, j19, jGes:j7+j19, m7:j7/12, m19:j19/12, mGes:(j7+j19)/12, b };
}

function ReportTab({ents,meals,hh,setHH,periodDay,setPeriodDay}){
  const[editing,setEditing]=useState(false);
  const[showAllPeriods,setShowAllPeriods]=useState(false);
  const[tmpDay,setTmpDay]=useState('1');
  const[exportFmt,setExportFmt]=useState('neutral');
  const[showHH,setShowHH]=useState(false);
  const[editName,setEditName]=useState(null); // id der Person die umbenannt wird

  const persons = hh?.persons||[{id:'i1',typ:'inhaber',name:'Inhaber',aktiv:true}];
  const pausch = useMemo(()=>calcPausch(persons,hh.betrieb),[persons,hh.betrieb]);

  const addPerson=(typ)=>{
    const labels={partner:'Partner/in',kind_gross:'Kind (2–12 J.)',kind_klein:'Kind (2–12 J.)',kind_teen:'Kind (ab 12 J.)'};
    setHH(h=>({...h,persons:[...(h.persons||[]),{id:'p'+Date.now(),typ,name:labels[typ],aktiv:true}]}));
  };
  const delPerson=(id)=>setHH(h=>({...h,persons:h.persons.filter(p=>p.id!==id)}));
  const renamePerson=(id,name)=>setHH(h=>({...h,persons:h.persons.map(p=>p.id===id?{...p,name}:p)}));

  const periods=useMemo(()=>{
    const all=[...ents.map(e=>e.datum?.slice(0,10)),...meals.map(m=>m.datum)].filter(Boolean);
    if(!all.length)return[];
    const minD=new Date(all.reduce((a,b)=>a<b?a:b));
    const maxD=new Date(all.reduce((a,b)=>a>b?a:b));
    const result=[];
    let cur=new Date(minD.getFullYear(),minD.getMonth(),periodDay);
    if(cur>minD)cur=new Date(cur.getFullYear(),cur.getMonth()-1,periodDay);
    while(cur<=maxD){
      const start=new Date(cur);
      const end=new Date(cur.getFullYear(),cur.getMonth()+1,periodDay-1);
      const dStr=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;const sk=dStr(start);
      const ek=dStr(end);
      const lbl=periodDay===1
        ?start.toLocaleDateString('de-DE',{month:'long',year:'numeric'})
        :`${start.toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit'})}–${end.toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit',year:'numeric'})}`;
      result.push({sk,ek,lbl,key:`${sk}_${ek}`});
      cur=new Date(cur.getFullYear(),cur.getMonth()+1,periodDay);
    }
    return result.reverse();
  },[ents,meals,periodDay]);

  const[selKey,setSelKey]=useState(null);
  const sel=selKey?periods.find(p=>p.key===selKey):periods[0];
  const me=useMemo(()=>sel?ents.filter(e=>e.datum?.slice(0,10)>=sel.sk&&e.datum?.slice(0,10)<=sel.ek):[]  ,[sel,ents]);
  const mm=useMemo(()=>sel?meals.filter(m=>m.datum>=sel.sk&&m.datum<=sel.ek):[]  ,[sel,meals]);
  const tw=roundCurrency(me.reduce((s,e)=>s+e.wert,0));
  const t7=roundCurrency(me.filter(e=>e.mwst===7).reduce((s,e)=>s+e.wert,0));
  const t19=roundCurrency(me.filter(e=>e.mwst===19).reduce((s,e)=>s+e.wert,0));
  const tm=roundCurrency(mm.reduce((s,m)=>s+m.wert,0));
  // ── STILLER INTEGRITÄTSCHECK ── kein UI, nur console.warn
  React.useEffect(()=>{
    const sumParts=roundCurrency(t7+t19);

  const exportCSV=()=>{
    if(!sel)return;
    // ── cn(): reine Zahl mit Dezimalpunkt, keine Währung, max 2 Dezimalstellen
    const cn=v=>{const p=parseFloat(v);return isNaN(p)?'':String(roundCurrency(p));};
    const dateDE=d=>d.slice(0,10);
    const exportTS=new Date().toISOString();
    const EU_REPORT_VERSION='1.4';
    const aktivPersonen=persons.filter(p=>p.aktiv).map(p=>p.name).join(', ');
    let rows,fname;
    if(exportFmt==='datev'){
      // DATEV: Umsatz als reine Zahl, kein €, kein Komma
      rows=['Umsatz (ohne Soll/Haben-Kz);Soll/Haben;Konto;BU-Schlüssel;Belegdatum;Belegfeld 1;Buchungstext',
        ...me.map(e=>`${cn(e.wert)};S;${e.mwst===7?'8915':'8910'};${e.mwst===7?'9':''};${e.datum.slice(8,10)}${e.datum.slice(5,7)};EV-${e.datum.slice(0,10)};Eigenverbrauch ${e.name}`),
        ...mm.map(m=>`${cn(m.wert)};S;8910;;${m.datum.slice(8,10)}${m.datum.slice(5,7)};SB-${m.datum};Sachbezug ${m.label}`),
      ];fname=`datev_eigenverbrauch_${sel.sk}.csv`;
    } else if(exportFmt==='lexware'){
      // Lexware: Umsatz als reine Zahl, Steuersatz ohne %
      rows=['Datum;Umsatz;Buchungstext;Konto;Gegenkonto;Steuersatz',
        ...me.map(e=>`${dateDE(e.datum)};${cn(e.wert)};Eigenverbrauch ${e.name};1880;${e.mwst===7?'8915':'8910'};${e.mwst}`),
        ...mm.map(m=>`${m.datum};${cn(m.wert)};Sachbezug ${m.label};1880;8910;19`),
      ];fname=`lexware_eigenverbrauch_${sel.sk}.csv`;
    } else if(exportFmt==='sevdesk'){
      // sevdesk: Betrag als reine Zahl, Steuersatz als Zahl OHNE %
      rows=['Datum;Kategorie;Beschreibung;Nettobetrag;Steuersatz;Bemerkung',
        ...me.map(e=>`${dateDE(e.datum)};Eigenverbrauch;${e.name};${cn(e.wert)};${e.mwst};Warenentnahme`),
        ...mm.map(m=>`${m.datum};Sachbezug;${m.label};${cn(m.wert)};19;Personalessen`),
      ];fname=`sevdesk_eigenverbrauch_${sel.sk}.csv`;
    } else {
      // Standard (neutral) — erweitert mit Brutto/Netto/USt + Archiv-Spalten
      // betragBrutto = wert (EK-Preis netto * Menge); betragNetto = brutto / (1 + ust/100)
      // ustBetrag = brutto - netto; Personalessen USt = 7% (Sachbezugswert)
      const cnBrutto=e=>cn(e.wert);
      const cnNetto=e=>cn(calcNetFromGross(e.wert,e.mwst||7));
      const cnUst=e=>cn(calcUstFromNet(calcNetFromGross(e.wert,e.mwst||7),e.mwst||7));
      const mNetto=m=>cn(calcNetFromGross(m.wert,7));
      const mUst=m=>cn(calcUstFromNet(calcNetFromGross(m.wert,7),7));
      rows=[
        'typ;datum;beschreibung;menge;einheit;ekPreisNetto;ustSatz;betragBrutto;betragNetto;ustBetrag;exportTimestamp;reportVersion;zeitraumVon;zeitraumBis;betrieb;personenAktiv',
        ...me.map(e=>[
          'Warenentnahme',
          dateDE(e.datum),
          e.name,
          cn(e.menge),
          e.einheit||'',
          cn(e.preis),
          String(e.mwst||7),
          cnBrutto(e),
          cnNetto(e),
          cnUst(e),
          exportTS,
          EU_REPORT_VERSION,
          sel.sk,
          sel.ek,
          hh.betrieb||'gaststaetten',
          aktivPersonen,
        ].join(';')),
        ...mm.map(m=>[
          'Personalessen',
          m.datum,
          m.label,
          '1',
          'Tag',
          '',
          '7',
          cn(m.wert),
          mNetto(m),
          mUst(m),
          exportTS,
          EU_REPORT_VERSION,
          sel.sk,
          sel.ek,
          hh.betrieb||'gaststaetten',
          aktivPersonen,
        ].join(';')),
      ];fname=`eigenverbrauch_${sel.sk}_${sel.ek}.csv`;
    }
    triggerDownload(new Blob(['\uFEFF'+rows.join('\r\n')],{type:'text/csv;charset=utf-8'}),fname);
  };

  const exportXLSX=()=>{
    if(!sel||!window.XLSX)return;
    const WB=window.XLSX.utils.book_new();
    // Sheet 1: Warenentnahmen (mit Netto- und USt-Spalten)
    const wsData=[['Datum','Artikel','Einheit','Menge','EK netto €','MwSt %','Brutto €','Netto €','USt-Betrag €']];
    me.forEach(e=>{
      const n=calcNetFromGross(e.wert,e.mwst||7);
      wsData.push([e.datum.slice(0,10),e.name,e.einheit,e.menge,e.preis,e.mwst+'%',e.wert,n,roundCurrency(e.wert-n)]);
    });
    const wb7=roundCurrency(me.filter(e=>e.mwst===7).reduce((s,e)=>s+e.wert,0));
    const wb19=roundCurrency(me.filter(e=>e.mwst===19).reduce((s,e)=>s+e.wert,0));
    const wn7=calcNetFromGross(wb7,7),wn19=calcNetFromGross(wb19,19);
    wsData.push([]);
    wsData.push(['','','','','','Summe 7%',wb7,wn7,roundCurrency(wb7-wn7)]);
    wsData.push(['','','','','','Summe 19%',wb19,wn19,roundCurrency(wb19-wn19)]);
    wsData.push(['','','','','','GESAMT',roundCurrency(wb7+wb19),roundCurrency(wn7+wn19),roundCurrency((wb7-wn7)+(wb19-wn19))]);
    const ws=window.XLSX.utils.aoa_to_sheet(wsData);
    ws['!cols']=[{wch:12},{wch:38},{wch:8},{wch:6},{wch:12},{wch:7},{wch:10},{wch:10},{wch:12}];
    window.XLSX.utils.book_append_sheet(WB,ws,'Warenentnahmen');
    // Sheet 2: Personalessen
    if(mm.length){
      const msData=[['Datum','Art','USt %','Brutto €','Netto €','USt-Betrag €']];
      mm.forEach(m=>{
        const ust=mealUstSatz(m.datum);
        const n=calcNetFromGross(m.wert,ust);
        msData.push([m.datum,m.label,ust+'%',m.wert,n,roundCurrency(m.wert-n)]);
      });
      const mtot=roundCurrency(mm.reduce((s,m)=>s+m.wert,0));
      const mn7=calcNetFromGross(roundCurrency(mm.filter(m=>mealUstSatz(m.datum)===7).reduce((s,m)=>s+m.wert,0)),7);
      const mn19=calcNetFromGross(roundCurrency(mm.filter(m=>mealUstSatz(m.datum)===19).reduce((s,m)=>s+m.wert,0)),19);
      msData.push([],[['','Gesamt','',mtot,roundCurrency(mn7+mn19),roundCurrency(mtot-mn7-mn19)]]);
      window.XLSX.utils.book_append_sheet(WB,window.XLSX.utils.aoa_to_sheet(msData),'Personalessen');
    }
    // Sheet 3: USt-Aufschlüsselung (Warenentnahmen + Personalessen)
    const xm7=roundCurrency(mm.filter(m=>mealUstSatz(m.datum)===7).reduce((s,m)=>s+m.wert,0));
    const xm19=roundCurrency(mm.filter(m=>mealUstSatz(m.datum)===19).reduce((s,m)=>s+m.wert,0));
    const xb7=roundCurrency(wb7+xm7),xb19=roundCurrency(wb19+xm19);
    const xn7=calcNetFromGross(xb7,7),xn19=calcNetFromGross(xb19,19);
    const xu7=roundCurrency(xb7-xn7),xu19=roundCurrency(xb19-xn19);
    const xbGes=roundCurrency(xb7+xb19),xnGes=roundCurrency(xn7+xn19),xuGes=roundCurrency(xu7+xu19);
    const uData=[
      ['USt-Aufschlüsselung — Eigenverbrauch gesamt (Warenentnahmen + Sachbezug Personalessen)'],
      ['Zeitraum',sel.lbl],['Erstellt',new Date().toLocaleDateString('de-DE')],
      [],
      ['USt-Satz','Brutto (EUR)','Netto (EUR)','USt-Betrag (EUR)'],
      ['7 %',xb7,xn7,xu7],
      ['19 %',xb19,xn19,xu19],
      ['Gesamt',xbGes,xnGes,xuGes],
      [],
      ['Hinweis: Sachbezug Mahlzeiten ab 01.01.2026 mit 7 % USt (Steueränderungsgesetz 2025), davor 19 %.'],
    ];
    const wsU=window.XLSX.utils.aoa_to_sheet(uData);
    wsU['!cols']=[{wch:14},{wch:14},{wch:14},{wch:16}];
    window.XLSX.utils.book_append_sheet(WB,wsU,'USt-Aufschlüsselung');
    // Sheet 4: Zusammenfassung
    const p=calcPausch(persons,hh.betrieb);
    const tges=me.reduce((s,e)=>s+e.wert,0)+mm.reduce((s,m)=>s+m.wert,0);
    const sumData=[
      ['Eigenverbrauchsdokumentation'],['Zeitraum',sel.lbl],['Erstellt',new Date().toLocaleDateString('de-DE')],[],
      ['Pauschbetrag/Monat',p.mGes.toFixed(2)+' €'],['Warenentnahmen',me.reduce((s,e)=>s+e.wert,0).toFixed(2)+' €'],
      ['Personalessen',mm.reduce((s,m)=>s+m.wert,0).toFixed(2)+' €'],['Gesamt',tges.toFixed(2)+' €'],
      ['Verbleibend',(p.mGes-tges).toFixed(2)+' €'],
    ];
    window.XLSX.utils.book_append_sheet(WB,window.XLSX.utils.aoa_to_sheet(sumData),'Zusammenfassung');
    window.XLSX.writeFile(WB,`Eigenverbrauch-${sel.sk}-${sel.ek}.xlsx`);
  };

  const exportPDF=()=>{

    const {jsPDF}=window.jspdf;
    const doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
    const W=210, ML=14, MR=14, TW=W-ML-MR;
    const GREEN=[45,90,27], LIME=[168,208,96], GRAY=[100,100,100], BLACK=[26,38,18];

    doc.setTextColor(...GRAY);

    // Trennlinie
    doc.setDrawColor(...LIME);doc.setLineWidth(0.4);
    doc.line(ML, 21, W-MR, 21);
    y=30;

    // ── META BOX
    doc.setFillColor(...LIGHT);
    doc.setDrawColor(...LIME);

    doc.text(`Erstellt: ${new Date().toLocaleDateString('de-DE')}`,ML+4,y+16);
    y+=24;

    // ── Hilfsfunktionen
    const section=(title)=>{
      doc.setFillColor(...GREEN);
      doc.rect(ML,y,TW,6,'F');
      doc.setTextColor(255,255,255);doc.setFontSize(9);doc.setFont('helvetica','bold');
      doc.text(title,ML+3,y+4.2);
      y+=8;
    };
    const tableHead=(cols,widths)=>{
      doc.setFillColor(220,230,210);
      doc.rect(ML,y,TW,6,'F');
      doc.setTextColor(...BLACK);doc.setFontSize(8);doc.setFont('helvetica','bold');
      let x=ML;
      cols.forEach((c,i)=>{
        if(i===cols.length-1||i===cols.length-2)doc.text(c,x+widths[i],y+4.2,{align:'right'});
        else doc.text(c,x+2,y+4.2);
        x+=widths[i];
      });
      y+=6;
    };
    const tableRow=(vals,widths,shade)=>{
      if(y>270){doc.addPage();y=18;}
      if(shade){doc.setFillColor(248,251,244);doc.rect(ML,y,TW,5.5,'F');}
      doc.setDrawColor(220,230,210);
      doc.line(ML,y+5.5,ML+TW,y+5.5);
      doc.setTextColor(...BLACK);doc.setFontSize(7.5);doc.setFont('helvetica','normal');
      let x=ML;
      vals.forEach((v,i)=>{
        if(i===vals.length-1||i===vals.length-2)doc.text(String(v),x+widths[i],y+4,{align:'right'});
        else doc.text(String(v),x+2,y+4);
        x+=widths[i];
      });
      y+=5.5;
    };
    const totalRow=(label,val)=>{
      doc.setFillColor(220,230,210);
      doc.rect(ML,y,TW,6,'F');
      doc.setTextColor(...GREEN);doc.setFontSize(8.5);doc.setFont('helvetica','bold');
      doc.text(label,ML+3,y+4.3);
      doc.text(val,ML+TW,y+4.3,{align:'right'});
      y+=8;
    };

    // ── WARENENTNAHMEN
    section('Warenentnahmen');
    if(me.length){
      const cw=[20,68,20,22,16,20];
      tableHead(['Datum','Artikel','Menge','EK netto','MwSt','Wert'],cw);
      me.forEach((e,i)=>tableRow([
        e.datum.slice(0,10),
        e.name.length>38?e.name.slice(0,37)+'…':e.name,

    y+=30;

    if(y>255)doc.addPage(),y=18;
    doc.setDrawColor(180,180,180);
    doc.line(ML,y+14,ML+55,y+14);
    doc.line(ML+75,y+14,ML+130,y+14);
    doc.setTextColor(...GRAY);doc.setFontSize(7.5);doc.setFont('helvetica','normal');
    doc.text('Ort, Datum',ML,y+18);
    doc.text('Unterschrift Inhaber/in',ML+75,y+18);

    // ── FOOTER
    const pages=doc.getNumberOfPages();
    for(let i=1;i<=pages;i++){
      doc.setPage(i);
      doc.setFillColor(...GREEN);doc.rect(0,287,W,10,'F');
      doc.setTextColor(255,255,255);doc.setFontSize(7);
      doc.text('warenentnahme.de – Eigenverbrauchsdokumentation',ML,293);
      doc.text(`Seite ${i} von ${pages}`,W-MR,293,{align:'right'});
    }

    // Android-kompatibler PDF-Download
    const filename=`eigenverbrauch_${sel.sk}_${sel.ek}.pdf`;
    const isAndroid=/android/i.test(navigator.userAgent);
    const isIOS=/iphone|ipad/i.test(navigator.userAgent);
    if(isAndroid){
      // Android: open as blob URL in new tab (saves to Downloads)
      const blob=doc.output('blob');
      const url=URL.createObjectURL(blob);
      const a=document.createElement('a');
      a.href=url; a.download=filename; a.target='_blank';
      document.body.appendChild(a); a.click();
      setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(url);},2000);
    } else if(isIOS){
      // iOS Safari: open blob in new tab → user can share/save via sheet
      const blob=doc.output('blob');
      const url=URL.createObjectURL(blob);
      window.open(url,'_blank');
      setTimeout(()=>URL.revokeObjectURL(url),10000);
    } else {
      doc.save(filename);
    }
  };

  return(<div>
    <div className="hdr"><div className="hdr-eye">Steuerliche Auswertung</div><div className="hdr-title">Monats<em>bericht</em></div></div>
    <div className="cnt">

      <div className="sec" style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <span>Betriebsart</span>
      </div>
      <div className="card" style={{marginBottom:14}}>
        <div className="rl">
          <span style={{color:'var(--t2)',fontSize:12}}>Betriebsart (Jahrespauschale Finanzamt)</span>
        </div>
        <select value={hh.betrieb||'gaststaetten'} onChange={e=>setHH(h=>({...h,betrieb:e.target.value}))} style={{width:'100%',marginTop:6,padding:'8px 10px',borderRadius:8,border:'1px solid var(--border)',background:'var(--card)',color:'var(--fg)',fontSize:13,fontFamily:'inherit',outline:'none'}}>
          {Object.entries(BETRIEBE).map(([k,b])=><option key={k} value={k}>{b.label} – {Math.round((b.ust7+b.ust19)/12*100)/100} €/Monat</option>)}
        </select>
        {(()=>{const b=BETRIEBE[hh.betrieb||'gaststaetten'];return(
          <div style={{fontSize:11,color:'var(--t2)',marginTop:8}}>
            {[['Jahreswert gesamt',Math.round(b.ust7+b.ust19)+' €',true],
              ['davon 7% MwSt',b.ust7+' €',false],
              ['davon 19% MwSt',b.ust19+' €',false]
            ].map(([l,v,bold])=>(
              <div key={l} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'3px 0',borderBottom:'1px solid var(--border)'}}>
                <span style={{opacity:.75}}>{l}</span>
                <span style={{fontWeight:bold?700:400}}>{v}</span>
              </div>
            ))}
          </div>
        );})()}
      </div>
      <div className="sec" style={{marginTop:4,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <span>Haushalt</span>
        <button onClick={()=>setShowHH(s=>!s)} style={{border:'1px solid var(--border)',background:'none',color:'#2a6010',borderRadius:6,padding:'3px 10px',fontSize:10,cursor:'pointer',fontFamily:'Geist Mono,monospace'}}>{showHH?'Schließen':<><Icon name="settings" size={11}/> Bearbeiten</>}</button>
      </div>
      <div className="card" style={{marginBottom:showHH?4:14}}>
        {persons.map(p=><div key={p.id} className="rl">
          <div style={{display:'flex',alignItems:'center',gap:8}}>
            <Icon name="settings" size={16} color="var(--t2)"/>
            {editName===p.id
              ?<input autoFocus defaultValue={p.name} onBlur={e=>{renamePerson(p.id,e.target.value);setEditName(null);}} onKeyDown={e=>{if(e.key==='Enter'){renamePerson(p.id,e.target.value);setEditName(null);}}}
                style={{background:'var(--s1)',border:'1px solid var(--lime)',borderRadius:6,padding:'3px 8px',color:'var(--text)',fontSize:12,fontFamily:'Geist Mono,monospace',outline:'none',width:120}}/>
              :<div onClick={()=>setEditName(p.id)} style={{cursor:'pointer'}} title="Tippe zum Umbenennen">
                <div style={{display:'flex',alignItems:'center',gap:5}}>
                  <div style={{fontSize:12}}>{p.name}</div>
                  <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="var(--t2)" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" style={{opacity:.5,flexShrink:0}}>
                    <path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/>
                  </svg>
                </div>
                <div style={{fontSize:10,color:'var(--t2)'}}>{p.typ==='inhaber'?'Inhaber · 100%':p.typ==='partner'?'Partner · 100%':p.typ==='kind_teen'?'Kind ab 12 J. · 100%':'Kind 2–12 J. · 50%'}</div>
              </div>}
          </div>
          <div style={{display:'flex',gap:8,alignItems:'center'}}>
            <span style={{fontSize:11,color:'var(--t2)'}}>{fN((BETRIEBE[hh.betrieb||'gaststaetten'].ust7+BETRIEBE[hh.betrieb||'gaststaetten'].ust19)*(PM_FAKTOR[p.typ]!==undefined?PM_FAKTOR[p.typ]:1)/12)} €/M</span>
            {p.typ!=='inhaber'&&<button onClick={()=>delPerson(p.id)} style={{background:'none',border:'none',color:'var(--red)',cursor:'pointer',fontSize:16,padding:'2px 4px'}}>×</button>}
          </div>
        </div>)}
        <div className="rl" style={{borderTop:'1px solid var(--border)'}}>
          <span style={{color:'var(--t2)',fontSize:11}}>Pauschbetrag gesamt/Monat</span>
          <span style={{color:'#2a6010',fontWeight:600}}>{fN(pausch.mGes)} €</span>
        </div>
      </div>
      {showHH&&<div className="card" style={{marginBottom:14,padding:'12px 16px'}}>
        <div style={{fontSize:11,color:'var(--t2)',marginBottom:8}}>Person hinzufügen:</div>
        <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:8}}>
          <button onClick={()=>addPerson('partner')} style={{background:'var(--s2)',border:'1px solid var(--border)',color:'var(--text)',borderRadius:7,padding:'7px 12px',fontSize:11,cursor:'pointer',fontFamily:'Geist Mono,monospace'}}>+ Partner/in</button>
          <button onClick={()=>addPerson('kind_gross')} style={{background:'var(--s2)',border:'1px solid var(--border)',color:'var(--text)',borderRadius:7,padding:'7px 12px',fontSize:11,cursor:'pointer',fontFamily:'Geist Mono,monospace'}}>+ Kind (2–12 J.)</button>
          <button onClick={()=>addPerson('kind_teen')} style={{background:'var(--s2)',border:'1px solid var(--border)',color:'var(--text)',borderRadius:7,padding:'7px 12px',fontSize:11,cursor:'pointer',fontFamily:'Geist Mono,monospace'}}>+ Kind (ab 12 J.)</button>
        </div>
        <div style={{fontSize:10,color:'var(--t2)',lineHeight:1.7}}>Kinder unter 2 Jahren: kein Pauschbetrag. · 2–12 J.: 50% · ab 12 J.: 100%.</div>
      </div>}

      <div className="sec" style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <span>Abrechnungsperiode</span>
        <button onClick={()=>{setTmpDay(String(periodDay));setEditing(s=>!s);}} style={{border:'1px solid var(--border)',background:'none',color:'#2a6010',borderRadius:6,padding:'3px 10px',fontSize:10,cursor:'pointer',fontFamily:'Geist Mono,monospace'}}>{editing?'Schließen':`⚙ ab ${periodDay}.`}</button>
      </div>
      {editing&&<div className="card" style={{padding:'14px 16px',marginBottom:12}}>
        <div style={{fontSize:11,color:'var(--t2)',marginBottom:8}}>Periode startet am <strong style={{color:'#2a6010'}}>{tmpDay}.</strong>{tmpDay!=='1'&&<span style={{color:'var(--t2)'}}> → endet {Number(tmpDay)-1}. Folgemonat</span>}</div>
        <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:10}}>
          {[1,5,10,15,16,20,25].map(d=><button key={d} onClick={()=>setTmpDay(String(d))} style={{border:`1px solid ${tmpDay===String(d)?'var(--lime)':'var(--border)'}`,background:tmpDay===String(d)?'var(--lm)':'none',color:tmpDay===String(d)?'var(--lime)':'var(--t2)',borderRadius:6,padding:'5px 10px',fontSize:11,cursor:'pointer',fontFamily:'Geist Mono,monospace'}}>{d}.</button>)}
        </div>
        <button onClick={()=>{const v=Number(tmpDay);setPeriodDay(v);localStorage.setItem('gt_periodDay',JSON.stringify(v));setEditing(false);setSelKey(null);}} style={{width:'100%',background:'var(--lm)',border:'1px solid var(--lime)',borderRadius:8,padding:9,color:'#2a6010',fontSize:12,fontFamily:'Geist Mono,monospace',cursor:'pointer',fontWeight:600}}>Übernehmen</button>
      </div>}

      {periods.length===0
        ?<div className="empty"><div className="empty-i"><Icon name="chart_bar" size={42} color="var(--t3)"/></div><div className="empty-t">Noch keine Daten</div><div className="empty-s">Erfasse Waren und Mahlzeiten.</div></div>
        :<>
          <div style={{overflowX:'auto',paddingBottom:4,marginBottom:14}}>
            <div style={{display:'flex',gap:6,width:'max-content'}}>
              {(showAllPeriods?periods:periods.slice(0,12)).map(pp=><button key={pp.key} onClick={()=>setSelKey(pp.key)} style={{border:`1px solid ${sel?.key===pp.key?'var(--lime)':'var(--border)'}`,background:sel?.key===pp.key?'var(--lm)':'var(--s2)',color:sel?.key===pp.key?'var(--lime)':'var(--t2)',borderRadius:8,padding:'6px 12px',fontSize:10,cursor:'pointer',whiteSpace:'nowrap',fontFamily:'Geist Mono,monospace'}}>{pp.lbl}</button>)}{periods.length>12&&<button onClick={()=>setShowAllPeriods(s=>!s)} style={{border:'1px dashed var(--border)',background:'none',color:'var(--t2)',borderRadius:8,padding:'6px 12px',fontSize:10,cursor:'pointer',whiteSpace:'nowrap',fontFamily:'Geist Mono,monospace'}}>{showAllPeriods?'Weniger ▲':`+${periods.length-12} weitere ▼`}</button>}
            </div>
          </div>
          {sel&&<>
            <div className="sec">Warenentnahme</div>
            <div className="card">
              <div className="rl"><span style={{color:'var(--t2)'}}><Icon name="leaf" size={13} color="var(--lime2)" style={{marginRight:6}}/> 7% MwSt</span><span>{fmt(t7)}</span></div>
              <div className="rl"><span style={{color:'var(--t2)'}}><Icon name="droplet" size={13} color="var(--blue)" style={{marginRight:6}}/> 19% MwSt</span><span>{fmt(t19)}</span></div>
              <div className="rtot"><span>Gesamt</span><span style={{color:'#2a6010'}}>{fmt(tw)}</span></div>
            </div>
            <div className="sec">Personalessen</div>
            <div className="card">
              <div className="rl"><span style={{color:'var(--t2)'}}>Mahlzeiten</span><span>{mm.length} Stk</span></div>
              <div className="rl"><span style={{color:'var(--t2)'}}>Tage</span><span>{new Set(mm.map(m=>m.datum)).size}</span></div>
              <div className="rtot"><span>Sachbezug gesamt</span><span style={{color:'#2a6010'}}>{fmt(tm)}</span></div>
            </div>
            {(()=>{
              const xm7=roundCurrency(mm.filter(m=>mealUstSatz(m.datum)===7).reduce((s,m)=>s+m.wert,0));
              const xm19=roundCurrency(mm.filter(m=>mealUstSatz(m.datum)===19).reduce((s,m)=>s+m.wert,0));
              const xb7=roundCurrency(t7+xm7),xb19=roundCurrency(t19+xm19);
              const xn7=calcNetFromGross(xb7,7),xn19=calcNetFromGross(xb19,19);
              const xu7=roundCurrency(xb7-xn7),xu19=roundCurrency(xb19-xn19);
              if(xb7+xb19===0)return null;
              return(<>
                <div className="sec">USt-Aufschlüsselung</div>
                <div className="card">
                  {xb7>0&&<>
                    <div className="rl"><span style={{color:'var(--t2)'}}>7 % — Brutto</span><span>{fmt(xb7)}</span></div>
                    <div className="rl" style={{paddingLeft:20}}><span style={{color:'var(--t3)',fontSize:11}}>Netto</span><span style={{color:'var(--t2)',fontSize:11}}>{fN(xn7)} €</span></div>
                    <div className="rl" style={{paddingLeft:20}}><span style={{color:'var(--t3)',fontSize:11}}>USt 7 %</span><span style={{color:'var(--t2)',fontSize:11}}>{fN(xu7)} €</span></div>
                  </>}
                  {xb19>0&&<>
                    <div className="rl"><span style={{color:'var(--t2)'}}>19 % — Brutto</span><span>{fmt(xb19)}</span></div>
                    <div className="rl" style={{paddingLeft:20}}><span style={{color:'var(--t3)',fontSize:11}}>Netto</span><span style={{color:'var(--t2)',fontSize:11}}>{fN(xn19)} €</span></div>
                    <div className="rl" style={{paddingLeft:20}}><span style={{color:'var(--t3)',fontSize:11}}>USt 19 %</span><span style={{color:'var(--t2)',fontSize:11}}>{fN(xu19)} €</span></div>
                  </>}
                  <div className="rtot"><span>Gesamt brutto</span><span style={{color:'#2a6010'}}>{fmt(roundCurrency(xb7+xb19))}</span></div>
                </div>
              </>);
            })()}
            <div className="sec">Pauschbetrag-Vergleich</div>
            <div className="card">
              <div className="rl"><span style={{color:'var(--t2)'}}>Warenentnahme</span><span>{fmt(tw)}</span></div>
              <div className="rl"><span style={{color:'var(--t2)'}}>Sachbezug Personalessen</span><span>{fmt(tm)}</span></div>
              <div className="rl" style={{borderTop:'1px solid var(--border)',paddingTop:12,marginTop:4}}><span style={{color:'var(--text)',fontWeight:600}}>Dein Einzelnachweis</span><span style={{fontWeight:600}}>{fmt(einzelnachweis)}</span></div>
              <div className="rl"><span style={{color:'var(--t2)'}}>Pausch. ({persons.filter(p=>p.aktiv).length} P.)</span><span style={{color:'var(--t2)'}}>{fmt(pausch.mGes)}</span></div>
            </div>
            <div className="sbox" style={{background:spart>=0?'var(--ld)':'rgba(240,90,58,.08)',border:`1px solid ${spart>=0?'rgba(200,240,96,.2)':'rgba(240,90,58,.2)'}`}}>
              <div className="sbox-icon">{spart>=0?<Icon name="check_circle" size={26} color="var(--lime)"/>:<Icon name="alert_triangle" size={26} color="var(--amber)"/>}</div>
              <div>
                <div className="sbox-lbl">{spart>=0?'Ersparnis':'Überschreitung'}</div>
                <div className="sbox-amt" style={{color:spart>=0?'var(--lime)':'var(--red)'}}>{fmt(Math.abs(spart))}</div>
                <div className="sbox-note">{spart>=0?'Einzeldoku günstiger – Bericht zeigen.':'Pauschbetrag verwenden.'}</div>
              </div>
            </div>
            <div className="sec" style={{marginTop:16}}>Export</div>
            <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:10}}>
              {[['neutral','Neutral'],['sevdesk','sevDesk'],['datev','DATEV'],['lexware','Lexware']].map(([k,l])=>(
                <button key={k} onClick={()=>setExportFmt(k)} style={{border:`1px solid ${exportFmt===k?'var(--lime)':'var(--border)'}`,background:exportFmt===k?'var(--lm)':'var(--s2)',color:exportFmt===k?'var(--lime)':'var(--t2)',borderRadius:7,padding:'6px 12px',fontSize:10,cursor:'pointer',fontFamily:'Geist Mono,monospace'}}>{l}</button>
              ))}
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:6}}>
              <button className="btn btn-l" onClick={exportCSV}>↓ CSV</button>
              <button className="btn btn-l" onClick={exportXLSX} style={{background:'rgba(168,208,96,.1)',borderColor:'rgba(168,208,96,.4)',color:'#2a6010'}}>↓ Excel</button>
              <button className="btn btn-l" onClick={exportPDF} style={{background:'rgba(96,184,240,.1)',borderColor:'rgba(96,184,240,.4)',color:'var(--blue)'}}><Icon name="file_text" size={14} style={{marginRight:6}}/> PDF</button>
            </div>
            <button onClick={exportJSON}
              style={{width:'100%',marginTop:8,padding:'9px',borderRadius:10,
                border:'1.5px solid var(--border)',background:'var(--s2)',
                color:'var(--t2)',fontSize:12,cursor:'pointer',
                display:'flex',alignItems:'center',justifyContent:'center',gap:6}}>
              <Icon name="file_text" size={13} color="var(--t2)"/> JSON (Archiv)
            </button>
            {/* ── JAHRESÜBERSICHT ── */}
            {periods.length>1&&<>
            <div className="sec" style={{marginTop:20,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              Jahresübersicht
            </div>
            <div className="card" style={{overflowX:'auto',padding:'8px 0'}}>
              <table style={{width:'100%',borderCollapse:'collapse',fontSize:11}}>
                <thead><tr style={{color:'var(--t2)',borderBottom:'1px solid var(--border)'}}>
                  <th style={{textAlign:'left',padding:'4px 8px',fontWeight:600}}>Periode</th>
                  <th style={{textAlign:'right',padding:'4px 8px',fontWeight:600}}>Waren €</th>
                  <th style={{textAlign:'right',padding:'4px 8px',fontWeight:600}}>Essen €</th>
                  <th style={{textAlign:'right',padding:'4px 8px',fontWeight:600}}>Gesamt €</th>
                  <th style={{textAlign:'right',padding:'4px 8px',fontWeight:600}}>Pausch €</th>
                  <th style={{textAlign:'right',padding:'4px 8px',fontWeight:600}}>Diff €</th>
                </tr></thead>
                <tbody>
                {periods.slice().reverse().map(p=>{
                  const pe=ents.filter(e=>e.datum?.slice(0,10)>=p.sk&&e.datum?.slice(0,10)<=p.ek);
                  const pm=meals.filter(m=>m.datum>=p.sk&&m.datum<=p.ek);
                  const ptw=pe.reduce((s,e)=>s+e.wert,0);
                  const ptm=pm.reduce((s,m)=>s+m.wert,0);
                  const ptges=ptw+ptm;
                  const ppausch=calcPausch(persons,hh.betrieb).mGes;
                  const pdiff=ppausch-ptges;
                  const isSelected=sel&&p.key===sel.key;
                  return(<tr key={p.key} onClick={()=>setSelKey(p.key)} style={{cursor:'pointer',background:isSelected?'rgba(168,208,96,.08)':'none',borderBottom:'1px solid var(--border)'}}>
                    <td style={{padding:'5px 8px',fontWeight:isSelected?700:400,color:isSelected?'var(--lime2)':'var(--t1)'}}>{p.lbl}</td>
                    <td style={{textAlign:'right',padding:'5px 8px',color:'var(--t2)'}}>{ptw>0?fN(ptw):'-'}</td>
                    <td style={{textAlign:'right',padding:'5px 8px',color:'var(--t2)'}}>{ptm>0?fN(ptm):'-'}</td>
                    <td style={{textAlign:'right',padding:'5px 8px',fontWeight:600}}>{ptges>0?fN(ptges):'-'}</td>
                    <td style={{textAlign:'right',padding:'5px 8px',color:'var(--t2)'}}>{fN(ppausch)}</td>
                    <td style={{textAlign:'right',padding:'5px 8px',color:pdiff>=0?'var(--lime2)':'var(--red)',fontWeight:600}}>{pdiff>=0?'+':''}{fN(pdiff)}</td>
                  </tr>);
                })}
                </tbody>
              </table>
            </div>
            </>}

            {me.length>0&&<><div className="sec" style={{marginTop:20}}>Einzelne Entnahmen</div>
            <div className="card">{me.map(e=><div key={e.id} className="rl">
              <div><div style={{fontSize:12}}>{e.name}</div><div style={{fontSize:11,color:'var(--t2)'}}>{e.datum?.slice(0,10)} · {e.menge} {e.einheit} · {e.mwst}%</div></div>
              <span style={{color:'#2a6010',flexShrink:0}}>{fN(e.wert)} €</span>
            </div>)}</div></>}
          </>}
        </>
      }
    </div>
  </div>);
}

// ── IMPORT
function ArtEditRow({art,onSave,onCancel}){
  const[name,setName]=React.useState(art.name||'');
  const[preis,setPreis]=React.useState(String(art.preis||''));
  const[mwst,setMwst]=React.useState(String(art.mwst||7));
  const[einheit,setEinheit]=React.useState(art.einheit||'kg');
  const[kat,setKat]=React.useState(art.kategorie||'');
  const save=()=>{
    const p=parseFloat(preis.replace(',','.'));
    if(!name.trim()||isNaN(p)||p<=0){alert('Name und Preis erforderlich');return;}
    onSave(art.id,{name:name.trim(),preis:Math.round(p*100)/100,mwst:parseInt(mwst),einheit,kategorie:kat});
  };
  return(<div style={{background:'var(--bg)',borderRadius:8,padding:8,marginBottom:6,border:'1px solid var(--lime)'}}>
    <input value={name} onChange={e=>setName(e.target.value)} placeholder="Name" style={{width:'100%',marginBottom:5,fontSize:12,padding:'4px 6px',borderRadius:6,border:'1px solid var(--border)',background:'var(--card)',color:'var(--t1)'}}/>
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:5,marginBottom:5}}>
      <input value={preis} onChange={e=>setPreis(e.target.value)} placeholder="Preis €" style={{fontSize:12,padding:'4px 6px',borderRadius:6,border:'1px solid var(--border)',background:'var(--card)',color:'var(--t1)'}}/>
      <select value={mwst} onChange={e=>setMwst(e.target.value)} style={{fontSize:11,padding:'4px',borderRadius:6,border:'1px solid var(--border)',background:'var(--card)',color:'var(--t1)'}}>
        <option value="7">7% MwSt</option><option value="19">19% MwSt</option>
      </select>
      <input value={einheit} onChange={e=>setEinheit(e.target.value)} placeholder="Einheit" style={{fontSize:12,padding:'4px 6px',borderRadius:6,border:'1px solid var(--border)',background:'var(--card)',color:'var(--t1)'}}/>
    </div>
    <input value={kat} onChange={e=>setKat(e.target.value)} placeholder="Kategorie (optional)" style={{width:'100%',marginBottom:5,fontSize:11,padding:'4px 6px',borderRadius:6,border:'1px solid var(--border)',background:'var(--card)',color:'var(--t1)'}}/>
    <div style={{display:'flex',gap:6}}>
      <button onClick={save} className="btn btn-l" style={{flex:1,padding:'5px',fontSize:12}}>✓ Speichern</button>
      <button onClick={onCancel} className="btn" style={{flex:1,padding:'5px',fontSize:12}}>Abbrechen</button>
    </div>
  </div>);
}

function ImportTab({arts,setArts,showT,ents=[],hh,setHH,setEnts,setMeals,setFavs,syncPin,setShowSyncModal,backupData,restoreData,gmbhMeals=[],setGmbhMeals,gmbhWithdrawals=[],setGmbhWithdrawals,gmbhPersons=[],setGmbhPersons,rechtsform,setRechtsform}){
  const[loading,setL]=useState(false);
  const[progress,setProgress]=useState(null);
  const[diagLog,setDiagLog]=useState([]);
  const[invoiceMode,setInvoiceMode]=useState(false);
  const[invoiceState,setInvoiceState]=useState('idle'); // idle|analyzing|done|error
  const[invoiceResult,setInvoiceResult]=useState(null);
  const[invoiceError,setInvoiceError]=useState('');
  const[invoiceDebug,setInvoiceDebug]=useState('');
  const[invoiceSelected,setInvoiceSelected]=useState({});
  const cameraRef=React.useRef(null);
  const iosInputRef=React.useRef(null);
  const isIOS=/iPhone|iPad|iPod/.test(navigator.userAgent);
  const isAndroid=/Android/.test(navigator.userAgent);
  const isMobile=isIOS||isAndroid;

  const processFiles=async(files)=>{
    if(!files||!files.length)return;
    setL(true);
    setDiagLog([]);
    setProgress({done:0,total:files.length,current:''});

    let allNew={};
    let totalParsed=0;
    const newLog=[];

    for(let i=0;i<files.length;i++){
      const f=files[i];
      setProgress({done:i,total:files.length,current:f.name});
      // Kurze Pause damit React den Progress rendern kann
      await new Promise(r=>setTimeout(r,50));
      try{
        const nameLower=f.name.toLowerCase();
        // iOS benennt .bnn manchmal zu .bnn.txt oder .bnn 2.txt um
        const isBNN = nameLower.endsWith('.bnn') || nameLower.includes('.bnn.') || nameLower.includes('.bnn ');
        const ext=f.name.split('.').pop().toLowerCase();
        let parsed=[];
        if(isBNN){
          const buf=await f.arrayBuffer();
          const bytes=new Uint8Array(buf);

          // Strategie: ISO-8859-1 und CP850 beide probieren, Ergebnis mit mehr echten Umlauten gewinnt
          // ISO-8859-1: ä=0xE4, ö=0xF6, ü=0xFC, Ä=0xC4, Ö=0xD6, Ü=0xDC, ß=0xDF
          let textISO='';
          try{ textISO=new TextDecoder('iso-8859-1').decode(buf); }catch{ textISO=''; }

          // CP850 manuell (Safari unterstützt 'ibm850' nicht)
          const CP850={
            0x80:'Ç',0x81:'ü',0x82:'é',0x83:'â',0x84:'ä',0x85:'à',0x86:'å',0x87:'ç',
            0x88:'ê',0x89:'ë',0x8A:'è',0x8B:'ï',0x8C:'î',0x8D:'ì',0x8E:'Ä',0x8F:'Å',
            0x90:'É',0x91:'æ',0x92:'Æ',0x93:'ô',0x94:'ö',0x95:'ò',0x96:'û',0x97:'ù',
            0x98:'ÿ',0x99:'Ö',0x9A:'Ü',0x9B:'ø',0x9C:'£',0x9D:'Ø',0x9E:'×',0x9F:'ƒ',
            0xA0:'á',0xA1:'í',0xA2:'ó',0xA3:'ú',0xA4:'ñ',0xA5:'Ñ',0xA6:'ª',0xA7:'º',
            0xE1:'ß',0xE6:'µ',0xF0:'ð',0xF1:'±',
          };
          let textCP850='';
          for(let i=0;i<bytes.length;i++){
            const b=bytes[i];
            if(b<0x80)textCP850+=String.fromCharCode(b);
            else textCP850+=(CP850[b]||'?');
          }

          // Zähle echte Umlaute in beiden Versionen – die Version mit mehr Umlauten gewinnt
          const countUml=s=>(s.match(/[äöüÄÖÜß]/g)||[]).length;
          const text = countUml(textISO) >= countUml(textCP850) ? textISO : textCP850;
          parsed=parseBNN(text);
          const d=parsed._diag||{};
          newLog.push({
            file:f.name, size:(f.size/1024).toFixed(0)+' KB',
            lines:d.lines, blocks:d.blocks, ok:d.ok||0,
            noName:d.noName||0, noPrice:d.noPrice||0,
            firstLine:d.firstLines?.[0]||'',
            formatError:d.formatError||null,
          });
        } else if(ext==='xlsx'||ext==='xls'){
          parsed=parseXLSX(new Uint8Array(await f.arrayBuffer()));
          newLog.push({file:f.name,size:(f.size/1024).toFixed(0)+' KB',ok:parsed.length,blocks:'XLSX'});
        } else if(ext==='csv'){
          const text=await f.text();
          parsed=parseCSV(text);
          newLog.push({file:f.name,size:(f.size/1024).toFixed(0)+' KB',ok:parsed.length,blocks:'CSV'});
        } else {
          newLog.push({file:f.name,ok:0,error:'Unbekanntes Format – unterstützt: BNN, XLSX, CSV'});
          continue;
        }
        // Artikel sammeln – bei Duplikaten immer den niedrigeren Preis behalten (EK < VK)
        parsed.forEach(a=>{
          if(!a||!a.id)return;
          if(allNew[a.id]){
            // Duplikat: niedrigeren Preis behalten
            if(a.preis>0 && a.preis<allNew[a.id].preis) allNew[a.id]=a;
          } else {
            allNew[a.id]=a;
          }
        });
        totalParsed+=parsed.filter(a=>a&&a.id).length;
      }catch(e){
        newLog.push({file:f.name,ok:0,error:String(e.message||e)});
      }
    }

    setDiagLog([...newLog]);
    setProgress({done:files.length,total:files.length,current:'Speichere…'});
    await new Promise(r=>setTimeout(r,100));

    // EIN State-Update mit allem gesammelten
    setArts(prev=>{
      const m={};
      prev.forEach(a=>{if(a&&a.id)m[a.id]=a;});
      Object.values(allNew).forEach(a=>{if(a&&a.id)m[a.id]=a;});
      const alle=Object.values(m);
      // Duplikat-Erkennung: gleicher Name + Marke → neu importierte Artikel bevorzugen (aktueller Preis)
      const nameKey=a=>`${(a.name||'').toLowerCase().trim()}|${(a.marke||a.liefKuerzel||'').toLowerCase().trim()}`;
      const byName={};
      // Erst alte Artikel eintragen, dann neue überschreiben (neue Preise haben Vorrang)
      alle.filter(a=>!allNew[a.id]).forEach(a=>{const k=nameKey(a);if(!byName[k])byName[k]=a;});
      Object.values(allNew).forEach(a=>{byName[nameKey(a)]=a;}); // neue überschreiben immer
      return Object.values(byName);
    });

    setTimeout(()=>{
      setL(false);
      setProgress(null);
      showT(`✓ ${totalParsed} Artikel aus ${files.length} Datei${files.length>1?'en':''}`);
    },300);
  };

  const parsePdfDirect=async(file)=>{
    try{
      if(typeof pdfjsLib==='undefined') return null;
      const ab=await file.arrayBuffer();
      const pdf=await pdfjsLib.getDocument({data:ab}).promise;
      let fullText='';
      for(let p=1;p<=pdf.numPages;p++){
        const page=await pdf.getPage(p);
        const tc=await page.getTextContent();
        // Reconstruct reading order
        const rows={};
        tc.items.forEach(it=>{
          const y=Math.round(it.transform[5]/4)*4;
          if(!rows[y]) rows[y]=[];
          rows[y].push({x:it.transform[4],str:it.str});
        });
        Object.keys(rows).sort((a,b)=>b-a).forEach(y=>{
          fullText+=rows[y].sort((a,b)=>a.x-b.x).map(i=>i.str).join(' ')+'\n';
        });
      }
      const items=[];
      // Match: [optional artNr] name price EUR unit
      const lines=fullText.split('\n');
      for(const line of lines){
        const m=line.match(/(.+?)\s+(\d+[,.]\d{2})\s+EUR\s+(kg|Stk|Liter|l\b|g\b|ml|Fl\.?|St\.?)/i);
        if(!m) continue;
        const rawName=m[1].trim();
        const artNrMatch=rawName.match(/^(\d{4,6})\s+(.+)$/);
        const name=artNrMatch?artNrMatch[2]:rawName;
        const artNr=artNrMatch?artNrMatch[1]:'';
        const preis=parseFloat(m[2].replace(',','.'));
        const einheit=m[3];
        if(name.length<3||preis<=0||preis>50000) continue;
        const mwst=/kirsch|rum|lik|branntwein|spirituose|wein|bier|sekt|prosecco|champagn|wodka|vodka|gin\b|whisky|whiskey|cognac|brandy|schnaps|vol\..*%|%.*vol/i.test(name)?19:7;
        items.push({name,preis,mwst,einheit,menge:1,artNr});
      }
      return items.length>=5?items:null;
    }catch(e){console.warn('PDF direct parse failed:',e);return null;}
  };

  const analyzeInvoice=async(file)=>{
    setInvoiceState('analyzing');
    setInvoiceResult(null);
    setInvoiceSelected({});
    setInvoiceError('');
    setInvoiceDebug('');
    try{
      const mime=file.type||'image/jpeg';
      const isPdf=mime==='application/pdf';

      // For PDFs: try direct text extraction first (no API, no size limit)
      if(isPdf){
        setInvoiceError('Lese PDF…');
        const directItems=await parsePdfDirect(file);
        if(directItems&&directItems.length>0){
          setInvoiceError('');
          const sel={};directItems.forEach((_,i)=>sel[i]=true);
          setInvoiceResult(directItems);
          setInvoiceSelected(sel);
          setInvoiceState('done');
          return;
        }
        setInvoiceError('Direktlesung nicht möglich – versuche KI…');
      }

      const base64=await new Promise((res,rej)=>{
        const r=new FileReader();
        r.onload=()=>res(r.result.split(',')[1]);
        r.onerror=rej;
        r.readAsDataURL(file);
      });
      const contentBlock=isPdf
        ?{type:'document',source:{type:'base64',media_type:'application/pdf',data:base64}}
        :{type:'image',source:{type:'base64',media_type:mime,data:base64}};

      const prompt=`Extrahiere ALLE Artikel aus dieser Preisliste/Rechnung.
Antworte NUR mit JSON-Array, kein Text:
[{"n":"Dinkelkerne Bio 5kg","p":1.55,"m":7,"e":"kg","q":1},...]
Felder: n=Name p=Nettopreis(Dezimalpunkt,Zahl) m=MwSt(7oder19) e=Einheit q=Menge(sonst 1)
Preise mit Komma als Dezimaltrennzeichen in Punkt umwandeln: 1,55→1.55
Alle Lebensmittel=7%, Spirituosen/Getränke=19%.`;

      const parseItems=(raw)=>{
        let s=raw.replace(/```json?\n?|```/g,'').trim();
        const bracketIdx=s.indexOf('[');
        if(bracketIdx>=0) s=s.slice(bracketIdx);
        else s='['+s;
        if(!s.startsWith('[')) s='['+s;
        // Remove trailing incomplete object and close
        if(!s.endsWith(']')) s=s.replace(/,?\s*\{[^}]*$/,'')+']';
        try{return JSON.parse(s);}
        catch{
          const objs=[];const objRe=/\{[^{}]+\}/g;let m;
          while((m=objRe.exec(s))!==null){try{objs.push(JSON.parse(m[0]));}catch{}}
          return objs;
        }
      };

      // Multi-turn extraction loop: keep asking Claude to continue until done
      let allItems=[];
      let messages=[{role:'user',content:[contentBlock,{type:'text',text:prompt}]}];
      let pass=0;
      const maxPasses=5;

      while(pass<maxPasses){
        pass++;
        if(pass>1) setInvoiceError(`Lade Teil ${pass}… (${allItems.length} Artikel bisher)`);
        const resp=await fetch('./api-proxy.php',{
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body:JSON.stringify({model:'claude-sonnet-4-5-20250929',max_tokens:8000,messages})
        });
        const data=await resp.json();
        if(!data||!data.content){
          setInvoiceDebug('API-Fehler Pass '+pass+': '+JSON.stringify(data).substring(0,200));
          break;
        }
        const text=(data.content||[]).map(c=>c.text||'').join('');
        if(pass===1) setInvoiceDebug('RAW:'+text.substring(0,200));
        const batch=parseItems(text);
        allItems=[...allItems,...batch];
        const truncated=data.stop_reason==='max_tokens';
        if(!truncated||batch.length===0) break;
        // Next turn: DON'T resend the PDF (too large) - just continue text conversation
        // Remove the PDF document block from the first message for subsequent turns
        const firstMsgTextOnly={role:'user',content:[{type:'text',text:prompt}]};
        messages=[
          firstMsgTextOnly,
          {role:'assistant',content:text},
          {role:'user',content:[{type:'text',text:'Weiter. Extrahiere die nächsten Artikel ab dem letzten. Nur JSON-Array.'}]}
        ];
      }
      setInvoiceError('');

      setInvoiceDebug('');
      if(!allItems.length) throw new Error('Keine Artikel erkannt – Format nicht lesbar');
      // Universal normalization - handle ALL possible field names Claude might use
      const toNum=v=>{
        if(v===null||v===undefined)return 0;
        const s=String(v).replace(',','.').replace(/[^0-9.]/g,'');
        return parseFloat(s)||0;
      };
      const getField=(it,...keys)=>{
        for(const k of keys){
          if(it[k]!==undefined&&it[k]!==null&&it[k]!=='')return it[k];
          // case-insensitive
          const lk=k.toLowerCase();
          for(const ik of Object.keys(it)){
            if(ik.toLowerCase()===lk)return it[ik];
          }
        }
        return undefined;
      };
      console.log('PDF Items sample:',JSON.stringify(allItems.slice(0,3)));
      const normalized=allItems.map(it=>({
        name: String(getField(it,'name','n','bezeichnung','artikel','description','Beschreibung','Name','Artikel','artikelname','produktname')||'Unbekannt'),
        preis: toNum(getField(it,'preis','p','price','Preis','einzelpreis','netto','nettopreis','EP','ep')),
        mwst: parseInt(getField(it,'mwst','m','mwst','steuer','ust','tax','MwSt','Mwst','mwstsatz'))||7,
        einheit: String(getField(it,'einheit','e','unit','me','ME','Einheit','einheit','masseinheit')||'Stk'),
        menge: toNum(getField(it,'menge','q','quantity','anzahl','Menge','qty'))||1
      })).filter(it=>it.preis>0);
      if(!normalized.length){
        const sample=JSON.stringify(allItems[0]||{});
        throw new Error('Preise nicht erkannt. Beispiel-Antwort: '+sample.substring(0,120));
      }

      // Alle vorselektieren
      const sel={};
      normalized.forEach((_,i)=>sel[i]=true);
      setInvoiceResult(normalized);
      setInvoiceSelected(sel);
      setInvoiceState('done');
    }catch(e){
      console.error(e);
      setInvoiceError(e.message||'Unbekannter Fehler');
      setInvoiceState('error');
    }
  };

  const importInvoiceItems=()=>{
    const items=invoiceResult.filter((_,i)=>invoiceSelected[i]);
    if(!items.length)return;
    let added=0,updated=0,skipped=0;
    setArts(prev=>{
      // Build lookup by normalized name+einheit for deduplication
      const nameKey=(name,einh)=>(name||'').toLowerCase().trim()+'|'+(einh||'').toLowerCase().trim();
      const byKey={};
      prev.forEach(a=>{if(a&&a.id)byKey[nameKey(a.name,a.einheit)]=a;});
      const m={};
      prev.forEach(a=>{if(a&&a.id)m[a.id]=a;});
      items.forEach(it=>{
        const p=parseFloat(String(it.preis).replace(',','.'));
        if(p<=0)return;
        const newPreis=Math.round(p*100)/100;
        const key=nameKey(it.name,it.einheit);
        const existing=byKey[key];
        if(existing){
          if(Math.abs(existing.preis-newPreis)>0.001){
            // Price changed → update
            m[existing.id]={...existing,preis:newPreis};
            updated++;
          } else {
            skipped++;
          }
        } else {
          // New article
          const id='INV'+Date.now()+Math.random().toString(36).slice(2,6);
          const newArt={id,name:it.name||'Unbekannt',preis:newPreis,mwst:parseInt(it.mwst)||7,einheit:it.einheit||'Stk',marke:'',liefKuerzel:it.artNr?'#'+it.artNr:'',quelle:'Rechnung',eans:[]};
          m[id]=newArt;
          byKey[key]=newArt;
          added++;
        }
      });
      return Object.values(m);
    });
    const parts=[];
    if(added)parts.push(`${added} neu`);
    if(updated)parts.push(`${updated} Preis aktualisiert`);
    if(skipped)parts.push(`${skipped} unverändert`);
    showT(`✓ ${parts.length?parts.join(', '):items.length+' importiert'}`);
    setInvoiceState('idle');setInvoiceResult(null);setInvoiceMode(false);
  };

  const clearAll=()=>{
    if(confirm('Alle Artikel löschen?')){setArts([]);setDiagLog([]);showT('Artikel gelöscht');}
  };


  // ── ARTIKEL EDITOR ──
  const[artEdit,setArtEdit]=useState(null);

  // Artikel ohne aktive Verwendung archivieren (verringert localStorage-Last)
  const archiveUnusedArts=()=>{
    const usedIds=new Set([
      ...ents.map(e=>e.artId).filter(Boolean),
      ...gmbhWithdrawals.map(w=>w.artId).filter(Boolean),
    ]);
    const keep=arts.filter(a=>
      usedIds.has(a.id) ||          // in Einträgen verwendet
      (a.eans?.length>0) ||         // hat EAN → wertvoll
      (a.uvp>0)                     // hat UVP → wertvoll für Warenrabatt
    );
    const removed=arts.length-keep.length;
    if(removed===0){showT('Alle Artikel werden verwendet – nichts zu archivieren');return;}
    if(!confirm(`${removed} ungenutzte Artikel ohne EAN und UVP entfernen? Artikel mit EAN oder UVP bleiben erhalten.`))return;
    setArts(keep);
    showT(`${removed} Artikel entfernt · ${keep.length} behalten`);
  }; // null or art.id being edited
  const[artQ,setArtQ]=useState('');
  const[artFilter,setArtFilter]=useState('alle'); // alle|7|19|BNN|XLSX|Rechnung
  const editedArts=useMemo(()=>{
    let list=arts;
    if(artFilter==='7')list=list.filter(a=>a.mwst===7);
    else if(artFilter==='19')list=list.filter(a=>a.mwst===19);
    else if(['BNN','XLSX','Rechnung','Demo','Manuell'].includes(artFilter))list=list.filter(a=>a.quelle===artFilter);
    if(artQ.trim())list=list.filter(a=>(a.name||'').toLowerCase().includes(artQ.toLowerCase()));
    return list.slice(0,80);
  },[arts,artFilter,artQ]);
  const saveArtEdit=(id,changes)=>{
    setArts(p=>p.map(a=>a.id===id?{...a,...changes}:a));
    setArtEdit(null);showT('✓ Artikel gespeichert');
  };
  const deleteArt=(id)=>{
    if(confirm('Artikel löschen?'))setArts(p=>p.filter(a=>a.id!==id));
  };

  const bySrc=arts.reduce((a,x)=>{a[x.quelle]=(a[x.quelle]||0)+1;return a;},{});

  return(<div>
    <div className="hdr">
      <div className="hdr-eye">BNN · XLSX · CSV · Rechnung</div>
      <div className="hdr-title">Artikel<em>import</em></div>
    </div>
    <div className="cnt">

      <div className="sec">Geladene Daten</div>
      <div className="card" style={{marginBottom:14}}>
        {arts.length===0
          ?<div style={{padding:'16px',color:'var(--t2)',fontSize:12,textAlign:'center'}}>Noch keine Artikel</div>
          :<>
            <div className="rl">
              <span style={{color:'var(--t2)'}}>Artikel gesamt</span>
              <span style={{color:'#2a6010',fontSize:20,fontFamily:'Instrument Serif,serif'}}>{arts.length}</span>
            </div>
            {Object.entries(bySrc).map(([s,c])=><div key={s} className="rl">
              <span style={{color:'var(--t2)'}}>{s==='Demo'?'Demo':s==='BNN'?'BNN':s}</span>
              <span>{c} Artikel</span>
            </div>)}
          </>}
      </div>

      <div className="sec">Rechnung scannen (KI)</div>
      {!invoiceMode&&<button className="btn btn-l" style={{marginBottom:12,fontSize:13,padding:14,display:'flex',alignItems:'center',justifyContent:'center',gap:10}}
        onClick={()=>setInvoiceMode(true)}>
        <Icon name="receipt" size={20} color="currentColor"/> Rechnung / Lieferschein (Bild oder PDF) scannen
      </button>}

      {invoiceMode&&<div style={{marginBottom:16}}>
        {invoiceState==='idle'&&<>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:10}}>
            {/* Kamera-Button */}
            <button onClick={()=>cameraRef.current?.click()}
              style={{background:'var(--s2)',border:'1px solid var(--border)',borderRadius:12,padding:'18px 10px',color:'var(--text)',cursor:'pointer',fontSize:12,fontFamily:'Geist Mono,monospace',textAlign:'center',lineHeight:1.8}}>
              <Icon name="camera" size={28} color="currentColor"/>Kamera
            </button>
            {/* Datei hochladen */}
            <button onClick={()=>{const i=document.createElement('input');i.type='file';i.accept='image/*,application/pdf';i.onchange=e=>{if(e.target.files[0])analyzeInvoice(e.target.files[0]);};i.click();}}
              style={{background:'var(--s2)',border:'1px solid var(--border)',borderRadius:12,padding:'18px 10px',color:'var(--text)',cursor:'pointer',fontSize:12,fontFamily:'Geist Mono,monospace',textAlign:'center',lineHeight:1.8}}>
              <Icon name="camera" size={28} color="currentColor"/>Foto / PDF
            </button>
          </div>
          {/* Hidden camera input */}
          <input ref={cameraRef} type="file" accept="image/*" capture="environment" style={{display:'none'}}
            onChange={e=>{if(e.target.files[0])analyzeInvoice(e.target.files[0]);}}/>
          <div style={{fontSize:11,color:'var(--t2)',textAlign:'center',lineHeight:1.7,marginBottom:8}}>
            Foto der Rechnung oder Lieferschein – KI erkennt Artikel, Preise und MwSt automatisch
          </div>
          <button onClick={()=>setInvoiceMode(false)} style={{width:'100%',background:'none',border:'1px solid var(--border)',borderRadius:8,padding:8,color:'var(--t2)',cursor:'pointer',fontFamily:'Geist Mono,monospace',fontSize:11}}>Abbrechen</button>
        </>}

        {invoiceState==='analyzing'&&<div style={{textAlign:'center',padding:32,background:'var(--s2)',border:'1px solid var(--border)',borderRadius:14}}>
          <div style={{marginBottom:12}}><Icon name="search" size={36} color="var(--t3)"/></div>
          <div style={{color:'#2a6010',fontSize:14,marginBottom:6}}>KI analysiert Rechnung…</div>
          <div style={{color:'var(--t2)',fontSize:11}}>Artikel, Preise und MwSt werden erkannt</div>
        </div>}

        {invoiceState==='error'&&<div style={{textAlign:'center',padding:20,background:'var(--s2)',border:'1px solid rgba(240,90,58,.3)',borderRadius:14}}>
          <div style={{marginBottom:6}}><Icon name="alert_triangle" size={28} color="var(--amber)"/></div>
          <div style={{color:'var(--red)',marginBottom:4}}>Erkennung fehlgeschlagen</div>
          <div style={{color:'var(--t2)',fontSize:11,marginBottom:12}}>{invoiceError||'Bild zu unscharf oder kein API-Zugang?'}</div>
          {invoiceDebug&&<details style={{marginBottom:8,textAlign:'left'}}><summary style={{fontSize:9,color:'var(--t2)',cursor:'pointer'}}>Debug (für Support)</summary><pre style={{fontSize:10,color:'var(--t2)',whiteSpace:'pre-wrap',wordBreak:'break-all',maxHeight:120,overflow:'auto'}}>{invoiceDebug}</pre></details>}
          <button className="btn" onClick={()=>setInvoiceState('idle')}>Nochmal versuchen</button>

              </div>

      {rechtsform!=='gmbh'&&<><div className="sec" style={{marginTop:20,display:'flex',alignItems:'center'}}>Steuerlicher Jahresbetrag 2025/26 – {BETRIEBE[hh.betrieb||'gaststaetten'].label}<Tooltip text="Fester Jahresbetrag pro Person für private Warenentnahmen – kein Einzelnachweis nötig. Wert gilt je nach Betriebsart und wird jährlich vom BMF festgelegt."/></div>
      <div className="card">
        {(()=>{const b=BETRIEBE[hh.betrieb||'gaststaetten'];return[['Jahreswert gesamt',fmt(b.ust7+b.ust19)],['davon 7% MwSt',fmt(b.ust7)],['davon 19% MwSt',fmt(b.ust19)],['Monatswert (1 Person)',fmt((b.ust7+b.ust19)/12)]].map(([l,v])=><div key={l} className="rl"><span style={{color:'var(--t2)',fontSize:12}}>{l}</span><span>{v}</span></div>);})()}

// ── SW-Cleanup: alten Root-Scope Service Worker deregistrieren
if('serviceWorker' in navigator){
  navigator.serviceWorker.getRegistrations().then(function(regs){
    regs.forEach(function(reg){
      if(reg.scope === location.origin + '/'){
        reg.unregister().then(function(){ console.log('[SW] Alter Root-SW entfernt'); });
      }
    });
  });
}

// ── Splash crossfade
(function(){
  // Im iframe Splash sofort überspringen (verhindert Weißbild)
  var inIframe=(function(){ try{ return window.self!==window.top; }catch(e){ return true; } })();
  var MIN=inIframe?0:1400, t0=performance.now();
  var root=document.getElementById('root');
  if(root){root.style.opacity='0';root.style.transition='opacity 0.55s cubic-bezier(0.4,0,0.2,1)';}
  if(inIframe){ var si=document.getElementById('splash'); if(si)si.style.display='none'; }
  function showApp(){
    var root=document.getElementById('root');
    if(root)root.style.opacity='1';
    setTimeout(function(){
      var s=document.getElementById('splash');
      if(s){s.style.opacity='0';s.style.visibility='hidden';
        setTimeout(function(){if(s.parentNode)s.parentNode.removeChild(s);},700);}
    },80);
  }
  var safetyTimer=setTimeout(function(){showApp();},3000);
  requestAnimationFrame(function(){requestAnimationFrame(function(){
    clearTimeout(safetyTimer);
    setTimeout(showApp, Math.max(0,MIN-(performance.now()-t0)));
  });});
})();// ─────────────────────────────────────────────────────────────────────────────

// GMBH REPORT HELPERS  (Version: REPORT_VERSION Konstante unten)
// ═══════════════════════════════════════════════════════════════

const GMBH_REPORT_VERSION = '1.4';

// ── Format-Helper: zwei separate Formatter, keine gemeinsame Logik ──────────
// PDF: Komma als Dezimaltrennzeichen, 2 Nachkommastellen
const formatCurrencyPDF = (value) => {
  const n = parseFloat(value) || 0;
  return n.toFixed(2).replace('.', ',');
};
// CSV: Punkt als Dezimaltrennzeichen, reine Zahl ohne Einheit
const formatNumberCSV = (value) => {
  const n = parseFloat(value);
  return isNaN(n) ? '' : String(Math.round(n * 100) / 100);
};

// ── ZENTRALE FINANZ-HELPERS ────────────────────────────────
// Alle Währungsberechnungen laufen ausschließlich hier durch.
// Keine Inline-Rundung im JSX.

// Einheitliche Rundung auf 2 Dezimalstellen (Bankersrundung vermeiden)
const roundCurrency = (value) => Math.round((parseFloat(value) || 0) * 100) / 100;

// Netto aus Brutto berechnen
const calcNetFromGross = (gross, vatRate) => {
  const g = parseFloat(gross) || 0;
  const v = parseFloat(vatRate) || 0;
  return roundCurrency(g / (1 + v / 100));
};

// Brutto aus Netto berechnen
const calcGrossFromNet = (net, vatRate) => {
  const n = parseFloat(net) || 0;
  const v = parseFloat(vatRate) || 0;
  return roundCurrency(n * (1 + v / 100));
};

// USt-Betrag aus Netto berechnen
const calcUstFromNet = (net, vatRate) => {
  const n = parseFloat(net) || 0;
  const v = parseFloat(vatRate) || 0;
  return roundCurrency(n * v / 100);
};
// ────────────────────────────────────────────────────────────

// Ist die Position rabattfreibetrag-relevant?
const isDiscountRelevant = (methode) => methode === 'rabatt';

// ── getMarketValueSource(w) — Marktwert-Quelle bestimmen (heuristisch)
// Heuristik:
//   'Override'               — w.catOverride===true: Nutzer hat Kategorie manuell überschrieben
//                              (gilt für EAN-Override und Name-Override gleichermaßen)
//   'Manuell gesetzt'        — w.source==='manual': Wert direkt im Formular eingetragen
//   'Kategorie-Referenzwert' — Default: Wert stammt aus GMBH_DEFAULT_MV-Tabelle
const getMarketValueSource = (w) => {
  if (w.methode !== 'marktwert') return '';
  if (w.catOverride === true) return 'Override';
  if (w.source === 'manual') return 'Manuell gesetzt';
  return 'Kategorie-Referenzwert';
};

// ── buildPlausibilityFlags(w) — Plausibilitätsprüfung
// Spec: Marktwert < EK*0.5 → stark auffällig; < EK*0.9 → Warnung; > EK*3 → Warnung
// Gibt { warnung: boolean, hinweis: string } zurück — nie blockierend
const buildPlausibilityFlags = (w) => {
  if (w.methode === 'marktwert' && w.mvWert && w.ekBrutto) {
    const mv = parseFloat(w.mvWert) || 0;
    const ek = parseFloat(w.ekBrutto) || 0;
    if (ek > 0) {
      if (mv < ek * 0.5)
        return { warnung: true, hinweis: 'Marktwert < 50% des EK – bitte pruefen' };
      if (mv < ek * 0.9)
        return { warnung: true, hinweis: 'Marktwert < EK*0.9 – EK+Handling wurde vorgeschlagen' };
      if (mv > ek * 3)
        return { warnung: true, hinweis: 'Marktwert > 3x EK – Plausibilitaetspruefung empfohlen' };
    }
  }
  if (w.methode === 'ek' && w.ekBrutto && (parseFloat(w.vk) || 0) > 0)
    return { warnung: true, hinweis: 'EK+Handling obwohl VK/UVP vorhanden – Warenrabatt-Methode pruefen' };
  return { warnung: false, hinweis: '' };
};

// ── buildEvaluationTrace(w) — Minimaler Bewertungs-Trace für Archiv/Prüfung
// Läuft vollständig im Hintergrund, keine UI-Sichtbarkeit.
// Wird beim Speichern in das Withdrawal-Objekt eingebettet (Feld: evaluationTrace).
// Bei alten Einträgen ohne Trace: defensiver Fallback beim Export.
const buildEvaluationTrace = (w) => {
  const mv  = parseFloat(w.mvWert)    || 0;
  const ek  = parseFloat(w.ekBrutto)  || 0;

  // marketVsEkRatio: nur wenn beide Werte > 0 vorliegen
  const marketVsEkRatio = (w.methode === 'marktwert' && mv > 0 && ek > 0)
    ? Math.round((mv / ek) * 1000) / 1000   // 3 Dezimalstellen, kein Drift
    : null;

  // plausibilityWarning — identische Logik wie buildPlausibilityFlags, kein Code-Drift
  const pf = buildPlausibilityFlags(w);

  // categoryOverrideUsed: TRUE wenn Nutzer Kategorie manuell überschrieben hat
  const categoryOverrideUsed = w.catOverride === true;

  // manuallyModified: TRUE wenn source === 'manual' (Artikel nicht aus Stammdaten)
  // oder wenn Eintrag nachträglich editiert wurde (updatedAt ≠ createdAt)
  const manuallyModified =
    w.source === 'manual' ||
    (w.updatedAt && w.createdAt && w.updatedAt !== w.createdAt);

  return {
    methodChosen:          w.methode || '',
    marketVsEkRatio,
    plausibilityWarning:   pf.warnung,
    plausibilityNote:      pf.warnung ? pf.hinweis : null,
    categoryOverrideUsed,
    manuallyModified:      !!manuallyModified,
    decisionTimestamp:     w.updatedAt || w.createdAt || new Date().toISOString(),
  };
};

// ── getBasisText(w) — Berechnungsbasis als lesbarer Text für PDF-Detailzeile
// Gibt einen kurzen, sachlichen Basis-String zurück
const getBasisText = (w) => {
  const n=v=>{const p=parseFloat(v)||0;return p.toFixed(2);};
  if (w.methode === 'rabatt') {
    return `VK ${n(w.vk)} EUR – MP ${n(w.mp)} EUR`;
  }
  if (w.methode === 'marktwert') {
    const rate = Math.round((parseFloat(w.handlingRate) || 0.15) * 100);
    return `${w.kat || '?'} | ${n(w.mvWert)} EUR/${w.einheit || 'kg'} | ${getMarketValueSource(w)}`;
  }
  if (w.methode === 'ek') {
    const rate = Math.round((parseFloat(w.handlingRate) || 0.15) * 100);
    return `EK ${n(w.ekBrutto)} EUR + ${rate}%`;
  }
  return '';
};

// YTD-Summen je Person und Methode
const buildYtdByPerson = (withdrawals, meals, persons, yr) => {
  return persons.filter(p => p.aktiv).map(p => {
    const pw = withdrawals.filter(w => w.datum?.startsWith(yr) && w.person === p.id);
    const pm = meals.filter(m => m.datum?.startsWith(yr) && m.person === p.id);
    const rabatt = pw.filter(w => w.methode === 'rabatt').reduce((s, w) => s + (w.vorteil || 0), 0);
    const markt  = pw.filter(w => w.methode === 'marktwert').reduce((s, w) => s + (w.vorteil || 0), 0);
    const ek     = pw.filter(w => w.methode === 'ek').reduce((s, w) => s + (w.vorteil || 0), 0);
    const sachbezug = pm.reduce((s, m) => s + (m.vorteil || 0), 0);
    const freibetragRest = Math.max(0, GMBH_RABATT_FREIBETRAG - rabatt);
    return { ...p, rabatt, markt, ek, sachbezug, freibetragRest };
  });
};

// Jahreszähler Warenrabatt PRO PERSON
function gmbhRabattByPerson(withdrawals, persons, yr){
  return persons.filter(p=>p.aktiv).map(p=>{
    const total=withdrawals
      .filter(w=>w.datum.startsWith(yr)&&w.methode==='rabatt'&&w.person===p.id)
      .reduce((s,w)=>s+(w.vorteil||0),0);
    return { ...p, yearRabatt:total, remaining:Math.max(0,GMBH_RABATT_FREIBETRAG-total), exceeded:Math.max(0,total-GMBH_RABATT_FREIBETRAG) };
  });
}
