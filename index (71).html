<script>
// ── SERVICE WORKER ────────────────────────────────────────
if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('/app/sw.js', {scope:'/app/'})
      .then(reg=>{
        console.log('[SW] Registriert:', reg.scope);

        // Update-Check: wenn neue Version verfügbar → Nutzer informieren
        reg.addEventListener('updatefound', ()=>{
          const newWorker = reg.installing;
          newWorker.addEventListener('statechange', ()=>{
            if(newWorker.state === 'installed' && navigator.serviceWorker.controller){
              // Neue Version verfügbar — App-seitigen Update-Banner anzeigen
              window.__swUpdateAvailable = true;
              window.dispatchEvent(new Event('sw-update-available'));
            }
          });
        });
      })
      .catch(err=>console.warn('[SW] Registrierung fehlgeschlagen:', err));

    // Wenn SW die Seite übernimmt, Seite neu laden
    let refreshing = false;
    navigator.serviceWorker.addEventListener('controllerchange', ()=>{
      if(!refreshing){ refreshing=true; window.location.reload(); }
    });
  });
}
</script>

<style>
:root {
  --bg:#f7f9f4; --s1:#ffffff; --s2:#eef3e6; --s3:#e4edda;
  --green:#2d5a1b; --green-l:#4a8a2e; --gruen:#2d5a1b;
  --lime:#a8d060; --lime2:#c8f060; --ld:rgba(168,208,96,0.1); --lm:rgba(168,208,96,0.18);
  --text:#1a2612;
  --t1:#1a2612;        /* Haupttext: fast schwarz-grün, 14:1 auf weiß */
  --t2:#2a4018;        /* Sekundärtext: dunkelgrün, 9:1 auf weiß */
  --t3:#4a6535;        /* Tertiärtext: mittelgrün, 5.5:1 auf weiß – WCAG AA */
  --red:#c0392b; --amber:#d4820a; --blue:#2471a3;
  --border:#d4e4c0; --border2:#b8d49a; --r:14px; --nh:72px;
  --shadow:0 2px 12px rgba(45,90,27,0.07);
  --shadow-lg:0 8px 32px rgba(45,90,27,0.11);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;min-height:100vh;min-height:100dvh;overflow-x:hidden;-webkit-font-smoothing:antialiased;}
#root{max-width:430px;margin:0 auto;min-height:100vh;min-height:100dvh;}
::-webkit-scrollbar{width:2px;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:1px;}

/* NAV */
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;height:var(--nh);background:rgba(247,249,244,0.96);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--border);display:grid;grid-template-columns:repeat(6,1fr);z-index:100;padding-bottom:env(safe-area-inset-bottom,0);}
.nb{border:none;background:none;color:var(--t3);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;font-family:'Plus Jakarta Sans',sans-serif;font-size:9px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;transition:color .2s;padding:8px 4px;position:relative;}
.nb.on{color:var(--green);}
.nb.on::before{content:'';position:absolute;top:0;left:25%;right:25%;height:2px;background:var(--green);border-radius:0 0 2px 2px;}
.nb svg{width:20px;height:20px;stroke-width:1.5;}

/* HEADER */
.hdr{padding:52px 20px 14px;background:linear-gradient(180deg,var(--bg) 70%,transparent 100%);position:sticky;top:0;z-index:50;}
.hdr-eye{font-size:10px;color:var(--t3);letter-spacing:2px;text-transform:uppercase;margin-bottom:4px;font-weight:600;}
.hdr-title{font-family:'Playfair Display',serif;font-size:28px;color:var(--text);line-height:1.1;}
.hdr-title em{color:var(--green-l);font-style:italic;}

/* CONTENT */
.cnt{padding:14px 16px calc(var(--nh) + 20px);}

/* HERO */
.hero{background:var(--green);border-radius:20px;padding:22px;margin-bottom:14px;position:relative;overflow:hidden;}
.hero::after{content:'';position:absolute;top:-50px;right:-50px;width:160px;height:160px;background:radial-gradient(circle,rgba(168,208,96,.15) 0%,transparent 70%);pointer-events:none;}
.hero-lbl{font-size:10px;color:rgba(255,255,255,0.55);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px;font-weight:600;}
.hero-amt{font-family:'Playfair Display',serif;font-size:50px;line-height:1;color:var(--lime2);}
.hero-amt sup{font-size:18px;vertical-align:super;color:rgba(255,255,255,0.6);}
.hero-sub{font-size:11px;color:rgba(255,255,255,0.55);margin-top:6px;line-height:1.5;}
.prog-track{height:5px;background:rgba(255,255,255,0.12);border-radius:3px;margin-top:14px;overflow:hidden;}
.prog-fill{height:100%;border-radius:3px;transition:width .6s cubic-bezier(.34,1.56,.64,1);}
.prog-lbls{display:flex;justify-content:space-between;margin-top:5px;font-size:10px;color:rgba(255,255,255,0.4);}

/* GRID */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
.mc{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;box-shadow:var(--shadow);}
.mc-lbl{font-size:10px;color:var(--t3);letter-spacing:1px;text-transform:uppercase;font-weight:600;}
.mc-val{font-family:'Playfair Display',serif;font-size:22px;color:var(--text);margin-top:4px;font-weight:600;}
.mc-unit{font-size:10px;color:var(--t2);}

/* SEC */
.sec{font-size:10px;color:var(--t2);letter-spacing:2px;text-transform:uppercase;margin:18px 0 10px;font-weight:700;}

/* CARD */
.card{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:12px;box-shadow:var(--shadow);}
.ch{padding:11px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--s2);}
.ch-t{font-size:10px;color:var(--t2);letter-spacing:1.5px;text-transform:uppercase;font-weight:700;}

/* ROW */
.row{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid var(--border);transition:background .15s;}
.row:last-child{border-bottom:none;}
.row:active{background:var(--s2);}
.ri{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;background:var(--s2);}
.rb{flex:1;min-width:0;}
.rn{font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500;}
.rm{font-size:11px;color:var(--t2);margin-top:2px;}
.rr{text-align:right;flex-shrink:0;}
.rv{font-size:13px;color:var(--text);font-weight:600;}
.rs{font-size:10px;color:var(--t2);margin-top:2px;}

/* PILL */
.pill{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:20px;font-size:10px;font-weight:600;}
.pl{background:rgba(45,90,27,0.08);color:var(--green);border:1px solid rgba(45,90,27,0.15);}
.pa{background:rgba(212,130,10,.1);color:var(--amber);border:1px solid rgba(212,130,10,.2);}
.pr{background:rgba(192,57,43,.08);color:var(--red);border:1px solid rgba(192,57,43,.15);}
.pb{background:rgba(36,113,163,.08);color:var(--blue);border:1px solid rgba(36,113,163,.15);}
.pm{background:var(--s2);color:var(--t3);border:1px solid var(--border);}

/* SEARCH */
.sw{position:relative;margin-bottom:14px;}
.si{width:100%;background:var(--s1);border:1.5px solid var(--border);border-radius:var(--r);padding:13px 16px 13px 44px;color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;outline:none;transition:border-color .2s;}
.si:focus{border-color:var(--green);}
.si::placeholder{color:var(--t3);}
.sic{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--t3);}
.sr{background:var(--s1);border:1.5px solid var(--green);border-radius:var(--r);overflow:hidden;margin-top:6px;max-height:300px;overflow-y:auto;box-shadow:var(--shadow-lg);}

/* MODAL */
.mo{position:fixed;top:0;right:0;bottom:0;left:0;background:rgba(26,38,18,.6);display:flex;align-items:flex-end;justify-content:center;z-index:200;animation:fi .2s ease;backdrop-filter:blur(4px);}
@keyframes fi{from{opacity:0}to{opacity:1}}
.md{background:var(--s1);border:1.5px solid var(--border);border-top:none;border-radius:24px 24px 0 0;width:100%;max-width:430px;overflow:hidden;animation:su .3s cubic-bezier(.34,1.2,.64,1);box-shadow:0 -8px 40px rgba(45,90,27,0.1);}
@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
.mh-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:12px auto 0;}
.mh{padding:16px 20px 0;}
.mt{font-family:'Playfair Display',serif;font-size:22px;}
.ms{font-size:11px;color:var(--t2);margin-top:4px;}
.mb{padding:16px 20px 20px;}

/* QTY */
.qr{display:flex;align-items:center;gap:8px;margin-bottom:14px;}
.qb{width:44px;height:44px;border-radius:50%;background:var(--s2);border:1.5px solid var(--border);color:var(--text);font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0;}
.qb:active{background:var(--green);color:#fff;transform:scale(.95);}
.qd{flex:1;min-width:0;text-align:center;background:var(--s2);border:1.5px solid var(--border);border-radius:var(--r);padding:10px 6px;color:var(--text);font-family:'Playfair Display',serif;font-size:26px;outline:none;}
.qu{font-size:12px;color:var(--t2);min-width:36px;text-align:center;}
.wb{background:rgba(45,90,27,0.06);border:1.5px solid rgba(45,90,27,0.12);border-radius:var(--r);padding:16px;text-align:center;margin-bottom:18px;}
.wn{font-family:'Playfair Display',serif;font-size:36px;color:var(--green);}
.wl{font-size:10px;color:var(--t3);margin-top:4px;letter-spacing:1px;text-transform:uppercase;font-weight:600;}

/* BTNS */
.btn{width:100%;padding:15px;border-radius:var(--r);border:none;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;font-weight:600;transition:all .15s;}
.btn:active{transform:scale(.98);}
.btn-l{background:var(--green);color:#fff;box-shadow:0 4px 14px rgba(45,90,27,0.2);}
.btn-l:active{background:var(--green-l);}
.btn-g{background:var(--s2);color:var(--text);border:1.5px solid var(--border);}
.br{display:flex;gap:10px;}
.br .btn{flex:1;}

/* MEALS */
.mg{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.mb2{background:var(--s1);border:1.5px solid var(--border);border-radius:var(--r);padding:14px 8px;display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;transition:all .2s;position:relative;box-shadow:var(--shadow);}
.mb2:active{transform:scale(.97);}
.mb2.on{background:rgba(45,90,27,0.06);border-color:rgba(45,90,27,0.2);}
.mi{display:flex;align-items:center;justify-content:center;height:28px;}
.ml{font-size:11px;color:var(--t2);font-weight:500;}
.mb2.on .ml{color:var(--green);}
.mp{font-size:12px;color:var(--green);font-weight:600;}
.mc2{position:absolute;top:6px;right:6px;width:16px;height:16px;border-radius:50%;background:var(--green);display:flex;align-items:center;justify-content:center;font-size:9px;color:#fff;font-weight:700;}
.streak{display:flex;align-items:center;gap:8px;padding:10px 14px;background:rgba(45,90,27,0.06);border:1px solid rgba(45,90,27,0.12);border-radius:10px;margin-top:10px;font-size:11px;color:var(--green);font-weight:500;}

/* UPLOAD */
.uz{border:2px dashed var(--border);border-radius:var(--r);padding:28px 16px;text-align:center;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;}
.uz:hover{border-color:var(--green);background:rgba(45,90,27,0.04);}
.uz input{position:absolute;top:0;right:0;bottom:0;left:0;opacity:0;cursor:pointer;width:100%;}
.uz-icon{font-size:28px;margin-bottom:8px;}
.uz-title{font-size:13px;margin-bottom:4px;font-weight:500;}
.uz-sub{font-size:11px;color:var(--t3);}

/* REPORT */
.rl{display:flex;justify-content:space-between;align-items:center;padding:11px 16px;border-bottom:1px solid var(--border);font-size:13px;color:var(--text);}
.rl:last-child{border-bottom:none;}
.rtot{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;background:var(--s2);font-family:'Playfair Display',serif;font-size:17px;color:var(--text);font-weight:600;}

/* SAVING */
.sbox{border-radius:var(--r);padding:16px;margin-top:10px;display:flex;align-items:flex-start;gap:12px;}
.sbox-icon{font-size:26px;flex-shrink:0;margin-top:2px;}
.sbox-lbl{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;font-weight:700;}
.sbox-amt{font-family:'Playfair Display',serif;font-size:24px;}
.sbox-note{font-size:11px;color:var(--t3);margin-top:4px;line-height:1.5;}

/* MONTH TABS */
.mtabs{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:14px;}
.mtabs::-webkit-scrollbar{display:none;}
.mtab{flex-shrink:0;padding:6px 14px;border-radius:20px;border:1.5px solid var(--border);background:var(--s1);color:var(--t3);font-family:'Plus Jakarta Sans',sans-serif;font-size:11px;font-weight:600;cursor:pointer;transition:all .15s;white-space:nowrap;}
.mtab.on{background:rgba(45,90,27,0.08);border-color:rgba(45,90,27,0.2);color:var(--green);}

/* EMPTY */
.empty{text-align:center;padding:40px 20px;color:var(--t2);}
.empty-i{font-size:42px;margin-bottom:12px;}
.empty-t{font-family:'Playfair Display',serif;font-size:20px;color:var(--text);margin-bottom:6px;}
.empty-s{font-size:12px;color:var(--t3);line-height:1.6;}

/* TOAST */
.toast{position:fixed;bottom:calc(var(--nh) + 12px);left:50%;transform:translateX(-50%);background:var(--green);color:#fff;padding:10px 20px;border-radius:20px;font-size:12px;font-weight:600;z-index:300;white-space:nowrap;animation:ta 2.8s ease forwards;box-shadow:0 4px 20px rgba(45,90,27,0.35);}
@keyframes ta{0%{opacity:0;transform:translateX(-50%) translateY(8px)}12%{opacity:1;transform:translateX(-50%) translateY(0)}80%{opacity:1}100%{opacity:0}}

/* MISC */
.fav{background:none;border:none;cursor:pointer;font-size:18px;color:var(--t3);padding:4px;transition:color .15s;}
.fav.on{color:var(--amber);}
.del{width:28px;height:28px;border-radius:8px;background:none;border:1.5px solid var(--border);color:var(--t3);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition:all .15s;flex-shrink:0;}
.del:active{background:var(--red);color:#fff;border-color:var(--red);}

.fbar{display:flex;flex-wrap:wrap;gap:5px;margin:6px 0 2px}
.fb{border:1px solid var(--border);border-radius:16px;padding:3px 10px;font-size:11px;cursor:pointer;font-family:inherit;background:var(--card);color:var(--t2);outline:none}
.fb-on,.fb:active{background:var(--lime);color:#fff;border-color:var(--lime)}
.fb-ct{font-size:11px;color:var(--t3);margin-left:auto;align-self:center}

<script>
// ── PWA Install Prompt (Android Chrome) ────────────────────
let _deferredInstallPrompt = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  _deferredInstallPrompt = e;
  window.dispatchEvent(new CustomEvent('pwa-installable'));
});
window.addEventListener('appinstalled', () => {
  _deferredInstallPrompt = null;
  window.dispatchEvent(new CustomEvent('pwa-installed'));
});
window._triggerInstall = async () => {
  if (!_deferredInstallPrompt) return false;
  _deferredInstallPrompt.prompt();
  const { outcome } = await _deferredInstallPrompt.userChoice;
  _deferredInstallPrompt = null;
  return outcome === 'accepted';

// ── PARSERS
// BNN-Dateien sind typischerweise CP850/ISO-8859-1 kodiert
// Einlesen mit korrektem Encoding direkt beim File-Read (im ImportTab)

function parseBNN(text) {
  // Standard BNN Format: EINE Zeile pro Artikel (Semikolon-getrennt)
  // ── KATEGORIE ERKENNUNG (keyword-basiert aus Artikelname) ──
  const KATMAP=[
    ['Tiefkühl',        ['tk ','> tk','>  tk','tk-','tiefkühl','gefroren']],
    ['Getränke',        ['wasser','quell','ltr','limonade','limo ','cola','bier','wein ','sekt','prosecco','kaffee','tee ','tee,','kakao','smoothie','kombucha','energy','saft','nektar','sprudel','charitea','biozisch','lammsbru','adelholzener','ostmost']],
    ['Fleisch & Wurst', ['wurst','fleisch','schinken','leberwurst','aufschnitt','salami','lyoner','frankfurter','wiener','geflügel','pute','hähnchen','rind','schwein','lamm']],
    ['Milchprodukte',   ['milch','joghurt','quark','butter','käse','gouda','sahne','rahm','frischkäse','mozzarella','parmesan','emmental','brie']],
    ['Getreide & Brot', ['mehl','dinkel','hafer','roggen','weizen','gerste','hirse','buchweizen','amaranth','quinoa','haferflocken','müsli','granola','krunchy','brot','brötchen','vollkorn','knäcke','cracker']],
    ['Nudeln & Reis',   ['pasta','nudel','spaghetti','penne','linguine','tagliatelle','reis ','reis,','reisnudel','couscous','bulgur','gnocchi']],
    ['Öle & Fette',     ['olivenöl','olivenl','rapsöl','kokosöl','sonnenblumenöl','leinöl',' öl ','öl,','margarine','ghee']],
    ['Gemüse',          ['tomate','passata','karotte','paprika','zucchini','spinat','kohl','brokkoli','erbsen','bohnen','linsen','kichererbsen','mais','rübe','kürbis','lauch','zwiebel','knoblauch','harissa','peperoni','antipasti']],
    ['Obst',            ['apfel','birne','banane','erdbeere','himbeere','heidelbeere','kirsche','pflaume','mango','ananas','fruchtmus','marmelade','konfitüre','feige','dattel','rosine','cranberry']],
    ['Gewürze & Saucen',['pfeffer',' salz','salz,','gewürz','kräuter','basilikum','oregano','thymian','rosmarin','kurkuma','ingwer','senf','ketchup','essig','soße','sauce','würze','tamari','shoyu','miso']],
    ['Süßes & Snacks',  ['schoko','schokolade','riegel','keks','gebäck','waffel','bonbon','chips','nuss','mandel','cashew','erdnuss','paranüsse','trockenfrüchte','honig','sirup','agavendicksaft','mus,','mus ']],
    ['Tofu & Proteine', ['tofu','tempeh','seitan','lupine','erbsenprotein','vegane','vegan','pflanzlich']],
    ['Drogerie',        ['shampoo','duschgel','seife','zahnpasta','lotion','deo ','windel','taschentuch','toilettenpapier','waschmittel','spülmittel']],
  ];
  const detectKategorie=name=>{
    const n=(name||'').toLowerCase();
    for(const[kat,kws]of KATMAP){if(kws.some(kw=>n.includes(kw)))return kat;}
    return '';
  };

  // Feld[0]  = Artikelnummer (4-10 Stellen)
  // Feld[1]  = Status ('A' = aktiv)
  // Feld[6]  = Artikelname
  // Feld[10] = Lieferantenkürzel (RPQ, ADH, ALS, ...)
  // Feld[21] = VPE-Bezeichnung (z.B. '20 FL', '6 LT')
  // Feld[23] = VPE-Einheit (FL, LT, KG, ...)
  // Feld[33] = MwSt-Code: '1'=7%, '2'=19%
  // Feld[35] = EK-Preis Einzeln (bevorzugt, kann 0 sein)
  // Feld[37] = EK-Preis alternativ (Fallback wenn [35]=0)

  const arts=[];
  const diag={lines:0,blocks:0,noName:0,noPrice:0,ok:0,firstLines:[]};
  const lines=text.split('\n').map(l=>l.trim()).filter(Boolean);
  diag.lines=lines.length;
  diag.firstLines=lines.slice(0,3);

  // Format-Erkennung: Erste Zeile muss mit "BNN" beginnen (BNN3-Standard)
  // Andere Formate (Bestellavis .000, Fixbreite etc.) werden abgelehnt
  const firstLine=lines[0]||'';
  const isBNN3=firstLine.startsWith('BNN')||firstLine.replace(/^"|"$/g,'').startsWith('BNN');
  if(!isBNN3){
    diag.formatError=`Unbekanntes Format – erste Zeile: "${firstLine.slice(0,40)}". Nur BNN3-Preislisten werden unterstützt.`;
    arts._diag=diag;
    return arts;
  }

  const parseP=s=>{try{const v=parseFloat((s||'').replace(',','.'));return isNaN(v)?0:v;}catch{return 0;}};

  for(const l of lines){
    // Gequotetes CSV (z.B. Biogarten): Felder sind in "..." eingeschlossen
    const hasQuotes=l.includes('"');
    let f;
    if(hasQuotes){
      // Einfacher De-Quoter: entferne führende/nachfolgende Anführungszeichen pro Feld
      f=l.split(';').map(s=>s.trim().replace(/^"|"$/g,''));
    } else {
      f=l.split(';');
    }
    if(f.length<37) continue;
    const id=f[0].trim();
    if(!/^[A-Za-z0-9][-A-Za-z0-9]{2,12}$/.test(id)&&!/^\d{4,10}$/.test(id)) continue;
    if(f[1]==='L') continue; // gelöschte Artikel überspringen (BNN3: L=gelöscht, leer oder A=aktiv)

    const name=normUml(f[6].trim());
    if(!name||name.length<2){diag.noName++;continue;}

    // MwSt: 1=7% (Lebensmittel), 2=19% (Getränke/Sonstiges)
    const mwst=f[33].trim()==='1'?7:19;

    // EK-Preis: Feld[37] = EK (Einkaufspreis netto)
    // Feld[35]/[36] = VK (Verbraucherpreis) – f[36] als uvp für GmbH-Modus verwenden
    let preis=parseP(f[37]);
    if(preis<=0) preis=parseP(f[35]); // Fallback falls [37] leer
    if(preis<=0){diag.noPrice++;continue;}

    // Lieferant & Marke
    const liefKuerzel=f[10].trim()||'';
    const marke=normUml(LIEF_LOOKUP[liefKuerzel]||liefKuerzel||'');

    // Einheit: VPE-String bevorzugen, außer bei "N x Xunit"-Format → dann f[23]
    const vpe=f[21].trim()||'';
    const einh=f[23].trim()||'Stk';
    // Format wie "6 x 500g" oder "24 x 0,33l" → f[23] direkt verwenden
    const vpeIsXFormat=/^\d+\s*x\s*/i.test(vpe);
    // Format wie "12 FL" (Gebindegröße ohne x) → nur Einheitscode f[23] verwenden
    const vpeIsCountUnit=/^\d+\s+[A-Za-z]{1,5}$/.test(vpe);
    const einheit=(!vpe||vpeIsXFormat||vpeIsCountUnit)?einh:vpe;

    // Preis normalisieren: "25 kg" → Preis/25 pro kg, "5 Ltr" → Preis/5 pro Ltr etc.
    // Nur bei Gewicht/Volumen mit Menge > 1 (nicht bei "1 kg", "1 Ltr")
    // Preis normalisieren NUR wenn f[21] x-Format hatte ("1x25 kg") → Preis ist Sackpreis
    // Bei Terra: f[21]="25 KG" → kein x-Format → Preis bleibt pro kg, keine Division
    const NORM_UNITS={KG:'kg',LT:'Ltr.',LTR:'Ltr.',L:'Ltr.'};
    let finalPreis=preis;
    let finalEinheit=einheit;
    if(vpeIsXFormat){
      const normM=einheit.match(/^(\d+[,.]?\d*)\s*([A-Za-z]+)$/);
      if(normM){
        const menge=parseFloat(normM[1].replace(',','.'));
        const unit=normM[2].toUpperCase();
        if(NORM_UNITS[unit]&&menge>1){
          finalPreis=Math.round(preis/menge*100)/100;
          finalEinheit=NORM_UNITS[unit];
        } else if(NORM_UNITS[unit]){
          finalEinheit=NORM_UNITS[unit];
        }
      }
    }

    // EAN-Codes: Feld[4] = EAN Einzelstück, Feld[5] = EAN Gebinde
    const ean1=(f[4]||'').trim();
    const ean2=(f[5]||'').trim();
    const eans=[ean1,ean2].filter(e=>/^\d{8,14}$/.test(e));

    // Kategorie aus Artikelname ableiten (BNN-Felder enthalten keine Kategorietexte)
    const kat=detectKategorie(name);
    arts.push({id,name,einheit:finalEinheit,preis:finalPreis,mwst,liefKuerzel,marke,quelle:'BNN',eans,kategorie:kat,
      uvp:(parseP(f[36])>0&&parseP(f[36])!==finalPreis)?Math.round(parseP(f[36])*100)/100:null
    });
    diag.ok++;
  }

  diag.blocks=diag.ok; // für Diagnose: Blöcke = gefundene Artikel
  arts._diag=diag;
  return arts;
}
function parseXLSX(buf){
  const wb=XLSX.read(buf,{type:'array'});
  // Alle Sheets durchsuchen – manche Dateien haben Daten in sheet2
  let rows=[];
  for(const sname of wb.SheetNames){
    const ws=wb.Sheets[sname];
    const r=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
    if(r.length>rows.length) rows=r;
  }
  const arts=[];
  let hi=-1,c={name:-1,preis:-1,kilopreis:-1,gebinde:-1,einheit:-1,mwst:-1,nr:-1};
  // Header in ersten 15 Zeilen suchen
  for(let i=0;i<Math.min(rows.length,15);i++){
    const r=rows[i];
    if(!r||!r.length) continue;
    const s=r.map(x=>String(x||'')).join(' ').toLowerCase();
    if((s.includes('bezeichn')||s.includes('artikel')||s.includes('produkt'))&&r.filter(x=>String(x||'').trim()).length>=3){
      hi=i;
      r.forEach((x,j)=>{const v=String(x||'').toLowerCase().replace(/[\r\n]+/g,' ');
        if((v.includes('bezeichn')||v.includes('produkt'))&&c.name===-1) c.name=j;
        if(v.includes('kilopreis')||v.includes('kilo-preis')) c.kilopreis=j;
        if((v.includes('einzel')&&v.includes('preis'))&&c.preis===-1) c.preis=j;
        if((v.includes('preis')||v.includes('vk'))&&c.preis===-1&&c.kilopreis===-1) c.preis=j;
        if(v.includes('gebinde')&&!v.includes('preis')&&!v.includes('ean')) c.gebinde=j;
        if(v.includes('einheit')||v.includes('vpe')) c.einheit=j;
        if(v.includes('mwst')||v.includes('ust')) c.mwst=j;
        if((v.includes('art')&&v.includes('nr'))||v==='art.-nr.'||(v.includes('nummer')&&!v.includes('einheit'))) c.nr=j;
      });
      break;
    }
  }
  if(hi===-1) return arts;
  // Preisspalte: Kilopreis hat Vorrang (Unverpackt-Format)
  const preisCol=c.kilopreis>=0?c.kilopreis:c.preis;
  for(let i=hi+1;i<rows.length;i++){
    const r=rows[i];
    if(!r||!r.length) continue;
    const name=c.name>=0?String(r[c.name]||'').trim():'';
    if(!name||name.length<2) continue;
    // Kategoriezeilen überspringen (kein Preis, kein Nr, nur Name)
    const preis=parseFloat(String(r[preisCol]||'').replace(',','.'));
    if(isNaN(preis)||preis<=0) continue;
    // Einheit: aus Einheit-Spalte, sonst aus Gebinde-Spalte parsen
    let einheit='Stk';
    if(c.einheit>=0&&r[c.einheit]) einheit=String(r[c.einheit]).trim();
    else if(c.gebinde>=0&&r[c.gebinde]){
      const geb=String(r[c.gebinde]).trim();
      // "1 x 8kg" → "8kg", "6 x 250g" → "250g", "12 x 0,33l" → "0,33l"
      const xm=geb.match(/^\d+\s*x\s*(.+)$/i);
      einheit=xm?xm[1].trim():geb;
    }
    const mr=c.mwst>=0?r[c.mwst]:null;
    const mwst=mr?(parseFloat(String(mr))<=7?7:19):7;
    const id=c.nr>=0&&r[c.nr]?String(r[c.nr]).trim():String(i);
    arts.push({id,name,einheit,preis:Math.round(preis*100)/100,mwst,quelle:'XLSX'});
  }
  return arts;
}

function parseCSV(text) {
  // Auto-detect Separator: Semikolon, Komma oder Tab
  const firstLine = text.split('\n')[0] || '';
  const sep = firstLine.includes(';') ? ';' : firstLine.includes('\t') ? '\t' : ',';

  // Zeilen parsen, leere überspringen
  const rows = text.split('\n')
    .map(l => l.trim().replace(/\r$/, ''))
    .filter(Boolean)
    .map(l => l.split(sep).map(c => c.trim().replace(/^["']|["']$/g, '')));

  if (rows.length < 2) return [];

  // Header-Zeile finden (erste Zeile mit erkennbaren Spaltennamen)
  let hi = -1;
  let cols = { name: -1, preis: -1, einheit: -1, mwst: -1, nr: -1 };

  for (let i = 0; i < Math.min(rows.length, 5); i++) {
    const r = rows[i];
    const joined = r.join(' ').toLowerCase();
    if (joined.includes('bezeichn') || joined.includes('artikel') ||
        joined.includes('name') || joined.includes('produkt') ||
        joined.includes('beschreib')) {
      hi = i;
      r.forEach((x, j) => {
        const v = x.toLowerCase();
        if (v.includes('bezeichn') || v.includes('name') || v.includes('produkt') || v.includes('beschreib')) cols.name = j;
        if ((v.includes('preis') || v.includes('ek') || v.includes('vk') || v.includes('brutto') || v.includes('netto')) && cols.preis === -1) cols.preis = j;
        if (v.includes('einheit') || v.includes('vpe') || v.includes('gebinde')) cols.einheit = j;
        if (v.includes('mwst') || v.includes('ust') || v.includes('steuer')) cols.mwst = j;
        if ((v.includes('nr') || v.includes('nummer') || v.includes('art.')) && !v.includes('einheit')) cols.nr = j;
      });
      break;
    }
  }

  // Kein Header gefunden → erste Zeile als Daten behandeln, Spalten raten
  if (hi === -1) {
    hi = -1; // ab Zeile 0 lesen
    // Heuristik: längste String-Spalte = Name, erste Nummer-Spalte = Preis
    const sample = rows[0];
    sample.forEach((v, j) => {
      const n = parseFloat(v.replace(',', '.'));
      if (isNaN(n) && v.length > 3 && cols.name === -1) cols.name = j;
      if (!isNaN(n) && n > 0 && cols.preis === -1) cols.preis = j;
    });
  }

  if (cols.name === -1 || cols.preis === -1) return [];

  const arts = [];
  const parseP = s => { try { const v = parseFloat((s || '').replace(',', '.')); return isNaN(v) ? 0 : v; } catch { return 0; } };

  for (let i = hi + 1; i < rows.length; i++) {
    const r = rows[i];
    if (!r || r.length < 2) continue;
    const name = (r[cols.name] || '').trim();
    if (!name || name.length < 2) continue;
    const preis = parseP(r[cols.preis] || '');
    if (preis <= 0) continue;
    const einheit = cols.einheit >= 0 ? (r[cols.einheit] || 'Stk').trim() : 'Stk';
    const mwstRaw = cols.mwst >= 0 ? parseP(r[cols.mwst]) : 7;
    const mwst = mwstRaw <= 7 ? 7 : 19;
    const id = cols.nr >= 0 ? String(r[cols.nr] || i) : String(i);
    arts.push({ id, name, einheit, preis: Math.round(preis * 100) / 100, mwst, quelle: 'CSV' });
  }
  return arts;
}

// iOS: window.open für PDFs, a.click() für CSV/JSON funktioniert in Chrome
function triggerDownload(blob,filename){
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download=filename;
  a.rel='noopener';
  document.body.appendChild(a);
  a.click();
  // Cleanup: kurz warten damit Android Zeit hat den Download zu starten
  setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(url);},2000);
}

const dispEinh=e=>{
  e=e||'';
  const EM={'FL':'Fl.','LT':'Ltr.','LI':'Ltr.','L':'Ltr.','LTR':'Ltr.','KG':'kg','G':'g','GR':'g','ST':'Stk','STK':'Stk','ML':'ml','PC':'Stk','PAK':'Pak.','BTL':'Btl.'};
  if(/^[A-Za-z.]+$/.test(e)) return EM[e.toUpperCase()]||e;
  const m=e.match(/^(\d+[,.]?\d*)\s*([A-Za-z]+)$/);
  if(m){const unit=m[2].toUpperCase(),pretty=EM[unit]||m[2];
    if(['KG','G','GR','LT','LTR','L','ML'].includes(unit)) return pretty;
    return parseFloat(m[1].replace(',','.'))==1?pretty:`${m[1]} ${pretty}`;}
  return e;
};

function useSt(key,init){
  const[v,set]=useState(()=>{try{const s=localStorage.getItem(key);if(s)return JSON.parse(s);if(key==='gt_arts')return DEMO;return init;}catch{return init;}});
  const setAndSave=React.useCallback(updater=>{
    set(prev=>{
      const next=typeof updater==='function'?updater(prev):updater;
      try{localStorage.setItem(key,JSON.stringify(next));}
      catch(e){if(e.name==='QuotaExceededError'||e.code===22||e.code===1014)window.dispatchEvent(new CustomEvent('storage-full'));}
      return next;
    });
  },[key]);
  return[v,setAndSave];
}

  // ── GLOBAL TOOLTIP ─────────────────────────────────────────────
  // Rendered directly on document.body via ReactDOM.createPortal

  function Tooltip({text}){
    const[show,setShow]=React.useState(false);
    const[pos,setPos]=React.useState({top:0,left:0,tri:20});
    const btnRef=React.useRef(null);
    const popW=220;

    React.useEffect(()=>{
      if(!show)return;
      const hide=()=>setShow(false);
      // Schließt bei Scroll ODER Tap außerhalb
      window.addEventListener('scroll',hide,{passive:true,capture:true});
      window.addEventListener('touchstart',hide,{passive:true,capture:true});
      return()=>{
        window.removeEventListener('scroll',hide,{capture:true});
        window.removeEventListener('touchstart',hide,{capture:true});
      };
    },[show]);

    const open=e=>{
      e.stopPropagation();
      e.preventDefault();
      if(btnRef.current){
        const r=btnRef.current.getBoundingClientRect();
        const left=Math.max(12,Math.min(r.left+r.width/2-popW/2,window.innerWidth-popW-12));
        const tri=Math.max(14,Math.min(r.left+r.width/2-left-5,popW-28));
        setPos({top:r.top,left,tri});
      }
      setShow(s=>!s);
    };

    const popup=show&&ReactDOM.createPortal(
      <>
        <div onTouchStart={e=>{e.stopPropagation();setShow(false);}} onClick={()=>setShow(false)}
          style={{position:'fixed',top:0,right:0,bottom:0,left:0,zIndex:9998,background:'transparent'}}/>
        <div style={{
          position:'fixed',
          top:pos.top-12,
          left:pos.left,
          transform:'translateY(-100%)',
          zIndex:9999,
          background:'#1e3212',
          color:'#fff',
          borderRadius:12,
          padding:'11px 15px',
          fontSize:13,
          fontWeight:400,
          lineHeight:1.55,
          letterSpacing:'normal',
          textTransform:'none',
          width:popW,
          maxWidth:'calc(100vw - 24px)',

          pointerEvents:'none',
          animation:'ttIn .15s ease-out',
        }}>
          {text}
          <div style={{position:'absolute',bottom:-6,left:pos.tri,
            width:12,height:7,
            background:'#1e3212',
            clipPath:'polygon(0 0,100% 0,50% 100%)'}}/>
        </div>
      </>,
      document.body
    );

    return(
      <span style={{display:'inline-flex',alignItems:'center',marginLeft:4,verticalAlign:'middle'}}>
        <button
          ref={btnRef}
          onTouchEnd={open}
          onClick={open}
          style={{
            background:'none',

            width:36,
            height:36,
            cursor:'pointer',
            padding:0,
            display:'inline-flex',
            alignItems:'center',
            justifyContent:'center',

            touchAction:'manipulation',
          }}
        >
          <span style={{
            width:18,height:18,borderRadius:'50%',
            border:'1.5px solid #888',
            display:'inline-flex',alignItems:'center',justifyContent:'center',

            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
              <circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/>

    }
    const status=r.status;
    const ct=r.headers.get('content-type')||'';
    let text='';

      return{ok:false,error:'Antwort nicht lesbar (HTTP '+status+')',status};
    }
    console.debug('[apiCall]',action,'→ HTTP',status,'CT:',ct,'Body:',text.slice(0,200));
    if(ct.includes('json')||/^\s*[{[]/.test(text)){
      try{
        const j=JSON.parse(text);

      }
    }
    // PHP Warning, HTML-Fehlerseite, Cloudflare-Block, etc.
    console.error('[apiCall] Kein JSON (HTTP '+status+', '+ct+'):\n'+text.slice(0,400));

  // ── SYNC PULL (Daten laden)
  // force=true → vollständiger Überschreib-Modus (nur bei explizitem Benutzer-Wunsch)
  // force=false (Standard) → Merge-Modus: vorhandene lokale Einträge bleiben erhalten,
  //   nur vom Server neue Einträge werden hinzugefügt – verhindert Datenverlust
  //   wenn lokale Änderungen noch nicht gepusht wurden (z.B. neues Gerät eingeloggt)
  const syncPull=async(token=authToken, force=false)=>{
    if(!token)return false;
    setSyncStatus('syncing');
    try{
      const j=await apiCall('pull',{token});
      if(j.ok&&j.data){
        const d=j.data;
        const remoteTs=d.ts?new Date(d.ts).getTime():0;
        const localPushStr=localStorage.getItem('gt_sync_pushed_at');
        const localPushedAt=localPushStr?new Date(localPushStr).getTime():0;
        // "lokal leer" = keine Einträge (Artikelimport zählt nicht als Nutzdaten)
        const localEmpty=!ents.length&&!meals.length&&!gmbhMeals.length&&!gmbhWithdrawals.length;
        // Daten laden wenn: erzwungen, lokal leer, noch nie gepusht, oder Server deutlich neuer
        const shouldLoad=force||localEmpty||!localPushStr||remoteTs>localPushedAt+5000;
        let loadedCount=0;
        if(shouldLoad){
          if(force||localEmpty){
            // Vollständiger Restore: Gerät hat keine Einträge ODER User hat explizit angefordert
            if(d.ents?.length){setEnts(d.ents);loadedCount+=d.ents.length;}
            if(d.meals?.length){setMeals(d.meals);loadedCount+=d.meals.length;}
            if(d.gmbhMeals?.length){setGmbhMeals(d.gmbhMeals);loadedCount+=d.gmbhMeals.length;}
            if(d.gmbhWithdrawals?.length){setGmbhWithdrawals(d.gmbhWithdrawals);loadedCount+=d.gmbhWithdrawals.length;}
          } else {
            // Merge-Modus: nur Einträge hinzufügen die lokal noch nicht vorhanden sind
            // → lokale Einträge die noch nicht gepusht wurden bleiben ERHALTEN
            if(d.ents?.length){setEnts(prev=>{const ids=new Set(prev.map(e=>e.id));const neu=d.ents.filter(e=>!ids.has(e.id));if(!neu.length)return prev;loadedCount+=neu.length;return[...neu,...prev];});}
            if(d.meals?.length){setMeals(prev=>{const ids=new Set(prev.map(m=>m.id));const neu=d.meals.filter(m=>!ids.has(m.id));if(!neu.length)return prev;loadedCount+=neu.length;return[...neu,...prev];});}
            if(d.gmbhMeals?.length){setGmbhMeals(prev=>{const ids=new Set(prev.map(m=>m.id));const neu=d.gmbhMeals.filter(m=>!ids.has(m.id));if(!neu.length)return prev;loadedCount+=neu.length;return[...neu,...prev];});}
            if(d.gmbhWithdrawals?.length){setGmbhWithdrawals(prev=>{const ids=new Set(prev.map(w=>w.id));const neu=d.gmbhWithdrawals.filter(w=>!ids.has(w.id));if(!neu.length)return prev;loadedCount+=neu.length;return[...neu,...prev];});}
          }
          // Einstellungen: immer vom Server übernehmen (kein Datenverlust-Risiko)
          if(d.hh)setHH(d.hh);
          if(d.favs?.length)setFavs(d.favs);
          if(d.periodDay&&d.periodDay!==1)setPeriodDay(d.periodDay);
          if(d.gmbhPersons?.length)setGmbhPersons(d.gmbhPersons);
          if(d.rechtsform)setRechtsform(d.rechtsform);
        }
        const ts=new Date().toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'});
        setSyncLastAt(ts);
        localStorage.setItem('gt_sync_last',ts);
        setSyncStatus('ok');
        setSyncMsg({type:'ok',text:loadedCount>0?`✓ Synchronisiert – ${loadedCount} Einträge geladen`:`✓ Daten aktuell (${ts})`});
        setTimeout(()=>setSyncStatus('idle'),3000);
        setTimeout(()=>setSyncMsg(null),4000);
        return true;
      } else if(j.empty){
        setSyncStatus('idle');
        return false;
      } else {
        if(j.error?.includes('abgelaufen'))doLogout(false);
        setSyncStatus('error');
        setSyncMsg({type:'err',text:'✗ Fehler beim Herunterladen'});
        setTimeout(()=>setSyncMsg(null),4000);
        return false;
      }
    }catch(e){setSyncStatus('error');setSyncMsg({type:'err',text:'✗ Fehler beim Herunterladen'});setTimeout(()=>setSyncMsg(null),4000);console.error('Sync pull:',e);return false;}
  };

  // ── AUTH: Login
  const doLogin=async()=>{
    const email=authInputEmail.trim().toLowerCase();
    const pin=authInputPin.trim();
    if(!email||!pin){setAuthMsg('E-Mail und PIN eingeben');return;}
    setAuthLoading(true);setAuthMsg('');
    try{
      const j=await apiCall('login',{email,pin});
      if(j.ok){
        setAuthEmail(email);setAuthToken(j.token);
        localStorage.setItem('gt_auth_email',email);
        localStorage.setItem('gt_auth_token',j.token);
        setAuthInputPin('');setAuthMsg('');
        // Pull nach Login
        const had=await syncPull(j.token);
        if(!had)await syncPush(j.token);
        setShowSyncModal(false);
        showT('✓ Eingeloggt als '+email);
      } else {
        setAuthMsg(j.error||'Fehler beim Login');
      }
    }catch(e){
      const detail=e?.error||e?.message||'Verbindungsfehler';
      const extra=e?.status?' (HTTP '+e.status+')':'';
      setAuthMsg(detail+extra);
      console.error('[doLogin]',e);
    }
    setAuthLoading(false);
  };

  // ── AUTH: Registrierung
  const doRegister=async()=>{
    const email=authInputEmail.trim().toLowerCase();
    const pin=authInputPin.trim();
    const pin2=authInputPin2.trim();
    if(!email||!pin){setAuthMsg('E-Mail und PIN eingeben');return;}
    if(pin!==pin2){setAuthMsg('PINs stimmen nicht überein');return;}
    if(pin.length<4){setAuthMsg('PIN mindestens 4 Zeichen');return;}
    setAuthLoading(true);setAuthMsg('');
    try{
      const j=await apiCall('register',{email,pin});
      if(j.ok){
        setAuthView('register_done');
        setAuthMsg('Bestätigungsmail gesendet! Bitte prüfe dein Postfach.');
      } else {
        setAuthMsg(j.error||'Fehler bei der Registrierung');
      }
    }catch{setAuthMsg('Verbindungsfehler');}
    setAuthLoading(false);
  };

  // ── AUTH: PIN-Reset anfordern

    const email=authInputEmail.trim().toLowerCase();
    if(!email){setAuthMsg('E-Mail eingeben');return;}

    try{
      const j=await apiCall('reset_req',{email});
      if(j.ok){setAuthView('reset_done');setAuthMsg(j.message||'Mail gesendet');}
      else setAuthMsg(j.error||'Fehler');

    setAuthLoading(false);

  // ── AUTO-SYNC ────────────────────────────────────────────
  // Pull beim App-Start (token aus localStorage)
  useEffect(()=>{

    // URL-Parameter nach E-Mail-Bestätigung verarbeiten
    const params=new URLSearchParams(window.location.search);
    if(params.get('verified')==='1'&&params.get('token')&&params.get('email')){
      const tok=params.get('token');
      const em=params.get('email');
      setAuthEmail(em);setAuthToken(tok);
      localStorage.setItem('gt_auth_email',em);
      localStorage.setItem('gt_auth_token',tok);
      syncPull(tok).then(had=>{if(!had)syncPush(tok);});
      window.history.replaceState({},'','/');
      showT('✓ E-Mail bestätigt – willkommen!');
    }
    // PIN-Reset-Link aus URL
    if(params.get('reset')&&params.get('email')){
      setAuthView('reset_do');
      setAuthInputEmail(params.get('email'));
      localStorage.setItem('gt_pending_reset_code',params.get('reset'));
      setShowSyncModal(true);
      window.history.replaceState({},'','/');
    }
  },[]);

  // Debounced Push bei Datenänderungen
  useEffect(()=>{

    return()=>clearTimeout(t);
  },[arts,ents,meals,hh,favs,gmbhWithdrawals,gmbhMeals,gmbhPersons,authToken]);

  // Periodischer Push alle 5 Minuten
  useEffect(()=>{

    return()=>clearInterval(iv);
  },[authToken]);
  // ──────────────────────────────────────────────────────────

  const[modal,setModal]=useState(null);

  // ── FEEDBACK ──────────────────────────────────────────────
  const sendFeedback=()=>{
    const subject=encodeURIComponent('Warenentnahme App – Feedback');

    const body=encodeURIComponent(
      `Hallo,\n\nhier ist mein Feedback zur Warenentnahme App:\n\n` +
      `---\n` +
      `(Mein Feedback)\n\n\n` +
      `---\n` +
      `App-Version: 1.1-beta\n` +
      `Artikel: ${arts_count}, Einträge: ${ents_count}\n` +
      `Gerät: ${navigator.userAgent.slice(0,60)}\n`

    window.location.href=`mailto:hallo@warenentnahme.de?subject=${subject}&body=${body}`;

  // ──────────────────────────────────────────────────────────
  const[editTarget,setEditTarget]=useState(null); // id des Eintrags der bearbeitet wird

  // EAN → Artikel Lookup-Index
  const eanIndex=useMemo(()=>{

  const now=new Date(),cm=mKey(now),cd=dKey(now);

    const end=new Date(start.getFullYear(),start.getMonth()+1,d-1);
    const dStr=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;

  const[lastPeriodKey,setLastPeriodKey]=useSt('gt_lastPeriod','');

  const tm=useMemo(()=>roundCurrency(mm.reduce((s,m)=>s+m.wert,0)),[mm]);
  const periodEnts=me; // alias
  const today=useMemo(()=>ents.filter(e=>e.datum.startsWith(cd)),[ents,cd]);
  const todayM=useMemo(()=>meals.filter(m=>m.datum===cd),[meals,cd]);



// ── TAB-NAVIGATION
  const TABS = rechtsform==='gmbh'
    ? [['home','Übersicht',Ic.home],['meals','Mahlzeiten',Ic.fork],['add','Mitnahmen',Ic.plus],['scan','Scan',Ic.scan],['report','Bericht',Ic.chart],['settings','Einstellungen',Ic.cog],['import','Import',Ic.up]]
    : [['home','Abrechnung',Ic.home],['meals','Essen',Ic.fork],['scan','Scan',Ic.scan],['add','Erfassen',Ic.plus],['report','Bericht',Ic.chart],['import','Import',Ic.cog]];

  const[showInstall,setShowInstall]=useSt('gt_install_shown',false);

  // SW Update-Event abhören
  useEffect(()=>{

    window.addEventListener('sw-update-available',handler);

    return()=>window.removeEventListener('sw-update-available',handler);
  },[]);

  // ── ONBOARDING ──────────────────────────────────────────
  const[onbStep,setOnbStep]=useState(()=>{
    const done=localStorage.getItem('gt_onb_done');
    return (!done)?0:-1;
  });
  // rechtsform: 'eu' = Einzelunternehmen/PG, 'gmbh' = GmbH/UG
  const[rechtsform,setRechtsform]=useSt('gt_rechtsform','eu');

  const[gmbhPersons,setGmbhPersons]=useSt('gmbh_persons',[{id:'gf1',name:'Gesellschafter-Geschäftsführer',aktiv:true}]);
  const[pendingGmbhArt,setPendingGmbhArt]=useState(null);
  // Migration: gmbh_firma wurde früher als raw string gespeichert, jetzt als JSON
  // Einmalig beim ersten Laden konvertieren, damit useSt es lesen kann
  try{const _f=localStorage.getItem('gmbh_firma');if(_f&&!_f.startsWith('"'))localStorage.setItem('gmbh_firma',JSON.stringify(_f));}catch{}
  const[gmbhFirma,setGmbhFirma]=useSt('gmbh_firma','');
  const[gmbhPeriodDay,setGmbhPeriodDay]=useSt('gmbh_periodDay',20);

  // ────────────────────────────────────────────────────────

  // ──────────────────────────────────────────────────────
  const isIOS2=/iPhone|iPad|iPod/.test(navigator.userAgent);

    {newPeriodBanner&&<div style={{position:'fixed',top:0,left:0,right:0,zIndex:200,background:'var(--amber)',color:'#fff',padding:'12px 16px',display:'flex',alignItems:'center',gap:10,fontSize:13,fontWeight:500,boxShadow:'0 2px 8px rgba(0,0,0,.2)'}}>
      <span style={{flex:1}}>🗓 Neue Abrechnungsperiode! Bitte das PDF der letzten Periode exportieren und speichern.</span>
      <button onClick={()=>setNewPeriodBanner(false)} style={{background:'rgba(0,0,0,.2)',border:'none',color:'#fff',borderRadius:6,padding:'4px 10px',fontSize:12,cursor:'pointer',fontFamily:'inherit'}}>OK</button>
    </div>}
    {toast&&<div className="toast">{toast}</div>}
    {undoEnt&&<div style={{position:'fixed',bottom:'calc(var(--nh) + 12px)',left:'50%',transform:'translateX(-50%)',
      background:'var(--text)',color:'#fff',padding:'10px 14px',borderRadius:16,zIndex:300,
      display:'flex',alignItems:'center',gap:12,boxShadow:'0 4px 20px rgba(0,0,0,0.25)',whiteSpace:'nowrap',fontSize:12}}>
      <span style={{fontWeight:500}}>{undoEnt.entry.name} gelöscht</span>
      <button onClick={cancelDelEnt} style={{background:'var(--lime)',color:'var(--green)',border:'none',
        borderRadius:10,padding:'5px 12px',fontSize:12,fontWeight:700,cursor:'pointer'}}>
        Rückgängig ({undoEnt.countdown})
      </button>
    </div>}

    {/* Homescreen-Install-Tutorial */}
    {shouldShowInstall&&<div className="mo" onClick={()=>setShowInstall(true)}>
      <div className="md" onClick={e=>e.stopPropagation()} style={{maxHeight:'80vh',overflowY:'auto'}}>
        <div className="mh-handle"/>
        <div className="mh" style={{paddingBottom:8}}>
          <div className="mt">Als App installieren</div>
          <div className="ms" style={{marginTop:6}}>Für das beste Erlebnis – direkt auf dem Homescreen</div>
        </div>
        <div className="mb">
          {/* Android: Native Install Prompt wenn verfügbar */}
          {isAndroid2&&!isStandalone&&<div style={{marginBottom:16}}>
            <button
              className="btn btn-l"
              onClick={async()=>{

// ── HOME
function HomeTab({me,periodEnts,today,todayM,tw,tm,t7,t19,now,curPeriod,hh,onDel,onEdit}){
  const p=calcPausch(hh&&hh.persons||[{typ:"inhaber",aktiv:true}],hh&&hh.betrieb).mGes,tges=tw+tm,pct=Math.min((tges/p)*100,100),spart=p-tges;
  const bc=pct<60?'var(--lime)':pct<85?'var(--amber)':'var(--red)';
  const fmt2=d=>new Date(d+'T12:00').toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit'});
  const periodLbl=curPeriod?fmt2(curPeriod.sk)+'\u2013'+fmt2(curPeriod.ek):'Monat';
  return(<div>
    <div className="hdr">
      <div className="hdr-eye">Warenentnahme</div>
      <div className="hdr-title">{mName(now).split(' ')[0]} <em>{mName(now).split(' ')[1]}</em></div>
    </div>
    <div className="cnt">
      <div className="hero">
        <div className="hero-lbl">Warenentnahme {periodLbl}</div>
        <div className="hero-amt">{fN(tges)}<sup> €</sup></div>
        <div className="hero-sub">{spart>=0?`${fN(spart)} € unter Pauschbetrag — Einzeldoku lohnt sich`:`${fN(Math.abs(spart))} € über Pauschbetrag`}</div>
        <div className="prog-track"><div className="prog-fill" style={{width:pct+'%',background:bc}}/></div>
        <div className="prog-lbls"><span>{fN(tw)} €</span><span>Pausch. {fN(p)} €</span></div>
      </div>

      <div className="g2">
        <div className="mc"><div className="mc-lbl">7% MwSt</div><div className="mc-val">{fN(t7+tm)}</div><div className="mc-unit">Waren+Essen €</div></div>
        <div className="mc"><div className="mc-lbl">19% MwSt</div><div className="mc-val">{fN(t19)}</div><div className="mc-unit">Getränke etc. €</div></div>
      </div>

      {/* ── HEUTE-WIDGET EU */}
      {today.length>0&&(()=>{
        const tBrutto=roundCurrency(today.reduce((s,e)=>s+(e.wert||0),0));
        const tNetto=calcNetFromGross(tBrutto,7); // Näherung 7% für Mischberechnung
        const tUst=roundCurrency(tBrutto-tNetto);
        return(
          <div style={{
            background:'rgba(168,208,96,.06)',border:'1px solid rgba(168,208,96,.2)',
            borderRadius:10,padding:'8px 12px',marginBottom:12,
            display:'flex',alignItems:'center',gap:12,flexWrap:'wrap',
          }}>
            <span style={{fontSize:10,fontWeight:700,color:'var(--t2)',textTransform:'uppercase',letterSpacing:.5,flexShrink:0}}>Heute</span>
            <span style={{fontSize:12,fontWeight:600,color:'var(--text)'}}>{fN(tBrutto)} € brutto</span>
            <span style={{fontSize:10,color:'var(--t2)'}}>Netto {fN(tNetto)} €</span>
            <span style={{fontSize:10,color:'var(--t2)'}}>USt {fN(tUst)} €</span>
            <span style={{fontSize:10,color:'var(--t3)'}}>{today.length} Position{today.length!==1?'en':''}</span>
          </div>
        );
      })()}

      {todayM.length>0&&<div className="card" style={{marginBottom:12}}>
        <div className="ch"><span className="ch-t">Personalessen heute</span><span className="pill pl">{fmt(todayM.reduce((s,m)=>s+m.wert,0))}</span></div>
        {todayM.map(m=><div key={m.id} className="row">
          <div className="ri" style={{background:'var(--ld)'}}>{MI[m.type]}</div>
          <div className="rb"><div className="rn">{m.label}</div><div className="rm">Sachbezugswert 2026</div></div>
          <div className="rr"><div className="rv">{fmt(m.wert)}</div></div>
        </div>)}
      </div>}

      <div className="sec">Entnahmen dieser Periode</div>
      {periodEnts.length===0?<div className="empty" style={{padding:'24px 20px'}}>
        <div className="empty-i"><Icon name="receipt" size={42} color="var(--t3)"/></div><div className="empty-s">Noch keine Entnahmen diese Periode.<br/>Tippe auf „Erfassen".</div>
      </div>:<div className="card">
        {periodEnts.map(e=>{
          const einh=e.einheit||'';
          // VPE-String wie "120 FL" oder "20 FL" → lesbare Einheit: "Fl."
          const EINH_MAP={FL:'Fl.',LT:'Ltr.',LI:'Ltr.',L:'Ltr.',KG:'kg',G:'g',GR:'g',ST:'Stk.',GL:'Gl.',BT:'Btl.',BTL:'Btl.',BE:'BE',KI:'Kiste',KT:'Ktn.',PAL:'Pal.',T:'Tüte',ML:'ml'};
          // BNN einheit-Formate:
          // "3,5 KG" / "0,5 LT" → Verpackungsgröße (Dezimalzahl) → anzeigen wie "3,5 kg"
          // "120 FL" / "6 ST"   → VPE-Gebinde (Ganzzahl) → nur Einheitskürzel zeigen: "Fl." / "Stk."
          // "KG" / "ST"         → pure Einheit → mappen
          const dezM=einh.match(/^(\d+[,.]\d+)\s*([A-Za-z]+)$/);  // z.B. "3,5 KG" oder "0,75l"
          const vpeM=!dezM&&einh.match(/^(\d+)\s*([A-Za-z]+)$/);   // z.B. "120 FL" oder "500g" oder "1kg"
          let displayEinh=einh;
          if(dezM){const k=dezM[2].toUpperCase();displayEinh=EINH_MAP[k]||dezM[2];}
          else if(vpeM){const k=vpeM[2].toUpperCase();displayEinh=EINH_MAP[k]||vpeM[2];}
          else{const k=einh.toUpperCase().trim();if(EINH_MAP[k])displayEinh=EINH_MAP[k];}
          const isEchtesGebinde=/(^|\s)(KI|KT|KA|PAL|GEB|TRY|VPE|Kiste|Karton|Palette)(\s|$)/i.test(einh);
          const mengeStr=isEchtesGebinde?`${e.menge} ×`:e.menge;
          return(<div key={e.id} className="row" style={{cursor:'pointer'}} onClick={()=>onEdit&&onEdit(e)}>
            <div className="ri" style={{background:e.mwst===7?'rgba(200,240,96,.08)':'rgba(96,184,240,.08)'}}><Icon name={e.mwst===7?'leaf':'droplet'} size={16} color={e.mwst===7?'var(--lime2)':'var(--blue)'}/></div>
            <div className="rb"><div className="rn">{e.name}</div><div className="rm">{mengeStr} {displayEinh} · {fN(e.preis)} € · {e.mwst}% MwSt</div></div>
            <div className="rr"><div className="rv">{fN(e.wert)} €</div></div>
            <button className="del" onClick={ev=>{ev.stopPropagation();onDel(e.id)}}><Icon name="x" size={12}/></button>
          </div>);
        })}
      </div>}
    </div>
  </div>);
}

function MealsTab({meals,setMeals,cd,cm,curPeriod}){
  const[selDate,setSelDate]=useState(cd);
  const sk=curPeriod?.sk||cm+'-01';
  const ek=curPeriod?.ek||cm+'-31';
  const mm=meals.filter(m=>m.datum>=sk&&m.datum<=ek);
  const dayM=meals.filter(m=>m.datum===selDate);
  const total=mm.reduce((s,m)=>s+m.wert,0);
  const count=t=>dayM.filter(m=>m.type===t).length;
  const isOn=t=>count(t)>0;
  const showT=msg=>{};

  const addOne=type=>{
    const monat=selDate.slice(0,7);
    setMeals(p=>[{id:Date.now()+'_'+Math.random().toString(36).slice(2),type,datum:selDate,monat,wert:SB[type],label:ML[type]},...p]);
  };
  const removeOne=type=>{
    const matches=meals.filter(m=>m.datum===selDate&&m.type===type);
    if(!matches.length)return;
    setMeals(p=>p.filter(m=>m.id!==matches[matches.length-1].id));
  };

  // letzten 30 Tage für Datum-Auswahl
  const dateOpts=[];
  for(let i=0;i<30;i++){
    const d=new Date();d.setDate(d.getDate()-i);
    const k=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    const lbl=i===0?'Heute':i===1?'Gestern':d.toLocaleDateString('de-DE',{weekday:'short',day:'numeric',month:'short'});
    dateOpts.push({k,lbl});
  }

  const sorted=[...new Set(meals.map(m=>m.datum))].sort().reverse();
  let streak=0;
  for(let i=0;i<sorted.length;i++){
    const exp=new Date(cd);exp.setDate(exp.getDate()-i);
    if(sorted[i]===exp.toISOString().slice(0,10))streak++;else break;
  }

  return(<div>
    <div className="hdr">
      <div className="hdr-eye">Sachbezugswert 2026</div>
      <div className="hdr-title">Personal<em>essen</em></div>
    </div>
    <div className="cnt">
      <div className="hero">
        <div className="hero-lbl">Monat gesamt</div>
        <div className="hero-amt">{fN(total)}<sup> €</sup></div>

        {[...new Set(mm.map(m=>m.datum))].sort().reverse().slice(0,20).map(d=>{

        {Object.entries(SB).map(([t,v])=><div key={t} className="rl"><span style={{color:'var(--t2)'}}>{MI[t]} {ML[t]}</span><span>{fmt(v)} / Tag</span></div>)}
        <div className="rl" style={{borderTop:'1px solid var(--border)'}}><span style={{color:'var(--t2)'}}>Alle 3 Mahlzeiten</span><span style={{color:'#2a6010'}}>{fmt(SB.frueh+SB.mittag+SB.abend)} / Tag</span></div>

  </div>);

// ── SCAN
function ScanTab({arts,eanIndex,onSel,onBack,onNotFound,showT,scanLabel}){
  const[state,setState]=useState('idle'); // idle|scanning|photo_analyzing|found|notfound|denied|error
  const[result,setResult]=useState(null);
  const[manualEAN,setManualEAN]=useState('');
  const[lastScan,setLastScan]=useState(null);
  const videoRef=React.useRef(null);
  const streamRef=React.useRef(null);
  const detectorRef=React.useRef(null);
  const rafRef=React.useRef(null);
  const photoInputRef=React.useRef(null);

  const eanCount=useMemo(()=>Object.keys(eanIndex).length,[eanIndex]);
  // BarcodeDetector: Chrome 88+ / Android Chrome / Safari 17.4+
  // Older Android: falls back to photo scan
  const hasDetector='BarcodeDetector' in window;
  const isAndroidBrowser=/android/i.test(navigator.userAgent);

  const stopCamera=()=>{
    if(rafRef.current){cancelAnimationFrame(rafRef.current);rafRef.current=null;}
    if(streamRef.current){streamRef.current.getTracks().forEach(t=>t.stop());streamRef.current=null;}
    if(videoRef.current){videoRef.current.srcObject=null;}
    detectorRef.current=null;
  };
  useEffect(()=>()=>stopCamera(),[]);

  const handleEAN=(ean)=>{
    const clean=ean.replace(/\D/g,'');
    if(!clean||clean.length<8)return;
    if(lastScan&&lastScan.ean===clean&&Date.now()-lastScan.ts<2000)return;
    setLastScan({ean:clean,ts:Date.now()});
    const art=eanIndex[clean];
    if(art){stopCamera();setResult({art,ean:clean});setState('found');}
    else{setResult({ean:clean});setState('notfound');}
  };

  // Live-Scan (BarcodeDetector – Chrome/Android/Safari 17.4+)
  const startLiveScan=async()=>{
    setState('scanning');setResult(null);
    try{
      detectorRef.current=new BarcodeDetector({formats:['ean_13','ean_8','upc_a','upc_e']});
      const stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:'environment'},width:{ideal:640},height:{ideal:480}}});
      streamRef.current=stream;
      if(videoRef.current){videoRef.current.srcObject=stream;await videoRef.current.play();}
      const scan=async()=>{
        if(!videoRef.current||!streamRef.current)return;
        try{const codes=await detectorRef.current.detect(videoRef.current);if(codes.length>0){handleEAN(codes[0].rawValue);return;}}catch{}
        rafRef.current=requestAnimationFrame(scan);
      };
      rafRef.current=requestAnimationFrame(scan);
    }catch(e){
      const isAndroid=/android/i.test(navigator.userAgent);
      if(e.name==='NotAllowedError'||e.name==='PermissionDeniedError'){
        setState('denied');
      } else if(e.name==='NotFoundError'||e.name==='DevicesNotFoundError'){
        setState('error'); // no camera found
      } else if(e.name==='NotReadableError'||e.name==='TrackStartError'){
        // Android: camera in use by another app
        setState('error');
        setTimeout(()=>startLiveScan(),1500); // retry once after 1.5s
      } else if(e.name==='OverconstrainedError'){
        // Retry without constraints on Android (lower res cameras)
        try{
          const stream2=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});
          streamRef.current=stream2;
          if(videoRef.current){videoRef.current.srcObject=stream2;await videoRef.current.play();}
          setState('scanning');
          // BUG FIX: RAF-Loop neu starten — sonst läuft Kamera aber erkennt nie
          const scan2=async()=>{
            if(!videoRef.current||!streamRef.current)return;
            try{const codes=await detectorRef.current.detect(videoRef.current);if(codes.length>0){handleEAN(codes[0].rawValue);return;}}catch{}
            rafRef.current=requestAnimationFrame(scan2);
          };
          rafRef.current=requestAnimationFrame(scan2);
        }catch(e2){setState('error');}
      } else {
        setState('error');
      }
    }
  };

  // Foto-Scan via KI (funktioniert auf JEDEM iPhone/Safari)
  const handlePhotoScan=async(file)=>{
    if(!file)return;
    setState('photo_analyzing');
    try{
      // Bild auf max 800px verkleinern (reduziert Payload von ~300KB auf ~30KB)
      const resized=await new Promise((res,rej)=>{
        const img=new Image();
        const url=URL.createObjectURL(file);
        img.onload=()=>{
          const max=800;
          let w=img.width,h=img.height;
          if(w>max||h>max){const s=Math.min(max/w,max/h);w=Math.round(w*s);h=Math.round(h*s);}
          const c=document.createElement('canvas');c.width=w;c.height=h;
          c.getContext('2d').drawImage(img,0,0,w,h);
          URL.revokeObjectURL(url);
          c.toBlob(b=>res(b),'image/jpeg',0.85);
        };
        img.onerror=rej;
        img.src=url;
      });
      const base64=await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(',')[1]);r.onerror=rej;r.readAsDataURL(resized);});
      const resp=await fetch('./api-proxy.php',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
          model:'claude-sonnet-4-5-20250929',
          max_tokens:200,
          messages:[{role:'user',content:[
            {type:'image',source:{type:'base64',media_type:'image/jpeg',data:base64}},
            {type:'text',text:'Schau auf das Bild und lies die Ziffernzeile unter dem Strichcode/Barcode ab. Das ist eine 8-13-stellige Zahl direkt unter den schwarzen Strichen. Antworte NUR mit diesen Ziffern, ohne Leerzeichen oder Text. Falls keine Ziffern erkennbar: antworte mit "KEIN_CODE".'}
          ]}]
        })
      });
      const data=await resp.json();
      const raw=(data.content||[]).map(c=>c.text||'').join('').trim();
      const text=raw.replace(/\D/g,'');
      if(text.length>=8){
        setResult(r=>({...r,scannedEAN:text}));
        handleEAN(text);
      } else{
        setResult({ean:null,scannedEAN:raw||'nichts erkannt'});
        setState('notfound');
      }
    }catch(e){
      console.error(e);
      setState('error');
    }
  };

  const reset=()=>{stopCamera();setState('idle');setResult(null);setManualEAN('');};

  return(<div>
    <div className="hdr">
      <div className="hdr-eye">Warenentnahme</div>
      <div className="hdr-title">EAN <em>Scanner</em></div>
    </div>
    <div className="cnt" style={{paddingBottom:"calc(var(--nh) + 60px)"}}> 

      <div className="card" style={{marginBottom:14,padding:'12px 16px'}}>
        <div className="rl">
          <span style={{color:'var(--t2)',fontSize:11}}>Artikel mit EAN</span>
          <span style={{color:eanCount>0?'var(--lime)':'var(--t3)'}}>{eanCount.toLocaleString('de-DE')}</span>
        </div>
        {eanCount===0&&<div style={{fontSize:11,color:'var(--amber)',marginTop:6}}>⚠ Importiere zuerst BNN-Dateien – EAN-Codes werden automatisch geladen.</div>}
      </div>

      {state==='idle'&&<>
        {/* Primär-Button: je nach Browser-Support */}
        {hasDetector
          ?<button className="btn btn-l" onClick={startLiveScan} style={{marginBottom:8,fontSize:14,padding:16,display:'flex',alignItems:'center',justifyContent:'center',gap:10}}>
            <Icon name="camera" size={22} color="currentColor"/> Live-Scan (Kamera)
          </button>
          :<div style={{background:'rgba(200,240,96,.06)',border:'1px solid rgba(200,240,96,.2)',borderRadius:12,padding:'14px 16px',marginBottom:8,textAlign:'center'}}>
            <div style={{fontSize:11,color:'var(--t2)',marginBottom:10,lineHeight:1.7}}>
              {isAndroidBrowser
                ?<>Kamera-Scan nicht verfügbar – bitte <strong style={{color:'#2a6010'}}>Chrome</strong> nutzen.<br/>Foto-Scan funktioniert auf jedem Gerät:</>
                :<>Live-Scan nicht verfügbar in diesem Browser.<br/><strong style={{color:'#2a6010'}}>Foto-Scan funktioniert trotzdem:</strong></>
              }
            </div>
          </div>
        }
        {/* Foto-Scan – immer sichtbar, funktioniert überall */}
        <input ref={photoInputRef} type="file" accept="image/*" style={{display:'none'}}
          onChange={e=>{if(e.target.files[0])handlePhotoScan(e.target.files[0]);e.target.value='';}}/>
        <button className="btn btn-l" onClick={()=>photoInputRef.current?.click()}
          style={{marginBottom:14,fontSize:14,padding:16,display:'flex',alignItems:'center',justifyContent:'center',gap:10,
            background:'rgba(96,184,240,.08)',borderColor:'rgba(96,184,240,.3)',color:'var(--blue)'}}>
          <Icon name="camera" size={22} color="currentColor"/> Foto-Scan (KI)
          <span style={{fontSize:10,opacity:.7,marginLeft:4}}>funktioniert überall</span>
        </button>

        <div className="sec">Manuell eingeben</div>
        <div style={{display:'flex',gap:8}}>
          <input style={{flex:1,background:'var(--s1)',border:'1px solid var(--border)',borderRadius:8,padding:'10px 12px',color:'var(--text)',fontSize:14,fontFamily:'Geist Mono,monospace',outline:'none',letterSpacing:2}}
            placeholder="4012345678901" inputMode="numeric"
            value={manualEAN} onChange={e=>setManualEAN(e.target.value.replace(/\D/g,''))}
            onKeyDown={e=>{if(e.key==='Enter'&&manualEAN.length>=8)handleEAN(manualEAN);}}/>
          <button onClick={()=>{if(manualEAN.length>=8)handleEAN(manualEAN);}} className="btn" style={{padding:'10px 16px',flexShrink:0}}>→</button>
        </div>
        <div style={{fontSize:11,color:'var(--t2)',marginTop:8,textAlign:'center'}}>EAN-8, EAN-13 oder UPC</div>
      </>}

      {state==='scanning'&&<>
        <div style={{position:'relative',borderRadius:14,overflow:'hidden',background:'#000',
          aspectRatio:'4/3',
          paddingTop:'0',
          /* Fallback für Chrome <88 ohne aspectRatio-Support */
          minHeight:0,
          marginBottom:14}}>
          {/* paddingTop-Fallback wird via JS überschrieben wenn aspectRatio nicht unterstützt */}
          <video ref={videoRef} style={{width:'100%',height:'100%',objectFit:'cover',display:'block'}} playsInline muted autoPlay/>
          <div style={{position:'absolute',top:0,right:0,bottom:0,left:0,display:'flex',alignItems:'center',justifyContent:'center',pointerEvents:'none'}}>
            <div style={{width:220,height:140,border:'2px solid var(--lime)',borderRadius:8,boxShadow:'0 0 0 2000px rgba(0,0,0,.4)',position:'relative'}}>
              <div style={{position:'absolute',top:-2,left:-2,width:24,height:24,borderTop:'4px solid var(--lime)',borderLeft:'4px solid var(--lime)',borderRadius:'8px 0 0 0'}}/>
              <div style={{position:'absolute',top:-2,right:-2,width:24,height:24,borderTop:'4px solid var(--lime)',borderRight:'4px solid var(--lime)',borderRadius:'0 8px 0 0'}}/>
              <div style={{position:'absolute',bottom:-2,left:-2,width:24,height:24,borderBottom:'4px solid var(--lime)',borderLeft:'4px solid var(--lime)',borderRadius:'0 0 0 8px'}}/>
              <div style={{position:'absolute',bottom:-2,right:-2,width:24,height:24,borderBottom:'4px solid var(--lime)',borderRight:'4px solid var(--lime)',borderRadius:'0 0 8px 0'}}/>
            </div>
          </div>
          <div style={{position:'absolute',bottom:12,left:0,right:0,textAlign:'center',color:'#2a6010',fontSize:11,textShadow:'0 1px 4px rgba(0,0,0,.8)'}}>Barcode in Rahmen halten</div>
        </div>
        <button onClick={reset} style={{width:'100%',background:'none',border:'1px solid var(--border)',borderRadius:8,padding:10,color:'var(--t2)',cursor:'pointer',fontFamily:'Geist Mono,monospace',fontSize:12}}>Abbrechen</button>
      </>}

      {state==='photo_analyzing'&&<div style={{textAlign:'center',padding:32,background:'var(--s2)',border:'1px solid var(--border)',borderRadius:14}}>
        <div style={{marginBottom:12}}><Icon name="search" size={36} color="var(--t3)"/></div>
        <div style={{color:'#2a6010',fontSize:14,marginBottom:6}}>KI liest Barcode…</div>
        <div style={{color:'var(--t2)',fontSize:11}}>Einen Moment bitte</div>
      </div>}

      {state==='notfound'&&<div style={{textAlign:'center',padding:24}}>
        <div style={{marginBottom:8}}><Icon name="search" size={40} color="var(--t3)"/></div>
        <div style={{color:'var(--amber)',fontSize:14,marginBottom:4}}>Artikel nicht gefunden</div>
        {result?.ean&&<div style={{color:'var(--t2)',fontSize:12,marginBottom:4}}>EAN: <span style={{fontFamily:'Geist Mono,monospace',color:'#2a6010'}}>{result.ean}</span></div>}
        {result?.scannedEAN&&!result?.ean&&<div style={{color:'var(--red)',fontSize:11,marginBottom:4}}>KI erkannte: „{result.scannedEAN}"</div>}
        {onNotFound
          ?<>
            <div style={{color:'var(--t2)',fontSize:11,marginBottom:14}}>Nicht in Datenbank. Manuell erfassen?</div>
            <button className="btn btn-l" onClick={()=>{stopCamera();onNotFound(result?.ean||'');}}
              style={{marginBottom:8,fontSize:13,padding:12}}>
              Manuell erfassen →
            </button>
            <button className="btn" onClick={reset}>Nochmal scannen</button>
          </>
          :<>
            <div style={{color:'var(--t2)',fontSize:11,marginBottom:16}}>Nicht in BNN-Datenbank. Manuell im Erfassen-Tab suchen.</div>
            <button className="btn" onClick={reset}>Zurück</button>
          </>
        }
      </div>}

      {state==='found'&&result?.art&&<>
        <div style={{background:'var(--ld)',border:'1px solid rgba(200,240,96,.25)',borderRadius:14,padding:18,marginBottom:14,textAlign:'center'}}>
          <div style={{marginBottom:6}}><Icon name="check_circle" size={28} color="var(--lime)"/></div>
          <div style={{color:'#2a6010',fontSize:16,marginBottom:2,fontFamily:'Instrument Serif,serif'}}>{result.art.name}</div>
          <div style={{color:'var(--t2)',fontSize:11,marginBottom:4}}>EAN {result.ean}</div>
          <div style={{color:'var(--t2)',fontSize:11}}>{result.art.einheit} · {fN(result.art.preis)} € · {result.art.mwst}% MwSt</div>
        </div>
        {onBack&&<button onClick={()=>{stopCamera();onBack();}}
          style={{width:'100%',padding:12,marginBottom:8,borderRadius:10,
            border:'1px solid var(--border)',background:'none',
            color:'var(--t2)',fontSize:13,cursor:'pointer',
            display:'flex',alignItems:'center',justifyContent:'center',gap:6}}>
          <Icon name="arrow_left" size={15} color="var(--t2)"/> Zurück ohne Erfassen
        </button>}
        <button className="btn btn-l" onClick={()=>{stopCamera();onSel(result.art);}} style={{marginBottom:8,fontSize:14,padding:14}}>
          {scanLabel||'Entnahme erfassen →'}
        </button>
        <button onClick={reset} style={{width:'100%',background:'none',border:'1px solid var(--border)',borderRadius:8,padding:10,color:'var(--t2)',cursor:'pointer',fontFamily:'Geist Mono,monospace',fontSize:12}}>
          Nochmal scannen
        </button>
      </>}

      {state==='denied'&&<div className="card" style={{textAlign:'center',padding:24}}>
        <div style={{marginBottom:8}}><Icon name="x" size={32} color="var(--red)"/></div>
        <div style={{color:'var(--red)',marginBottom:6}}>Kamera-Zugriff verweigert</div>
        <div style={{color:'var(--t2)',fontSize:11,lineHeight:1.7,marginBottom:12}}>Kamerazugriff in Safari-Einstellungen erlauben.</div>
        <button className="btn" onClick={reset}>Foto-Scan nutzen</button>
      </div>}

      {state==='error'&&<div className="card" style={{textAlign:'center',padding:24}}>
        <div style={{marginBottom:8}}><Icon name="alert_triangle" size={32} color="var(--amber)"/></div>
        <div style={{color:'var(--amber)',marginBottom:6}}>Fehler beim Scannen</div>
        <div style={{color:'var(--t2)',fontSize:11,marginBottom:12}}>Versuche den Foto-Scan.</div>
        <button className="btn" onClick={reset}>Zurück</button>
      </div>}
    </div>
  </div>);
}

// ── ADD
function AddTab({arts,favs,onSel,onFav,onManual}){
  const[q,setQ]=useState('');
  const[debouncedQ,setDebouncedQ]=useState('');
  const debRef=React.useRef(null);
  const handleQ=v=>{setQ(v);clearTimeout(debRef.current);debRef.current=setTimeout(()=>setDebouncedQ(v),120);};
  const[filterMwst,setFilterMwst]=useState('alle'); // 'alle','7','19'
  const[filterKat,setFilterKat]=useState('');
  const isValidKat=k=>!!(k&&k.trim());
  const allKats=useMemo(()=>{
    const s=new Set(arts.map(a=>a.kategorie).filter(isValidKat));
    return [...s].sort().slice(0,30);
  },[arts]);
  const[sortBy,setSortBy]=useState('relevanz'); // 'relevanz','name','preis_asc','preis_desc'
  const[showManual,setShowManual]=useState(false);
  const[mName,setMName]=useState('');
  const[mPreis,setMPreis]=useState('');
  const[mMwst,setMMwst]=useState('7');
  const[mEinheit,setMEinheit]=useState('Stk');
  const[mEinheitCustom,setMEinheitCustom]=useState('');

  const res=useMemo(()=>{
    // Wenn nur Kategorie-Filter gesetzt (kein Suchtext) → alle Artikel der Kategorie zeigen
    if(!debouncedQ.trim()&&!filterKat)return[];
    if(!debouncedQ.trim()&&filterKat){
      return arts.filter(a=>isValidKat(a.kategorie)&&a.kategorie===filterKat).slice(0,80);
    }
    const x=debouncedQ.trim().toLowerCase();
    // Umlaut-tolerante Suche
    const norm=s=>s.replace(/ä/g,'ae').replace(/ö/g,'oe').replace(/ü/g,'ue').replace(/ß/g,'ss');
    const xN=norm(x);
    // Prüfe ob Sucheingabe ein Synonym hat
    const syn=Object.entries(SEARCH_SYNONYME).find(([k])=>x.includes(k));
    const xSyn=syn?syn[1]:null;
    const matched=arts.filter(a=>{
      const n=a.name.toLowerCase();
      const nN=norm(n);
      return n.includes(x)||nN.includes(xN)||
        (xSyn&&(n.includes(xSyn)||xSyn.split(' ').every(w=>n.includes(w))))||
        a.id.toLowerCase().includes(x)||
        (a.marke||'').toLowerCase().includes(x)||
        (a.liefKuerzel||'').toLowerCase().includes(x);
    });
    // Sortierung: frische/unverarbeitete Produkte zuerst, dann verarbeitete
    // Rang 0: exakter Match
    // Rang 1: kein Verarbeitungswort + (Name/Wort beginnt mit x, ODER Kompositum enthält x)  →  z.B. "Strauch-Tomaten", "Romatomaten"
    // Rang 2: beginnt mit x, aber verarbeitet  →  z.B. "Tomatensauce", "Tomatenpaste"
    // Rang 3: Kompositum / Wort-Match, aber verarbeitet  →  z.B. "Getrocknete Tomaten"
    // Rang 4: Rest (enthält x irgendwo)
    // Tiebreaker: kürzerer Name zuerst (kürzere Namen = simpler = wahrscheinlich frischer)
    const VERARBEITET=['getrocknet','mariniert','eingelegt','passiert','konzentriert',
      'ketchup','sauce','sosse','soße','pesto','suppe','mark','paste','saft','pulver',
      'püree','puree','mus','kompott','marmelade','konfitüre','konfiture',
      'ravioli','tortellini','hummus','focaccia','aufstrich','fertig','creme','würfel',
      'wuerfel','pickled','konserv','einmach'];
    matched.sort((a,b)=>{
      const na=a.name.toLowerCase(), nb=b.name.toLowerCase();
      const isProcessed=n=>VERARBEITET.some(kw=>n.includes(kw));
      // Wort-Anfang-Match: jedes Wort (getrennt durch Leerzeichen, Komma, Bindestrich, Slash)
      const wordStarts=n=>n.split(/[\s,\-\/]+/).some(w=>w.startsWith(x)||norm(w).startsWith(xN));
      // Kompositum: Suchbegriff steckt irgendwo im Wort (z.B. "romatomaten" enthält "tomaten")
      const compound=n=>n.split(/[\s,\/]+/).some(w=>w.includes(x)||norm(w).includes(xN));
      const rank=n=>{
        const nn=norm(n);
        if(n===x||nn===xN) return 0;
        const proc=isProcessed(n);
        const starts=n.startsWith(x)||nn.startsWith(xN);
        const wMatch=wordStarts(n)||compound(n);
        if(!proc&&(starts||wMatch)) return 1;   // frisch + Match → oben
        if(starts) return 2;                     // verarbeitet aber beginnt mit
        if(wMatch) return 3;                     // verarbeitet, Wort-Match
        return 4;
      };
      const sa=rank(na),sb=rank(nb);
      if(sa!==sb)return sa-sb;
      return a.name.length-b.name.length;
    });
    // Filter anwenden
    let filtered=matched;
    if(filterMwst!=='alle') filtered=filtered.filter(a=>a.mwst===parseInt(filterMwst));
    // Sortierung
    if(sortBy==='name') filtered=[...filtered].sort((a,b)=>a.name.localeCompare(b.name,'de'));
    else if(sortBy==='preis_asc') filtered=[...filtered].sort((a,b)=>a.preis-b.preis);
    if(filterKat) filtered=filtered.filter(a=>isValidKat(a.kategorie)&&a.kategorie===filterKat);
    else if(sortBy==='preis_desc') filtered=[...filtered].sort((a,b)=>b.preis-a.preis);
    // bei 'relevanz' bleibt die oben ermittelte Sortierung
    return filtered.slice(0,50);
  },[debouncedQ,arts,filterMwst,sortBy,filterKat]);
  const favA=arts.filter(a=>favs.includes(a.id));

    if(!mName.trim()||!p||p<=0||!einheit)return;

  const Row=({a})=><div className="row" style={{cursor:'pointer'}} onClick={()=>onSel(a)}>

    <div className="rr" style={{display:'flex',alignItems:'center',gap:8}}>

      <button className={`fav ${favs.includes(a.id)?'on':''}`} onClick={e=>{e.stopPropagation();onFav(a.id);}}><Icon name="star" size={16} color={favs.includes(a.id)?'var(--amber)':'var(--t3)'} strokeWidth={favs.includes(a.id)?2:1.5}/></button>
    </div>

  return(<div>

          {allKats.length>0&&<select className="fb" value={filterKat} onChange={e=>setFilterKat(e.target.value)} style={{maxWidth:120}}>
            <option value="">Alle Kategorien</option>
            {allKats.map(k=><option key={k} value={k}>{k}</option>)}
          </select>}
          <select className="fb" value={sortBy} onChange={e=>setSortBy(e.target.value)}>
