  // ── FAVS (gmbh_favs)
  const[gmbhFavIds,setGmbhFavIds]=useState(()=>{try{return JSON.parse(localStorage.getItem('gmbh_favs')||'[]');}catch{return[];}});
  const toggleFav=id=>{
    setGmbhFavIds(prev=>{
      const next=prev.includes(id)?prev.filter(x=>x!==id):[...prev,id];
      localStorage.setItem('gmbh_favs',JSON.stringify(next));
      return next;
    });
  };

  // ── PICK DEFAULT METHOD + CATEGORY
  const pickDefaultMethod=art=>{
    if(art?.uvp&&art.uvp>0)return 'rabatt';
    const override=getCatOverride(art);
    const rawKat=override||(art?.kategorie?KAT_MAP[art.kategorie]:null);
    if(rawKat){
      const mv=mvList.find(m=>m.kat===rawKat);
      const ek=ekBrutto(art);
      if(mv&&ek>0&&mv.wert<ek*0.9)return 'ek';
      return 'marktwert';
    }
    return null;
  };
  const pickKat=art=>{
    const override=getCatOverride(art);
    if(override)return override;
    return KAT_MAP[art?.kategorie||'']||'Gemüse';
  };

  // ── FORM STATE
  const EMPTY={datum:cd,person:persons[0]?.id||'',artikel:'',artId:null,menge:1,einheit:'kg',
    mwst:7,methode:null,kat:'Gemüse',vk:'',mp:'0',ekBrutto:'',handlingRate:'0.15',tagVegan:false};
  const[form,setForm]=useState({...EMPTY});
  const[showForm,setShowForm]=useState(false);
  const[editId,setEditId]=useState(null); // id of entry being edited
  // ── UNDO + QUICK-REPEAT STATE
  const[undoPending,setUndoPending]=useState(null); // {id, label, vorteil, entry}
  const[countdown,setCountdown]=useState(5);
  const timerRef=React.useRef(null);
  const countdownRef=React.useRef(null);
  const[lastSaved,setLastSaved]=useState(null);     // letzter gespeicherter Eintrag für Quick-Repeat
  const setF=k=>v=>setForm(f=>({...f,[k]:v}));
  const curArt=arts.find(a=>a.id===form.artId)||arts.find(a=>a.name===form.artikel)||null;

  // ── SEARCH STATE
  const[q,setQ]=useState('');
  const[debouncedQ,setDebouncedQ]=useState('');
  const debRef=React.useRef(null);
  const handleQ=v=>{setQ(v);clearTimeout(debRef.current);debRef.current=setTimeout(()=>setDebouncedQ(v),120);};
  const[filterMwst,setFilterMwst]=useState('alle');
  const[filterKat,setFilterKat]=useState('');
  const[sortBy,setSortBy]=useState('relevanz');
  const isValidKat=k=>!!(k&&k.trim());
  const allKats=useMemo(()=>{const s=new Set(arts.map(a=>a.kategorie).filter(isValidKat));return[...s].sort().slice(0,30);},[arts]);

  const res=useMemo(()=>{
    if(!debouncedQ.trim()&&!filterKat)return[];
    if(!debouncedQ.trim()&&filterKat)return arts.filter(a=>isValidKat(a.kategorie)&&a.kategorie===filterKat).slice(0,80);
    const x=debouncedQ.toLowerCase(),xN=norm(x);
    let matched=arts.filter(a=>{
      const n=a.name.toLowerCase(),nN=norm(n);
      return n.includes(x)||nN.includes(xN)||a.id.toLowerCase().includes(x)||
        (a.marke||'').toLowerCase().includes(x)||(a.liefKuerzel||'').toLowerCase().includes(x);
    });
    matched.sort((a,b)=>{
      const na=a.name.toLowerCase(),nb=b.name.toLowerCase();
      const sa=na.startsWith(x)?0:na.split(/[\s,]+/).some(w=>w.startsWith(x))?1:2;
      const sb=nb.startsWith(x)?0:nb.split(/[\s,]+/).some(w=>w.startsWith(x))?1:2;
      return sa-sb;
    });
    if(filterMwst!=='alle')matched=matched.filter(a=>a.mwst===parseInt(filterMwst));
    if(filterKat)matched=matched.filter(a=>isValidKat(a.kategorie)&&a.kategorie===filterKat);
    if(sortBy==='name')matched=[...matched].sort((a,b)=>a.name.localeCompare(b.name,'de'));
    else if(sortBy==='preis_asc')matched=[...matched].sort((a,b)=>a.preis-b.preis);
    else if(sortBy==='preis_desc')matched=[...matched].sort((a,b)=>b.preis-a.preis);
    return matched.slice(0,50);
  },[debouncedQ,arts,filterMwst,sortBy,filterKat]);

  // ── SELECT ARTICLE
  const selectArt=a=>{
    const method=pickDefaultMethod(a);
    const kat=pickKat(a);
    setForm(f=>({...f,
      artikel:a.name,artId:a.id,
      einheit:a.einheit||f.einheit,
      mwst:a.mwst||f.mwst,
      methode:method,kat,
      vk:a.uvp?String(a.uvp):f.vk,
      ekBrutto:String(ekBrutto(a)||''),
    }));
    setShowForm(true);setEditId(null);
    setQ('');setDebouncedQ('');
  };

  // ── EDIT EXISTING ENTRY
  const startEdit=w=>{
    setForm({
      datum:w.datum,person:w.person,artikel:w.artikel,artId:w.artId||null,
      menge:w.menge,einheit:w.einheit,mwst:w.mwst,
      methode:w.methode,kat:w.kat||'Gemüse',
      vk:String(w.vk||''),mp:String(w.mp||'0'),
      ekBrutto:String(w.ekBrutto||''),handlingRate:String(w.handlingRate||'0.15'),
    });
    setEditId(w.id);
    setShowForm(true);
    setQ('');setDebouncedQ('');
    window.scrollTo({top:0,behavior:'smooth'});
  };

  // ── EAN-SCAN PREFILL
  React.useEffect(()=>{
    if(!pendingArt)return;
    if(pendingArt._notFound){
      setForm(f=>({...EMPTY,
        person:f.person,datum:f.datum,
        artikel:pendingArt._scannedEAN?`EAN ${pendingArt._scannedEAN}`:'',
      }));
      setEditId(null);
      setShowForm(true);
    } else {
      selectArt(pendingArt);
    }
    clearPendingArt?.();
    // Nach Scan-Prefill: Formular sofort sichtbar machen
    setTimeout(()=>window.scrollTo({top:0,behavior:'smooth'}),50);
  },[pendingArt]);

  // ── MARKTWERT CALC
  const curMV=useMemo(()=>{
    const mv=mvList.find(m=>m.kat===form.kat);
    return mv||{kat:form.kat,einheit:'kg',wert:0};
  },[form.kat,mvList]);

  // ── EINHEITENUMRECHNUNG für Marktwert (g→kg, ml→l etc.)
  const normalizeMenge=(menge,einheitInput,einheitMV)=>{
    const ei=(einheitInput||'').toLowerCase().trim();
    const em=(einheitMV||'').toLowerCase().trim();
    if(ei===em||!ei||!em)return menge;
    if(em==='kg'&&(ei==='g'||ei==='gr'))return menge/1000;
    if(em==='l'&&ei==='ml')return menge/1000;
    if(em==='l'&&ei==='cl')return menge/100;
    if(em==='g'&&ei==='kg')return menge*1000;
    if(em==='ml'&&ei==='l')return menge*1000;
    return menge; // andere Einheiten: kein Umrechnungsfaktor bekannt
  };

  // ── COMPUTE BENEFIT
  const computeBenefit=()=>{
    const menge=Math.max(0,parseFloat(form.menge)||1);
    if(form.methode==='rabatt'){
      const vk=parseFloat(form.vk)||0,mp=parseFloat(form.mp)||0;
      return roundCurrency(Math.max(0,vk-mp)*menge);
    }
    if(form.methode==='marktwert'){
      const mengeNorm=normalizeMenge(menge,form.einheit,curMV.einheit);
      return roundCurrency(curMV.wert*mengeNorm);
    }
    if(form.methode==='ek'){
      const ek=parseFloat(form.ekBrutto)||(ekBrutto(curArt)||0);
      // ROBUSTHEIT: HandlingRate niemals negativ; >200% → console.warn
      const rawRate=parseFloat(form.handlingRate)||0.15;
      const rate=Math.max(0,rawRate); // negativ → 0
      if(rate>2)console.warn('[Warenentnahme] HandlingRate >200%:',rate*100+'%','— bitte prüfen');
      // Einheit berücksichtigen: Preis ist pro kg/l, Menge in g/ml → /1000
      const einh=(form.einheit||'').toLowerCase();
      const mengeEffektiv=(einh==='g'||einh==='ml')?menge/1000:menge;
      return roundCurrency(ek*(1+rate)*mengeEffektiv);
    }
    return 0;
  };
  const vorteil=computeBenefit();

  // ── VALIDATION
  const validErr=(()=>{
    if(!form.artikel.trim())return 'Artikel wählen';
    if(!form.person)return 'Person wählen';
    if(!form.methode)return 'Methode wählen';
    if(form.methode==='rabatt'){
      if((parseFloat(form.vk)||0)<=0)return 'VK/UVP eingeben';
      if((parseFloat(form.mp)||0)<0)return 'Mitarbeiterpreis darf nicht negativ sein';
      if((parseFloat(form.mp)||0)>(parseFloat(form.vk)||0))return 'MP darf nicht > VK';
    }
    if(form.methode==='ek'){
      const ek=parseFloat(form.ekBrutto)||0;
      if(ek<=0)return 'EK-Preis (brutto) eingeben';
      const rate=parseFloat(form.handlingRate)||0;
      if(rate<0)return 'Aufschlag darf nicht negativ sein';
    }
    if(vorteil<=0)return 'Vorteil muss > 0 €'; // Eingabe 0 € explizit abgefangen
    return null;
  })();

  // ── PLAUSIBILITY WARNINGS
  const curEkBrutto=ekBrutto(curArt);
  const warnings=[];
  if(curArt?.uvp&&form.methode==='ek')warnings.push('Für diesen Artikel ist ein VK/UVP hinterlegt – Warenrabatt-Methode empfohlen.');
  if(form.methode==='marktwert'&&curArt&&curEkBrutto>0){
    const ratio=curMV.wert/curEkBrutto;
    if(ratio<0.9)warnings.push('⚠ Marktwert liegt unter EK – Kategorie prüfen oder EK+Handling verwenden.');
    else if(ratio<0.5)warnings.push('⚠ Marktwert liegt weit unter 50 % des EK-Preises.');
    if(ratio>3)warnings.push('⚠ Marktwert liegt über 3× EK-Preis – Plausibilitätscheck.');
  }
  if(form.methode==='marktwert'&&(form.einheit==='stk'||form.einheit==='Stk')&&
    (form.kat==='Gemüse'||form.kat==='Obst'||form.kat==='Fleisch'||form.kat==='Fisch'))
    warnings.push('Einheit prüfen: '+form.kat+' wird üblicherweise in kg erfasst.');

  // ── SAVE / UPDATE
  const add=()=>{
    if(validErr)return;
    const now=new Date().toISOString();
    const prevEntry=editId?withdrawals.find(x=>x.id===editId):null;
    const entry={
      id:editId||'gw_'+Date.now(),datum:form.datum,monat:form.datum.slice(0,7),
      person:form.person,artikel:form.artikel,artId:form.artId||null,
      ean:curArt?.eans?.[0]||null,menge:parseFloat(form.menge)||1,
      einheit:form.methode==='marktwert'?curMV.einheit:form.einheit,
      mwst:parseInt(form.mwst)||7,methode:form.methode,
      kat:form.methode==='marktwert'?form.kat:null,
      vk:form.methode==='rabatt'?parseFloat(form.vk)||0:null,
      mp:form.methode==='rabatt'?parseFloat(form.mp)||0:null,
      ekBrutto:form.methode==='ek'?parseFloat(form.ekBrutto)||0:null,
      handlingRate:form.methode==='ek'?parseFloat(form.handlingRate)||0.15:null,
      mvWert:form.methode==='marktwert'?curMV.wert:null,
      vorteil,source:curArt?'import':'manual',
      isEkAusnahme:form.methode==='ek',tagVegan:form.tagVegan||false,
      createdAt:prevEntry?.createdAt||now,
      updatedAt:editId?now:undefined,
    };
    // Trace nach Objekt-Aufbau berechnen — nutzt die finalen Feldwerte
    entry.evaluationTrace = buildEvaluationTrace(entry);
    if(editId){
      setWithdrawals(p=>p.map(x=>x.id===editId?entry:x));
      setForm({...EMPTY,person:form.person,datum:form.datum});
      setShowForm(false);setEditId(null);
    } else {
      // Erst Undo-Window öffnen — Eintrag wird nach 5s fest gespeichert
      setUndoPending({id:entry.id,label:entry.artikel,vorteil:entry.vorteil,entry});
      setCountdown(5);
      setLastSaved(entry);
      setForm({...EMPTY,person:form.person,datum:form.datum});
      setShowForm(false);setEditId(null);
      // Timer läuft über Refs — überlebt Tab-Wechsel
      if(timerRef.current)clearTimeout(timerRef.current);
      if(countdownRef.current)clearInterval(countdownRef.current);
      let c=5;
      countdownRef.current=setInterval(()=>{
        c--;
        setCountdown(c);
        if(c<=0)clearInterval(countdownRef.current);
      },1000);
      timerRef.current=setTimeout(()=>{
        clearInterval(countdownRef.current);
        setWithdrawals(p=>[entry,...p]);
        setUndoPending(null);
      },5000);
    }
  };

  // ── UNDO-COMMIT: Timer aufräumen wenn Komponente unmountet
  React.useEffect(()=>()=>{
    if(timerRef.current)clearTimeout(timerRef.current);
    if(countdownRef.current)clearInterval(countdownRef.current);
  },[]);

  // ── UNDO: Eintrag endgültig verwerfen
  const doUndo=()=>{
    if(!undoPending)return;
    if(timerRef.current)clearTimeout(timerRef.current);
    if(countdownRef.current)clearInterval(countdownRef.current);
    setUndoPending(null);
  };

  // ── QUICK-REPEAT: Letzten Artikel nochmal erfassen (Formular prefüllen)
  const quickRepeat=()=>{
    if(!lastSaved)return;
    const art=arts.find(a=>a.id===lastSaved.artId)||null;
    if(art){
      selectArt(art);
    } else {
      // Manuell erfasster Artikel: Formular mit letzten Werten füllen
      setForm(f=>({...f,
        artikel:lastSaved.artikel,artId:lastSaved.artId,
        menge:lastSaved.menge,einheit:lastSaved.einheit,
        methode:lastSaved.methode,kat:lastSaved.kat||'Gemüse',
        vk:String(lastSaved.vk||''),mp:String(lastSaved.mp||'0'),
        ekBrutto:String(lastSaved.ekBrutto||''),
        handlingRate:String(lastSaved.handlingRate||'0.15'),
      }));
      setShowForm(true);setEditId(null);
      setTimeout(()=>window.scrollTo({top:0,behavior:'smooth'}),50);
    }
  };

  // ── JAHRESSTAND
  const yr=cm.slice(0,4);
  const yearRabatt=withdrawals
    .filter(w=>w.datum?.slice(0,4)===yr&&w.methode==='rabatt')
    .reduce((s,w)=>s+(w.vorteil||0),0);
  const FREI=GMBH_RABATT_FREIBETRAG;
  const remaining=Math.max(0,FREI-yearRabatt);
  const exceeded=Math.max(0,yearRabatt-FREI);

  // ── ENTRIES THIS PERIOD
  const sk=curPeriod?.sk||cm+'-01';
  const ek=curPeriod?.ek||cm+'-31';
  const monthW=withdrawals.filter(w=>w.datum>=sk&&w.datum<=ek).sort((a,b)=>b.datum.localeCompare(a.datum));

  // ── FAVS
  const favArts=arts.filter(a=>gmbhFavIds.includes(a.id));

  // ── INPUT STYLE
  const inp={width:'100%',padding:'9px 11px',borderRadius:8,border:'1px solid var(--border)',
    background:'var(--s1)',color:'var(--text)',fontSize:14,outline:'none',boxSizing:'border-box'};

  // ── ROW COMPONENT
  const GmbhRow=({a})=>(
    <div className="row" style={{cursor:'pointer'}} onClick={()=>selectArt(a)}>
      <div className="ri" style={{background:a.mwst===7?'rgba(200,240,96,.08)':'rgba(96,184,240,.08)'}}>
        <Icon name={a.mwst===7?'leaf':'droplet'} size={16} color={a.mwst===7?'var(--lime2)':'var(--blue)'}/>
      </div>
      <div className="rb">
        <div className="rn">
          {a.name}
          {a.uvp&&<span style={{fontSize:9,marginLeft:6,color:'var(--gruen)',fontWeight:600,
            background:'rgba(168,208,96,.15)',borderRadius:4,padding:'1px 5px'}}>UVP</span>}
        </div>
        <div className="rm">
          {(a.marke||a.liefKuerzel)&&<span style={{color:a.quelle==='Manuell'?'var(--t3)':'var(--amber)',marginRight:6}}>{a.marke||a.liefKuerzel}</span>}
          {dispEinh(a.einheit)} · <span style={{color:a.mwst===7?'var(--lime2)':'var(--blue)'}}>{a.mwst}% MwSt</span>
          {a.uvp&&<span style={{color:'var(--gruen)',marginLeft:6}}>UVP: {fN(a.uvp)} €</span>}
        </div>
      </div>
      <div className="rr">
        <div><div className="rv">{fN(a.preis)} €</div><div className="rs">EK/{dispEinh(a.einheit)}</div></div>
        <button className={`fav${gmbhFavIds.includes(a.id)?' on':''}`}
          onClick={e=>{e.stopPropagation();toggleFav(a.id);}}>
          <Icon name="star" size={16} color={gmbhFavIds.includes(a.id)?'var(--amber)':'var(--t3)'}
            strokeWidth={gmbhFavIds.includes(a.id)?2:1.5}/>
        </button>
      </div>
    </div>
  );

  return(
    <div>
      <div className="hdr">
        <div className="hdr-eye">GmbH Sachzuwendung</div>
        <div className="hdr-title">Waren<em>mitnahme</em></div>
      </div>
      <div className="cnt">

        {/* ── HEUTE-WIDGET: Warenmitnahmen heute */}
        {(()=>{
          const todayW=withdrawals.filter(w=>w.datum===cd);
          if(todayW.length===0)return null;
          const todayRabatt=todayW.filter(w=>w.methode==='rabatt').reduce((s,w)=>s+(w.vorteil||0),0);
          const todayMarktwert=todayW.filter(w=>w.methode==='marktwert').reduce((s,w)=>s+(w.vorteil||0),0);
          const todayEk=todayW.filter(w=>w.methode==='ek').reduce((s,w)=>s+(w.vorteil||0),0);
          const todayGes=roundCurrency(todayRabatt+todayMarktwert+todayEk);
          return(
            <div style={{
              background:'rgba(168,208,96,.06)',border:'1px solid rgba(168,208,96,.2)',
              borderRadius:10,padding:'8px 12px',marginBottom:12,
              display:'flex',alignItems:'center',gap:12,flexWrap:'wrap',
            }}>
              <span style={{fontSize:10,fontWeight:700,color:'var(--t2)',textTransform:'uppercase',letterSpacing:.5,flexShrink:0}}>Heute</span>
              <span style={{fontSize:12,fontWeight:600,color:'var(--text)'}}>{fN(todayGes)} €</span>
              {todayRabatt>0&&<span style={{fontSize:10,color:'var(--t2)'}}>Rabatt {fN(todayRabatt)} €</span>}
              {todayMarktwert>0&&<span style={{fontSize:10,color:'var(--t2)'}}>Marktwert {fN(todayMarktwert)} €</span>}
              {todayEk>0&&<span style={{fontSize:10,color:'var(--t2)'}}>EK+H {fN(todayEk)} €</span>}
            </div>
          );
        })()}

        {/* ── JAHRESSTAND */}
        {yearRabatt>0&&(
          <div style={{marginBottom:14}}>
            <div style={{display:'flex',justifyContent:'space-between',fontSize:11,color:'var(--t2)',marginBottom:4}}>
              <span>Warenrabatt {yr} — Freibetrag</span>
              <span style={{fontWeight:600,color:exceeded>0?'var(--red)':'var(--text)'}}>{fN(yearRabatt)} / 1.080,00 €</span>
            </div>
            <div style={{height:5,borderRadius:3,background:'var(--border)',overflow:'hidden'}}>
              <div style={{height:'100%',width:`${Math.min(100,yearRabatt/FREI*100)}%`,
                background:exceeded>0?'var(--red)':'var(--gruen)',borderRadius:3,transition:'width .4s'}}/>
            </div>
            {exceeded>0&&<div style={{fontSize:10,color:'var(--red)',marginTop:3}}>Freibetrag überschritten um {fN(exceeded)} €</div>}
            {exceeded===0&&<div style={{fontSize:10,color:'var(--t3)',marginTop:3}}>Verbleibend: {fN(remaining)} €</div>}
          </div>
        )}

        {/* ── ARTIKEL SUCHE */}
        {!showForm&&(
          <div className="sw">
            <span className="sic">{Ic.search}</span>
            <input className="si" placeholder="Artikel suchen und wählen …"
              value={q} onChange={e=>handleQ(e.target.value)} autoComplete="off"/>
            {q.trim()&&(
              <div className="fbar">
                <button className={filterMwst==='alle'?'fb fb-on':'fb'} onClick={()=>setFilterMwst('alle')}>Alle</button>
                <button className={filterMwst==='7'?'fb fb-on':'fb'} onClick={()=>setFilterMwst('7')}>7%</button>
                <button className={filterMwst==='19'?'fb fb-on':'fb'} onClick={()=>setFilterMwst('19')}>19%</button>
                {allKats.length>0&&<select className="fb" value={filterKat} onChange={e=>setFilterKat(e.target.value)}>
                  <option value="">Alle Kategorien</option>
                  {allKats.map(k=><option key={k} value={k}>{k}</option>)}
                </select>}
                <select className="fb" value={sortBy} onChange={e=>setSortBy(e.target.value)}>
                  <option value="relevanz">Relevanz</option>
                  <option value="name">A-Z</option>
                  <option value="preis_asc">Preis ↑</option>
                  <option value="preis_desc">Preis ↓</option>
                </select>
                {res.length>0&&<span className="fb-ct">{res.length} Treffer</span>}
              </div>
            )}
            {res.length>0&&<div className="sr">{res.map(a=><GmbhRow key={a.id} a={a}/>)}</div>}
          </div>
        )}

        {/* ── FAVORITEN (nur wenn kein Formular + keine Suche) */}
        {!showForm&&!q.trim()&&favArts.length>0&&(
          <>
            <div className="sec">Favoriten <span style={{color:'var(--t3)',fontSize:10}}>★ antippen zum Entfernen</span></div>
            <div className="card">
              {favArts.map(a=><GmbhRow key={a.id} a={a}/>)}
            </div>
          </>
        )}

        {/* ── MANUELL-BUTTON (nur wenn kein Formular offen) */}
        {!showForm&&(
          <button onClick={()=>{setForm({...EMPTY,person:form.person,datum:form.datum});setEditId(null);setShowForm(true);}}
            style={{display:'flex',alignItems:'center',justifyContent:'center',gap:8,width:'100%',
              padding:'13px',borderRadius:12,marginTop:8,marginBottom:6,
              border:'1.5px dashed var(--gruen)',background:'transparent',
              color:'var(--gruen)',fontSize:13,fontWeight:600,cursor:'pointer'}}>
            <Icon name="plus_circle" size={16} color="var(--gruen)"/>
            Manuell / Freitext erfassen
          </button>
        )}

        {/* ── FORMULAR */}
        {showForm&&(
          <>
            {/* ── Scan-Herkunft Banner (nur kurz nach Scan sichtbar) */}
            {pendingArt===null&&form.artId&&form.artikel&&(
              <div style={{display:'flex',alignItems:'center',gap:8,
                background:'rgba(168,208,96,.1)',border:'1px solid rgba(168,208,96,.3)',

// ZENTRALE EXPORT-HELPER: buildExportRows({ mode, entries, meals, meta })
// Liefert reine Datenobjekte – keine formatierten Strings, keine €-Zeichen.
// CSV- und JSON-Exporte greifen ausschließlich auf diese Struktur zu.
// ─────────────────────────────────────────────────────────────────────────────
function buildExportRows({ mode, entries=[], meals=[], meta={} }){
  const exportTS = new Date().toISOString();
  if(mode==='eu'){
    const rows=[];
    entries.forEach(e=>{
      const ust=e.mwst||7;
      const brutto=roundCurrency(e.wert||0);
      const netto=calcNetFromGross(brutto,ust);
      const ustBetrag=calcUstFromNet(netto,ust);
      rows.push({
        _typ:'Warenentnahme',
        datum:e.datum?.slice(0,10)||'',
        beschreibung:e.name||'',
        menge:roundCurrency(e.menge),
        einheit:e.einheit||'',
        ekPreisNetto:roundCurrency(e.preis),
        ustSatz:ust,
        betragBrutto:brutto,
        betragNetto:netto,
        ustBetrag,
        exportTimestamp:exportTS,
        reportVersion:meta.reportVersion||'1.3',
      });
    });
    meals.forEach(m=>{
      const brutto=roundCurrency(m.wert||0);
      const netto=calcNetFromGross(brutto,7);
      const ustBetrag=calcUstFromNet(netto,7);
      rows.push({
        _typ:'Personalessen',
        datum:m.datum||'',
        beschreibung:m.label||'',
        menge:1,
        einheit:'Tag',
        ekPreisNetto:null,
        ustSatz:7,
        betragBrutto:brutto,
        betragNetto:netto,
        ustBetrag,
        exportTimestamp:exportTS,
        reportVersion:meta.reportVersion||'1.3',
      });
    });
    return rows;
  }
  if(mode==='gmbh'){
    const rows=[];
    meals.forEach(m=>{
      const brutto=roundCurrency(m.vorteil||0);
      const netto=calcNetFromGross(brutto,7);
      rows.push({
        _typ:'Mahlzeit',
        datum:m.datum||'',
        person:m.person||'',
        beschreibung:m.label||'',
        menge:1, einheit:'Tag',
        methode:'sachbezug',
        bewertungBrutto:brutto,
        bewertungNetto:netto,
        ustSatz:7,
        rabattfreibetragRelevant:false,
        exportTimestamp:exportTS,
        reportVersion:meta.reportVersion||'1.0',
      });
    });
    entries.forEach(w=>{
      const brutto=roundCurrency(w.vorteil||0);
      const ust=w.mwst||7;
      const netto=calcNetFromGross(brutto,ust);
      rows.push({
        _typ:'Warenmitnahme',
        datum:w.datum||'',
        person:w.person||'',
        artikel:w.artikel||'',
        artId:w.artId||null,
        ean:w.ean||null,
        menge:roundCurrency(w.menge),
        einheit:w.einheit||'',
        methode:w.methode||'',
        bewertungBrutto:brutto,
        bewertungNetto:netto,
        ustSatz:ust,
        rabattfreibetragRelevant:isDiscountRelevant(w.methode),
        basis:{
          vkBrutto:w.methode==='rabatt'?(roundCurrency(w.vk)||null):null,
          employeePriceBrutto:w.methode==='rabatt'?(roundCurrency(w.mp)||null):null,
          ekBrutto:w.methode==='ek'?(roundCurrency(w.ekBrutto)||null):null,
          handlingRatePct:w.methode==='ek'?Math.round((parseFloat(w.handlingRate)||0.15)*100):null,
          marketValuePerUnitBrutto:w.methode==='marktwert'?(roundCurrency(w.mvWert)||null):null,
          category:w.methode==='marktwert'?(w.kat||null):null,
        },
        createdAt:w.createdAt||null,
        updatedAt:w.updatedAt||null,
        isEkAusnahme:w.isEkAusnahme||false,
        tagVegan:w.tagVegan||false,
        exportTimestamp:exportTS,
        reportVersion:meta.reportVersion||'1.0',
      });
    });
    return rows;
  }
  return [];
}

// GmbH BERICHT TAB
// ─────────────────────────────────────────────────────────────────────────────
function GmbhReportTab({meals,withdrawals,persons,setPersons,firma,setFirma,periodDay,setPeriodDay}){
  const now=new Date();
  const pd=periodDay||20; // Default: 20. (Buchhaltungsstichtag)

  // Perioden berechnen (identische Logik wie EU-ReportTab)
  const periods=React.useMemo(()=>{
    const all=[...meals.map(m=>m.datum),...withdrawals.map(w=>w.datum)].filter(Boolean);
    if(!all.length)return[];
    const minD=new Date(all.reduce((a,b)=>a<b?a:b));
    const maxD=new Date(all.reduce((a,b)=>a>b?a:b));
    const result=[];
    const dStr=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    let cur=new Date(minD.getFullYear(),minD.getMonth(),pd);
    if(cur>minD)cur=new Date(cur.getFullYear(),cur.getMonth()-1,pd);
    while(cur<=maxD){
      const start=new Date(cur);
      const end=new Date(cur.getFullYear(),cur.getMonth()+1,pd-1);
      const sk=dStr(start),ek=dStr(end);
      const lbl=pd===1
        ?start.toLocaleDateString('de-DE',{month:'long',year:'numeric'})
        :`${start.toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit'})}–${end.toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit',year:'numeric'})}`;
      result.push({sk,ek,lbl,key:`${sk}_${ek}`,monat:start.getFullYear()+'-'+String(start.getMonth()+1).padStart(2,'0')});
      cur=new Date(cur.getFullYear(),cur.getMonth()+1,pd);
    }
    return result.reverse();
  },[meals,withdrawals,pd]);

  const[editPeriod,setEditPeriod]=useState(false);
  const[tmpDay,setTmpDay]=useState(String(pd));

  // Smart default: neueste Periode mit Daten
  const smartDefault=React.useMemo(()=>{
    const p=periods.find(p=>meals.some(x=>x.datum>=p.sk&&x.datum<=p.ek)||withdrawals.some(x=>x.datum>=p.sk&&x.datum<=p.ek));
    return p?.key||periods[0]?.key||null;
  },[periods]);
  const[selKey,setSelKey]=useState(null);
  const sel=selKey?periods.find(p=>p.key===selKey):periods.find(p=>p.key===smartDefault)||periods[0];

  const[editName,setEditName]=useState(null);
  const[editFirmaMode,setEditFirmaMode]=useState(false);
  const renamePerson=(id,name)=>{const ps=persons.map(p=>p.id===id?{...p,name:name.trim()||p.name}:p);setPersons(ps);gmbhSavePersons(ps);};
  const yr=(sel?.sk||now.getFullYear().toString()).slice(0,4);

  const mMeals=sel?meals.filter(m=>m.datum>=sel.sk&&m.datum<=sel.ek):[];
  const mWith=sel?withdrawals.filter(w=>w.datum>=sel.sk&&w.datum<=sel.ek):[];
  const totalMeals=mMeals.reduce((s,m)=>s+(m.vorteil||0),0);
  const totalWith=mWith.reduce((s,w)=>s+(w.vorteil||0),0);
  const totalDiscount=mWith.filter(w=>w.methode==='rabatt').reduce((s,w)=>s+(w.vorteil||0),0);
  const totalMarket=mWith.filter(w=>w.methode==='marktwert').reduce((s,w)=>s+(w.vorteil||0),0);
  const totalEk=mWith.filter(w=>w.methode==='ek').reduce((s,w)=>s+(w.vorteil||0),0);
  // ── STILLER INTEGRITÄTSCHECK ── kein UI, nur console.warn
  React.useEffect(()=>{
    if(!sel)return;
    const sumParts=roundCurrency(totalDiscount+totalMarket+totalEk);
    if(Math.abs(sumParts-roundCurrency(totalWith))>0.01)
      console.warn('[Warenentnahme] Summenabweichung GmbH: Methoden-Summe=',sumParts,'totalWith=',roundCurrency(totalWith));
  },[totalDiscount,totalMarket,totalEk,totalWith,sel]);

  const personName=id=>persons.find(p=>p.id===id)?.name||id;
  const personRabatt=gmbhRabattByPerson(withdrawals,persons,yr);

  const byPerson=persons.filter(p=>p.aktiv).map(p=>({
    ...p,
    mList:mMeals.filter(m=>m.person===p.id),
    wList:mWith.filter(w=>w.person===p.id),
    mTotal:mMeals.filter(m=>m.person===p.id).reduce((s,m)=>s+(m.vorteil||0),0),
    wTotal:mWith.filter(w=>w.person===p.id).reduce((s,w)=>s+(w.vorteil||0),0),
    wRabatt:mWith.filter(w=>w.person===p.id&&w.methode==='rabatt').reduce((s,w)=>s+(w.vorteil||0),0),
    wMarkt:mWith.filter(w=>w.person===p.id&&w.methode==='marktwert').reduce((s,w)=>s+(w.vorteil||0),0),
    wEk:mWith.filter(w=>w.person===p.id&&w.methode==='ek').reduce((s,w)=>s+(w.vorteil||0),0),
  }));
  // YTD (gesamtes Jahr) je Person
  const ytdByPerson=buildYtdByPerson(withdrawals,meals,persons,yr);

  const exportJSON=()=>{
    const exportTS=new Date().toISOString();
    const cv=v=>(v===undefined||v===null)?'':v;
    const metadata={
      firma:cv(firma),
      rechtsform:'GmbH / UG (haftungsbeschraenkt)',
      zeitraum:{von:sel?.sk||'',bis:sel?.ek||''},
      zeitraumLabel:sel?.lbl||'',
      erstelltAt:exportTS,
      reportVersion:GMBH_REPORT_VERSION,
      exportiertePersonen:persons.filter(p=>p.aktiv).map(p=>p.name),
    };
    const entries=[
      ...mMeals.map(m=>({
        typ:'Mahlzeit/Sachbezug',
        datum:cv(m.datum),person:cv(personName(m.person)),
        artikel:cv(m.label),ean:'',menge:1,einheit:'Tag',
        methode:'sachbezug',
        bewertungBrutto:parseFloat(m.vorteil)||0,
        bewertungNetto:calcNetFromGross(m.vorteil||0,7),
        ustSatz:7,
        rabattfreibetragRelevant:false,
        basis:{},
        plausibilitaetsWarnung:false,plausibilitaetsHinweis:'',
        createdAt:cv(m.createdAt),updatedAt:cv(m.updatedAt),

      })),
      ...mWith.map(w=>{
        const ust=w.mwst||7;
        const brutto=parseFloat(w.vorteil)||0;
        const pf=buildPlausibilityFlags(w);
        return {
          typ:'Warenmitnahme',
          datum:cv(w.datum),person:cv(personName(w.person)),
          artikel:cv(w.artikel),ean:cv(w.ean||''),
          menge:parseFloat(w.menge)||1,einheit:cv(w.einheit),
          methode:w.methode==='rabatt'?'Warenrabatt':w.methode==='marktwert'?'Marktwert':'EK+Handling',
          bewertungBrutto:brutto,
          bewertungNetto:calcNetFromGross(brutto,ust),
          ustSatz:ust,
          rabattfreibetragRelevant:isDiscountRelevant(w.methode),
          basis:{
            vkBrutto:w.methode==='rabatt'?(parseFloat(w.vk)||0):null,
            employeePriceBrutto:w.methode==='rabatt'?(parseFloat(w.mp)||0):null,
            ekBrutto:w.methode==='ek'?(parseFloat(w.ekBrutto)||0):null,
            handlingRatePct:w.methode==='ek'?Math.round((parseFloat(w.handlingRate)||0.15)*100):null,
            marketValuePerUnitBrutto:w.methode==='marktwert'?(parseFloat(w.mvWert)||0):null,
            category:w.methode==='marktwert'?(w.kat||null):null,
            marktwertQuelle:w.methode==='marktwert'?getMarketValueSource(w):null,
          },
          plausibilitaetsWarnung:pf.warnung,
          plausibilitaetsHinweis:pf.hinweis,
          createdAt:cv(w.createdAt),updatedAt:cv(w.updatedAt),
          exportTimestamp:exportTS,reportVersion:GMBH_REPORT_VERSION,
          isEkAusnahme:w.isEkAusnahme||false,
          tagVegan:w.tagVegan||false,
        };
      }),
    ];
    const out=JSON.stringify({metadata,entries},null,2);
    const blob=new Blob([out],{type:'application/json'});
    triggerDownload(blob,`gmbh-archiv-${sel?.sk||'export'}.json`);
  };

  const exportCSV=()=>{
    // ── CSV-Zeilen-Helper: sauber, kein undefined/null, kein Semikolon
    // cv: beliebiger Wert → sicherer String
    const cv=v=>(v===undefined||v===null||v==='undefined'||v==='null')?'':String(v).replace(/;/g,',').trim();
    // cn: Zahl → Dezimalpunkt, keine Formatierung, keine Währungszeichen
    const cn=formatNumberCSV; // zentrale Funktion
    // cb: boolean → 'TRUE'/'FALSE' (Großbuchstaben, Spec-konform)
    const cb=b=>b?'TRUE':'FALSE';
    // cp: Prozentzahl als reine Zahl (z.B. 0.15 → '15', keine % im String)
    const cp=r=>{const p=parseFloat(r);return isNaN(p)?'':String(Math.round(p*100));};

    // ── SPEC: Header in Zeile 1, KEINE Metadaten davor
    // exportTimestamp identisch für alle Zeilen dieses Exports
    const exportTS=new Date().toISOString();

    const header=[
      'datum','person','typ','artikel','ean','menge','einheit',
      'methode',
      'bewertungBrutto','bewertungNetto','ustSatz',
      'rabattfreibetragRelevant',
      'basis_vkBrutto','basis_employeePriceBrutto',
      'basis_ekBrutto','basis_handlingRatePct',
      'basis_marketValuePerUnitBrutto','basis_category','marktwertQuelle',
      'plausibilitaetsWarnung','plausibilitaetsHinweis',
      'createdAt','updatedAt','exportTimestamp','reportVersion',
      'trace_methodChosen','trace_marketVsEkRatio',
      'trace_plausibilityWarning','trace_plausibilityNote',
      'trace_categoryOverrideUsed','trace_manuallyModified','trace_decisionTimestamp'
    ].join(';');

    const rows=[header];  // ← Zeile 1 = Header, keine Metadaten davor

    mMeals.forEach(m=>{
      const brutto=parseFloat(m.vorteil)||0;
      const ust=7;
      const netto=calcNetFromGross(brutto,ust);
      rows.push([
        cv(m.datum),                  // datum (ISO)
        cv(personName(m.person)),     // person
        'Mahlzeit/Sachbezug',         // typ
        cv(m.label),                  // artikel
        '',                           // ean
        '1',                          // menge
        'Tag',                        // einheit
        'sachbezug',                  // methode
        cn(brutto),                   // bewertungBrutto (reine Zahl, Punkt)
        cn(netto),                    // bewertungNetto
        String(ust),                  // ustSatz
        cb(false),                    // rabattfreibetragRelevant — Sachbezug nie Freibetrag
        '','',                        // basis_vkBrutto, basis_employeePriceBrutto
        '','',                        // basis_ekBrutto, basis_handlingRatePct
        '','','',                     // basis_marketValuePerUnitBrutto, basis_category, marktwertQuelle
        cb(false),'',                 // plausibilitaetsWarnung, plausibilitaetsHinweis
        cv(m.createdAt||''),          // createdAt
        cv(m.updatedAt||''),          // updatedAt
        exportTS,                     // exportTimestamp
        GMBH_REPORT_VERSION,          // reportVersion
        // Trace — Mahlzeiten haben keinen Bewertungs-Trace
        '','','FALSE','','FALSE','FALSE',''
      ].join(';'));
    });

    mWith.forEach(w=>{
      const brutto=parseFloat(w.vorteil)||0;
      const ust=w.mwst||7;
      const netto=calcNetFromGross(brutto,ust);
      const pf=buildPlausibilityFlags(w);
      const isRabatt=w.methode==='rabatt';
      const isMarkt=w.methode==='marktwert';
      const isEk=w.methode==='ek';
      const methLabel=isRabatt?'Warenrabatt':isMarkt?'Marktwert':'EK+Handling';
      rows.push([
        cv(w.datum),                                       // datum (ISO)
        cv(personName(w.person)),                          // person
        'Warenmitnahme',                                   // typ
        cv(w.artikel),                                     // artikel
        cv(w.ean||''),                                     // ean
        cn(w.menge||1),                                    // menge (Punkt als Dezimaltrennzeichen)
        cv(w.einheit),                                     // einheit
        methLabel,                                         // methode
        cn(brutto),                                        // bewertungBrutto (reine Zahl)
        cn(netto),                                         // bewertungNetto
        String(ust),                                       // ustSatz
        cb(isDiscountRelevant(w.methode)),                 // rabattfreibetragRelevant TRUE/FALSE
        isRabatt?cn(w.vk||0):'',                          // basis_vkBrutto
        isRabatt?cn(w.mp||0):'',                          // basis_employeePriceBrutto
        isEk?cn(w.ekBrutto||0):'',                        // basis_ekBrutto
        isEk?cp(w.handlingRate||0.15):'',                 // basis_handlingRatePct (nur Zahl, kein %)
        isMarkt?cn(w.mvWert||0):'',                       // basis_marketValuePerUnitBrutto
        isMarkt?cv(w.kat||''):'',                         // basis_category
        isMarkt?cv(getMarketValueSource(w)):'',            // marktwertQuelle
        cb(pf.warnung),                                    // plausibilitaetsWarnung TRUE/FALSE
        cv(pf.hinweis),                                    // plausibilitaetsHinweis
        cv(w.createdAt||''),                               // createdAt
        cv(w.updatedAt||''),                               // updatedAt
        exportTS,                                          // exportTimestamp (identisch für alle Zeilen)
        GMBH_REPORT_VERSION,                               // reportVersion
        // Trace — aus gespeichertem evaluationTrace oder Fallback-Berechnung
        (()=>{
          const t = w.evaluationTrace || buildEvaluationTrace(w);
          return [
            cv(t.methodChosen),
            t.marketVsEkRatio !== null ? String(t.marketVsEkRatio) : '',
            cb(t.plausibilityWarning),
            cv(t.plausibilityNote||''),
            cb(t.categoryOverrideUsed),
            cb(t.manuallyModified),
            cv(t.decisionTimestamp||''),
          ].join(';');
        })()
      ].join(';'));
    });

    // BOM für Excel-Kompatibilität, kein Metadaten-Header
    const blob=new Blob(['\uFEFF'+rows.join('\r\n')],{type:'text/csv;charset=utf-8'});
    triggerDownload(blob,`gmbh-bericht-${sel?.sk||'export'}.csv`);
  };

  const exportPDF=()=>{
    const {jsPDF}=window.jspdf;
    const doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
    const W=210,ML=14,MR=14,TW=W-ML-MR;
    const GREEN=[45,90,27],DKGREEN=[26,60,14],GRAY=[120,120,120],LGRAY=[180,180,180],
          BLACK=[26,38,18],LIGHT=[240,245,228],AMBER=[180,110,10],WHITE=[255,255,255];

    // ── Hilfsfunktionen für das PDF ──────────────────────────────
    const safeY=(margin=272)=>{if(y>margin){doc.addPage();y=20;}};
    const hline=(yy,col=LGRAY)=>{doc.setDrawColor(...col);doc.line(ML,yy,W-MR,yy);};
    const txt=(t,x,yy,opts={})=>{doc.text(String(t||''),x,yy,opts);};
    // PDF-Formatter: Komma als Dezimaltrennzeichen
    const fc=v=>formatCurrencyPDF(v);

    let y=18;
    const firmaLine=firma||'';
    const gfNames=persons.filter(p=>p.aktiv).map(p=>p.name).join(', ');
    const erstelltStr=new Date().toLocaleString('de-DE',{dateStyle:'short',timeStyle:'short'});
    const standStr=new Date().toISOString();  // ISO-Timestamp für "Stand der Daten"

    // ── 1. KOPFZEILE ─────────────────────────────────────────────
    doc.setFillColor(...GREEN);doc.rect(0,0,W,30,'F');
    doc.setTextColor(...WHITE);
    doc.setFontSize(12);doc.setFont('helvetica','bold');
    txt('Interne Dokumentation — Lohnabrechnung',ML,11);
    if(firmaLine){doc.setFontSize(9);doc.setFont('helvetica','normal');txt(firmaLine,W-MR,11,{align:'right'});}
    doc.setFontSize(8);doc.setFont('helvetica','normal');
    txt(`GmbH / UG  |  Zeitraum: ${sel?sel.lbl:'-'}  |  Erstellt: ${erstelltStr}  |  Version ${GMBH_REPORT_VERSION}`,ML,19);
    if(gfNames) txt(`Gesellschafter-GF: ${gfNames}`,ML,25);
    y=gfNames?38:33;
    doc.setTextColor(...BLACK);

    // ── 2. METADATEN-BLOCK ───────────────────────────────────────
    // 4 Zeilen untereinander (keine 2-Spalten-Aufteilung) → kein Überlappen
    const metaLines=[
      ['Firma:',           firmaLine||'(nicht angegeben)'],
      ['Rechtsform:',      'GmbH / UG (haftungsbeschränkt)'],
      ['Zeitraum:',        sel?`${sel.sk} bis ${sel.ek}`:'-'],
      ['Bewertungsgrl. Mahlzeiten:', `Amtliche Sachbezugswerte ${yr}`],
      ['Stand der Daten:', standStr],
    ];
    const metaH=8+metaLines.length*5.5;
    doc.setFillColor(...LIGHT);doc.roundedRect(ML,y,TW,metaH,2,2,'F');
    doc.setFontSize(7.5);doc.setFont('helvetica','bold');
    txt('Metadaten',ML+3,y+6);
    const KW=42; // Schlüsselbreite — einheitlicher Abstand für alle Zeilen
    metaLines.forEach(([k,v],i)=>{
      const ry=y+10+i*5.5;
      doc.setFont('helvetica','bold');doc.setFontSize(7);
      txt(k, ML+3, ry);
      doc.setFont('helvetica','normal');
      txt(v, ML+3+KW, ry);
    });
    y+=metaH+4;

    // ── 3. SUMMEN-BLOCK ──────────────────────────────────────────
    const totalNetto=calcNetFromGross(totalMeals+totalWith, 7); // Näherung; exakt unten
    const totalMealsNetto=calcNetFromGross(totalMeals,7);
    const totalDiscountNetto=calcNetFromGross(totalDiscount,7);
    const totalMarketNetto=calcNetFromGross(totalMarket,7);
    const totalEkNetto=calcNetFromGross(totalEk,7);

    doc.setFontSize(8.5);doc.setFont('helvetica','bold');
    txt('Zusammenfassung — Bewertungsbetraege',ML,y);y+=5;
    hline(y,GREEN);y+=3;

    // Tabellenkopf Summen
    const SC=[ML+2,ML+65,ML+100,ML+135];
    doc.setFontSize(7);doc.setTextColor(...GRAY);
    txt('Position',SC[0],y);txt('Brutto (EUR)',SC[1],y);txt('Netto (EUR)',SC[2],y);txt('Freibetrag',SC[3],y);
    y+=4;hline(y,LGRAY);y+=3;
    doc.setTextColor(...BLACK);doc.setFont('helvetica','normal');doc.setFontSize(7.5);

    const sumRows=[
      ['Mahlzeiten (Sachbezug)',totalMeals,totalMealsNetto,'Nein'],
      totalDiscount>0?['Warenrabatt',totalDiscount,totalDiscountNetto,'Ja — bis 1.080 EUR/Jahr']:null,
      totalMarket>0?['Marktwert-Bewertung',totalMarket,totalMarketNetto,'Nein']:null,
      totalEk>0?['EK+Handling (Ausnahme)',totalEk,totalEkNetto,'Nein']:null,
    ].filter(Boolean);
    sumRows.forEach(([lbl,br,ne,fb])=>{
      txt(lbl,SC[0],y);txt(fc(br),SC[1],y);txt(fc(ne),SC[2],y);txt(fb,SC[3],y);y+=5;
    });
    hline(y,DKGREEN);y+=3;
    doc.setFont('helvetica','bold');
    const totalBruttoExakt=totalMeals+totalWith;
    const totalNettoExakt=sumRows.reduce((s,[,br,ne])=>s+ne,0);
    txt('Gesamt',SC[0],y);txt(fc(totalBruttoExakt),SC[1],y);txt(fc(totalNettoExakt),SC[2],y);
    y+=8;

    // ── 3b. UST-AUFSCHLÜSSELUNG ──────────────────────────────────
    const gUstB7=roundCurrency(
      mMeals.filter(m=>m.datum>='2026-01-01').reduce((s,m)=>s+(m.vorteil||0),0)+
      mWith.filter(w=>(w.mwst||7)===7).reduce((s,w)=>s+(w.vorteil||0),0));
    const gUstB19=roundCurrency(
      mMeals.filter(m=>m.datum<'2026-01-01').reduce((s,m)=>s+(m.vorteil||0),0)+
      mWith.filter(w=>(w.mwst||7)===19).reduce((s,w)=>s+(w.vorteil||0),0));
    const gUstN7=calcNetFromGross(gUstB7,7),gUstN19=calcNetFromGross(gUstB19,19);
    const gUstU7=roundCurrency(gUstB7-gUstN7),gUstU19=roundCurrency(gUstB19-gUstN19);
    const gUstBGes=roundCurrency(gUstB7+gUstB19);
    const gUstNGes=roundCurrency(gUstN7+gUstN19),gUstUGes=roundCurrency(gUstU7+gUstU19);
    safeY(240);
    doc.setFontSize(8.5);doc.setFont('helvetica','bold');doc.setTextColor(...BLACK);
    txt('USt-Aufschlüsselung',ML,y);y+=5;
    hline(y,GREEN);y+=3;
    doc.setFontSize(7);doc.setTextColor(...GRAY);
    txt('USt-Satz',ML+2,y);txt('Brutto (EUR)',ML+65,y);txt('Netto (EUR)',ML+125,y);txt('USt-Betrag (EUR)',W-MR,y);
    y+=4;hline(y,LGRAY);y+=3;
    doc.setTextColor(...BLACK);doc.setFont('helvetica','normal');doc.setFontSize(7.5);
    if(gUstB7>0){txt('7 %',ML+2,y);txt(fc(gUstB7),ML+65,y);txt(fc(gUstN7),ML+125,y);txt(fc(gUstU7),W-MR,y);y+=5;}
    if(gUstB19>0){txt('19 %',ML+2,y);txt(fc(gUstB19),ML+65,y);txt(fc(gUstN19),ML+125,y);txt(fc(gUstU19),W-MR,y);y+=5;}
    hline(y,DKGREEN);y+=3;
    doc.setFont('helvetica','bold');
    txt('Gesamt',ML+2,y);txt(fc(gUstBGes),ML+65,y);txt(fc(gUstNGes),ML+125,y);txt(fc(gUstUGes),W-MR,y);
    y+=8;

    // ── 4. JAHRESÜBERSICHT JE PERSON (YTD) ──────────────────────
    safeY(240);
    doc.setFontSize(8.5);doc.setFont('helvetica','bold');
    txt(`Jahresuebersicht ${yr} je Person (YTD)`,ML,y);y+=5;
    hline(y,GREEN);y+=3;

    const YC=[ML+2,ML+42,ML+72,ML+102,ML+132,ML+162];
    doc.setFontSize(6.5);doc.setTextColor(...GRAY);
    ['Person','Sachbezug','Warenrabatt','Marktwert','EK+Handling','Freibetrag Rest'].forEach((h,i)=>txt(h,YC[i],y));
    y+=4;hline(y,LGRAY);y+=3;
    doc.setTextColor(...BLACK);doc.setFont('helvetica','normal');doc.setFontSize(7);
    ytdByPerson.forEach(p=>{
      safeY();
      txt(p.name,YC[0],y);
      txt(fc(p.sachbezug),YC[1],y);
      txt(fc(p.rabatt),YC[2],y);
      txt(fc(p.markt),YC[3],y);
      txt(fc(p.ek),YC[4],y);
      doc.setFont('helvetica','bold');
      const restCol=p.freibetragRest<=0?AMBER:GREEN;
      doc.setTextColor(...restCol);
      txt(fc(p.freibetragRest),YC[5],y);
      doc.setTextColor(...BLACK);doc.setFont('helvetica','normal');
      y+=5;
    });
    y+=5;

    // ── 5. DETAIL-POSITIONEN JE PERSON ──────────────────────────
    byPerson.forEach(p=>{
      if(p.mList.length===0&&p.wList.length===0)return;
      safeY(250);
      doc.setFontSize(8.5);doc.setFont('helvetica','bold');
      txt(p.name,ML,y);y+=5;
      hline(y,GREEN);y+=3;

      // Mahlzeiten
      if(p.mList.length>0){
        doc.setFontSize(7);doc.setFont('helvetica','bold');doc.setTextColor(...GRAY);
        txt('Mahlzeiten (Sachbezug)',ML+2,y);y+=4;
        doc.setFont('helvetica','normal');doc.setTextColor(...BLACK);
        p.mList.forEach(m=>{
          safeY();
          const netto=calcNetFromGross(m.vorteil||0,7);
          txt(m.datum,ML+2,y);
          txt(m.label,ML+22,y);
          txt(`${fc(m.vorteil||0)} EUR brutto`,ML+80,y);
          txt(`${fc(netto)} EUR netto`,ML+118,y);
          txt('Sachbezugswert '+yr,ML+152,y);
          y+=5;
        });
        y+=2;
      }

      // Warenmitnahmen
      if(p.wList.length>0){
        doc.setFontSize(7);doc.setFont('helvetica','bold');doc.setTextColor(...GRAY);
        txt('Warenmitnahmen',ML+2,y);y+=4;
        doc.setFont('helvetica','normal');doc.setTextColor(...BLACK);

        // Spaltenkopf — Spec: Datum|Artikel|EAN|Menge|Methode|Basis|Brutto|Netto|USt|Freibetr.
        // Spaltenbreiten optimiert für A4 (182mm nutzbar):
        // Datum=18, Artikel=28, EAN=22, Menge=14, Methode=16, Basis=30, Brutto=14, Netto=14, USt=8, FB=10
        const DC=[ML+2,ML+20,ML+48,ML+70,ML+84,ML+100,ML+131,ML+147,ML+163,ML+172];
        doc.setFontSize(6);doc.setTextColor(...GRAY);
        ['Datum','Artikel','EAN','Menge','Methode','Basis','Brutto','Netto','USt','FB'].forEach((h,i)=>txt(h,DC[i],y));
        y+=3;hline(y,LGRAY);y+=2;
        doc.setTextColor(...BLACK);doc.setFontSize(6.5);

        p.wList.forEach(w=>{
          safeY();
          const ust=w.mwst||7;
          const brutto=w.vorteil||0;
          const netto=calcNetFromGross(brutto,ust);
          const pf=buildPlausibilityFlags(w);
          const basisTxt=getBasisText(w);
          const methKurz=w.methode==='rabatt'?'Warenrabatt':w.methode==='marktwert'?'Marktwert':'EK+Handling';

          txt(w.datum,DC[0],y);
          // Artikel kürzen (max 14 Zeichen für die schmälere Spalte)
          const artTrunc=w.artikel?.length>14?w.artikel.slice(0,13)+'.':w.artikel||'';
          txt(artTrunc,DC[1],y);
          // EAN — wenn vorhanden; leer lassen wenn nicht
          txt(w.ean?String(w.ean):'',DC[2],y);
          txt(`${w.menge||1} ${w.einheit||''}`,DC[3],y);
          txt(methKurz,DC[4],y);
          // Basis als Kurzform in Spalte, volle Basis als Unterzeile
          const basisKurz=w.methode==='rabatt'?'VK/MP':w.methode==='marktwert'?w.kat||'Kat.':'EK+%';
          txt(basisKurz,DC[5],y);
          txt(`${fc(brutto)} EUR`,DC[6],y);
          txt(`${fc(netto)} EUR`,DC[7],y);
          txt(`${ust}%`,DC[8],y);
          txt(isDiscountRelevant(w.methode)?'Ja':'Nein',DC[9],y);
          y+=4;

          // Berechnungsbasis als Unterzeile (volle Lesbarkeit)
          if(basisTxt){
            doc.setTextColor(...GRAY);doc.setFontSize(5.5);
            txt(`  Basis: ${basisTxt}`,DC[1],y);
            doc.setTextColor(...BLACK);doc.setFontSize(6.5);
            y+=4;
          }

          // Plausibilitäts-Warnung
          if(pf.warnung){
            doc.setTextColor(...AMBER);doc.setFontSize(5.5);
            txt(`  Hinweis: ${pf.hinweis}`,DC[1],y);
            doc.setTextColor(...BLACK);doc.setFontSize(6.5);
            y+=4;
          }
        });
      }

      // Person-Summe
      hline(y,LGRAY);y+=3;
      doc.setFont('helvetica','bold');doc.setFontSize(7);
      const pBrutto=p.mTotal+p.wTotal;
      txt(`Summe ${p.name}:  Mahlzeiten ${fc(p.mTotal)} EUR  |  Warenrabatt ${fc(p.wRabatt)} EUR  |  Marktwert ${fc(p.wMarkt)} EUR  |  EK+Handling ${fc(p.wEk)} EUR  |  Gesamt ${fc(pBrutto)} EUR`,ML+2,y);
      doc.setFont('helvetica','normal');
      y+=8;
    });

    // ── 6. BEWERTUNGSLOGIK-ANHANG ────────────────────────────────
    safeY(200);
    doc.setFontSize(8.5);doc.setFont('helvetica','bold');
    txt('Bewertungslogik (intern)',ML,y);y+=5;
    hline(y,GREEN);y+=4;
    doc.setFontSize(7);doc.setFont('helvetica','normal');
    const logik=[
      'Warenrabatt (Freibetrag): Gilt nur wenn ein tatsaechlicher VK/UVP bekannt ist. Vorteil = VK minus Mitarbeiterpreis. Jahresfreibetrag 1.080 EUR pro Person.',
      'Marktwert: Gilt fuer Roh- und Lagerware ohne bekannten UVP. Bewertung nach Kategorie-Referenzwert oder manuellem Override. Kein Jahresfreibetrag.',
      'EK+Handling: Nur als Ausnahme wenn weder VK/UVP noch plausibler Marktwert ermittelbar. Formel: EK-Preis x (1 + Handling-Rate). Wird im Export gekennzeichnet.',
      'Restaurant- und Dienstleistungspreise sind keine zulaessige Bewertungsbasis fuer Warenmitnahmen.',
      'Sachbezug Mahlzeiten: Amtliche Sachbezugswerte (BMF). Jahresabrechnung in der Lohnabrechnung.',
      'Dieses Dokument ist interne Dokumentation. Kein Steuer- oder Rechtsrat.',
    ];
    logik.forEach(line=>{
      safeY();
      // Zeilenumbruch bei langen Zeilen (max ~170mm bei fontSize 7)
      const wrapped=doc.splitTextToSize('- '+line, TW-4);
      wrapped.forEach(wl=>{txt(wl,ML+3,y);y+=4.5;});
      y+=1;
    });

    // ── FUSSZEILE ────────────────────────────────────────────────
    // ── 7. ÄNDERUNGSHISTORIE (nur wenn updatedAt ≠ createdAt vorliegt) ────────
    const changedEntries=[...mWith].filter(w=>w.updatedAt&&w.createdAt&&w.updatedAt!==w.createdAt);
    if(changedEntries.length>0){
      safeY(200);
      doc.setFontSize(8);doc.setFont('helvetica','bold');
      txt('Aenderungshistorie (technisch)',ML,y);y+=5;
      hline(y,GREEN);y+=3;
      doc.setFontSize(6);doc.setTextColor(...GRAY);
      txt('Artikel',ML+2,y);txt('Erstellt am',ML+70,y);txt('Zuletzt geaendert am',ML+120,y);
      y+=3;hline(y,LGRAY);y+=2;
      doc.setTextColor(...BLACK);doc.setFont('helvetica','normal');doc.setFontSize(6.5);
      changedEntries.forEach(w=>{
        safeY();
        const artTrunc=w.artikel?.length>30?w.artikel.slice(0,29)+'.':w.artikel||'';
        txt(artTrunc,ML+2,y);
        txt(w.createdAt?new Date(w.createdAt).toLocaleString('de-DE',{dateStyle:'short',timeStyle:'short'}):'',ML+70,y);
        txt(w.updatedAt?new Date(w.updatedAt).toLocaleString('de-DE',{dateStyle:'short',timeStyle:'short'}):'',ML+120,y);
        y+=4.5;
      });
      y+=4;
    }

    // ── 8. TECHNISCHE BEWERTUNGSDOKUMENTATION (optional) ─────────
    // Nur anzeigen wenn mindestens ein Eintrag:
    // plausibilityWarning=true, manuallyModified=true oder categoryOverrideUsed=true
    const traceEntries = mWith.map(w => ({
      w,
      t: w.evaluationTrace || buildEvaluationTrace(w),
    })).filter(({t}) =>
      t.plausibilityWarning || t.manuallyModified || t.categoryOverrideUsed
    );
    if(traceEntries.length > 0){
      safeY(200);
      doc.setFontSize(8.5);doc.setFont('helvetica','bold');
      txt('Technische Bewertungsdokumentation',ML,y);y+=5;
      hline(y,GREEN);y+=3;
      // Spaltenkopf
      const TC=[ML+2,ML+28,ML+60,ML+95,ML+122,ML+148];
      doc.setFontSize(6);doc.setTextColor(...GRAY);
      ['Datum','Artikel','Methode','Plausib.-Warnung','Override','Man. Aenderung']
        .forEach((h,i)=>txt(h,TC[i],y));
      y+=3;hline(y,LGRAY);y+=2;
      doc.setTextColor(...BLACK);doc.setFont('helvetica','normal');doc.setFontSize(6.5);
      traceEntries.forEach(({w,t})=>{
        safeY();
        const artT=w.artikel?.length>14?w.artikel.slice(0,13)+'.':w.artikel||'';
        txt(w.datum||'',TC[0],y);
        txt(artT,TC[1],y);
        txt(t.methodChosen||'',TC[2],y);
        // Plausib.-Warnung mit Farbe wenn TRUE
        if(t.plausibilityWarning){
          doc.setTextColor(...AMBER);
          txt('Ja',TC[3],y);
          doc.setTextColor(...BLACK);
        } else {
          txt('Nein',TC[3],y);
        }
        txt(t.categoryOverrideUsed?'Ja':'Nein',TC[4],y);
        txt(t.manuallyModified?'Ja':'Nein',TC[5],y);
        y+=4;
        // Plausib.-Hinweis als Unterzeile
        if(t.plausibilityNote){
          doc.setTextColor(...GRAY);doc.setFontSize(5.5);
          txt(`  ${t.plausibilityNote}`,TC[1],y);
          doc.setTextColor(...BLACK);doc.setFontSize(6.5);
          y+=4;
        }
      });
      y+=4;
    }

    // ── 8. FUSSZEILE (alle Seiten) ────────────────────────────────
    const pageCount=doc.getNumberOfPages();
    for(let i=1;i<=pageCount;i++){
      doc.setPage(i);
      doc.setFontSize(6.5);doc.setTextColor(...GRAY);
      txt(`Seite ${i} / ${pageCount}  |  ${firma||''}  |  Zeitraum: ${sel?sel.lbl:'-'}  |  Erstellt: ${erstelltStr}  |  Version ${GMBH_REPORT_VERSION}`,ML,288);
      hline(285,LGRAY);
    }

    const fname=`gmbh-bericht-${sel?.sk||'export'}.pdf`;
    if(/iP(ad|hone)/i.test(navigator.userAgent)){
      // iOS Safari: blob URL in neuem Tab öffnen → Teilen-Sheet
      const blob=doc.output('blob');
      const url=URL.createObjectURL(blob);
      window.open(url,'_blank');
      setTimeout(()=>URL.revokeObjectURL(url),10000);
    } else {
      // Android Chrome + Desktop: triggerDownload (DOM-Append nötig)
      triggerDownload(doc.output('blob'),fname);
    }
  };

  const periodLabelShort=p=>p?p.lbl:'-';

  return(
    <div>
      <div className="hdr">
        <div className="hdr-eye">GmbH Interne Dokumentation</div>
        <div className="hdr-title">Monats<em>bericht</em></div>
      </div>
      <div className="cnt">
        {/* ── ABRECHNUNGSPERIODE EINSTELLUNG */}
        <div className="sec" style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <span>Abrechnungsperiode</span>
          <button onClick={()=>{setTmpDay(String(pd));setEditPeriod(s=>!s);}}
            style={{border:'1px solid var(--border)',background:'none',color:'var(--gruen)',
              borderRadius:6,padding:'3px 10px',fontSize:10,cursor:'pointer',
              fontFamily:'Geist Mono,monospace'}}>
            <span style={{display:'flex',alignItems:'center',gap:4}}>{editPeriod?<><Icon name="x" size={11}/> Schließen</>:<><Icon name="settings" size={11}/> ab {pd}.</>}</span>
          </button>
        </div>
        {editPeriod&&<div className="card" style={{padding:'14px 16px',marginBottom:12}}>
          <div style={{fontSize:11,color:'var(--t2)',marginBottom:8}}>
            Periode startet am <strong style={{color:'var(--gruen)'}}>{tmpDay}.</strong>
            {tmpDay!=='1'&&<span style={{color:'var(--t2)'}}> → endet {Number(tmpDay)-1}. Folgemonat</span>}
          </div>
          <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:10}}>
            {[1,5,10,15,16,20,25].map(d=>(
              <button key={d} onClick={()=>setTmpDay(String(d))}
                style={{border:`1px solid ${tmpDay===String(d)?'var(--lime)':'var(--border)'}`,
                  background:tmpDay===String(d)?'var(--lm)':'none',
                  color:tmpDay===String(d)?'var(--lime)':'var(--t2)',
                  borderRadius:6,padding:'5px 10px',fontSize:11,cursor:'pointer',
                  fontFamily:'Geist Mono,monospace'}}>{d}.</button>
            ))}
          </div>
          <button onClick={()=>{if(setPeriodDay)setPeriodDay(Number(tmpDay));setEditPeriod(false);setSelKey(null);}}
            style={{width:'100%',background:'var(--lm)',border:'1px solid var(--lime)',
              borderRadius:8,padding:9,color:'var(--gruen)',fontSize:12,
              fontFamily:'Geist Mono,monospace',cursor:'pointer',fontWeight:600}}>
            Übernehmen
          </button>
        </div>}

        {/* ── PERIODEN-TABS */}
        {periods.length>0?(
          <div style={{overflowX:'auto',paddingBottom:4,marginBottom:16}}>
            <div style={{display:'flex',gap:6,width:'max-content'}}>
              {periods.map(p=>(
                <button key={p.key} onClick={()=>setSelKey(p.key)}
                  style={{border:`1px solid ${sel?.key===p.key?'var(--lime)':'var(--border)'}`,
                    background:sel?.key===p.key?'var(--lm)':'var(--s2)',
                    color:sel?.key===p.key?'var(--lime)':'var(--t3)',
                    borderRadius:8,padding:'6px 10px',fontSize:10,cursor:'pointer',
                    whiteSpace:'nowrap',fontFamily:'Geist Mono,monospace',
                    position:'relative'}}>
                  {(meals.some(x=>x.datum>=p.sk&&x.datum<=p.ek)||withdrawals.some(x=>x.datum>=p.sk&&x.datum<=p.ek))&&sel?.key!==p.key&&(
                    <span style={{position:'absolute',top:3,right:3,width:5,height:5,
                      borderRadius:'50%',background:'var(--gruen)',display:'block'}}/>
                  )}
                  {p.lbl}
                </button>
              ))}
            </div>
          </div>
        ):(
          <div className="empty" style={{padding:'24px 20px'}}>
            <div className="empty-i"><Icon name="bar_chart" size={42} color="var(--t3)"/></div>
            <div className="empty-s">Noch keine Einträge vorhanden</div>
          </div>
        )}

        <div className="card" style={{padding:'12px 14px',marginBottom:8}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:4}}>
            <div>
              {editFirmaMode
                ?<input autoFocus defaultValue={firma}
                    onBlur={e=>{if(setFirma)setFirma(e.target.value);setEditFirmaMode(false);}}
                    onKeyDown={e=>{if(e.key==='Enter'){if(setFirma)setFirma(e.target.value);setEditFirmaMode(false);}}}
                    placeholder="Firmenname …"
                    style={{fontWeight:700,fontSize:15,background:'var(--s1)',border:'1px solid var(--lime)',
                      borderRadius:6,padding:'3px 8px',color:'var(--text)',outline:'none',
                      width:'100%',marginBottom:4}}/>
                :<div onClick={()=>setEditFirmaMode(true)} style={{cursor:'pointer',fontWeight:700,fontSize:15,
                    color:firma?'var(--text)':'var(--t3)',marginBottom:4,display:'flex',alignItems:'center',gap:6}}
                    title="Tippe zum Bearbeiten">
                  {firma||<span style={{fontStyle:'italic'}}>Firmenname nicht eingetragen</span>}
                  <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="var(--t2)" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" style={{opacity:.5,flexShrink:0}}>
                    <path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/>
                  </svg>
                </div>
              }
              {persons.filter(p=>p.aktiv).map(p=>(
                <div key={p.id} style={{display:'flex',alignItems:'center',gap:8,marginTop:2}}>
                  <Icon name="user" size={12} color="var(--t2)"/>
                  {editName===p.id
                    ?<input autoFocus defaultValue={p.name}
                        onBlur={e=>{renamePerson(p.id,e.target.value);setEditName(null);}}
                        onKeyDown={e=>{if(e.key==='Enter'){renamePerson(p.id,e.target.value);setEditName(null);}}}
                        style={{background:'var(--s1)',border:'1px solid var(--lime)',borderRadius:6,
                          padding:'3px 8px',color:'var(--text)',fontSize:13,
                          fontFamily:'Geist Mono,monospace',outline:'none',width:180}}/>
                    :<div onClick={()=>setEditName(p.id)} style={{cursor:'pointer',display:'flex',alignItems:'center',gap:5}} title="Tippe zum Umbenennen">
                      <span style={{fontSize:13,color:'var(--t2)'}}>{p.name}</span>
                      <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="var(--t2)" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" style={{opacity:.5,flexShrink:0}}>
                        <path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/>
                      </svg>
                    </div>
                  }
                </div>
              ))}
            </div>
            <div style={{fontSize:10,color:'var(--t3)',textAlign:'right',lineHeight:1.4}}>
              <div>GmbH / UG</div>
              <div>{sel?sel.lbl:'-'}</div>
            </div>
          </div>
          {!firma&&<div style={{fontSize:11,color:'var(--t3)',marginTop:4,fontStyle:'italic'}}>
            Tippe auf den Namen zum Bearbeiten
          </div>}
        </div>

        <div className="sec">Geldwerter Vorteil gesamt</div>
        <div className="card">
          <div className="row">
            <div className="ri" style={{background:'var(--ld)'}}><Icon name="utensils" size={18} color="var(--t2)"/></div>
            <div className="rb">
              <div className="rn">Mahlzeiten (Sachbezug)</div>
              <div className="rm">Sachbezugswerte {GMBH_SACHBEZUG_JAHR}</div>
            </div>
            <div className="rr"><div className="rv">{fN(totalMeals)} €</div></div>
          </div>
          {totalDiscount>0&&<div className="row">
            <div className="ri" style={{background:'rgba(168,208,96,.1)'}}><Icon name="package" size={18} color="var(--gruen)"/></div>
            <div className="rb">
              <div className="rn" style={{color:'var(--gruen)'}}>Warenrabatt</div>
              <div className="rm">→ zählt in 1.080 € Freibetrag</div>
            </div>
            <div className="rr"><div className="rv" style={{color:'var(--gruen)'}}>{fN(totalDiscount)} €</div></div>
          </div>}
          {totalMarket>0&&<div className="row">
            <div className="ri" style={{background:'var(--ld)'}}><Icon name="package" size={18} color="var(--t2)"/></div>
            <div className="rb">
              <div className="rn">Marktwert-Bewertungen</div>
              <div className="rm">getrennt vom Freibetrag</div>
            </div>
            <div className="rr"><div className="rv">{fN(totalMarket)} €</div></div>
          </div>}
          {totalEk>0&&<div className="row">
            <div className="ri" style={{background:'rgba(212,130,10,.08)'}}><Icon name="package" size={18} color="var(--amber)"/></div>
            <div className="rb">
              <div className="rn" style={{color:'var(--amber)'}}>EK+Handling (Ausnahme)</div>
              <div className="rm">getrennt vom Freibetrag</div>
            </div>
            <div className="rr"><div className="rv" style={{color:'var(--amber)'}}>{fN(totalEk)} €</div></div>
          </div>}
          {totalDiscount===0&&totalMarket===0&&totalEk===0&&<div className="row">
            <div className="ri" style={{background:'var(--ld)'}}><Icon name="package" size={18} color="var(--t2)"/></div>
            <div className="rb"><div className="rn">Warenrabatt / Sachzuwendung</div></div>
            <div className="rr"><div className="rv">{fN(totalWith)} €</div></div>
          </div>}
          {/* Gesamt-Zeile */}
          <div style={{borderTop:'1px solid var(--border)',margin:'0 -1px',
            padding:'10px 14px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <span style={{fontSize:12,color:'var(--t2)',fontWeight:600}}>Gesamt {sel?sel.lbl:'-'}</span>
            <span style={{fontSize:15,fontWeight:700,color:'var(--text)'}}>{fN(totalMeals+totalWith)} €</span>
          </div>
        </div>

        {(mMeals.length>0||mWith.length>0)&&(()=>{
          const gb7=roundCurrency(mMeals.filter(m=>m.datum>='2026-01-01').reduce((s,m)=>s+(m.vorteil||0),0)+mWith.filter(w=>(w.mwst||7)===7).reduce((s,w)=>s+(w.vorteil||0),0));
          const gb19=roundCurrency(mMeals.filter(m=>m.datum<'2026-01-01').reduce((s,m)=>s+(m.vorteil||0),0)+mWith.filter(w=>(w.mwst||7)===19).reduce((s,w)=>s+(w.vorteil||0),0));
          const gn7=calcNetFromGross(gb7,7),gn19=calcNetFromGross(gb19,19);
          const gu7=roundCurrency(gb7-gn7),gu19=roundCurrency(gb19-gn19);
          return(<>
            <div className="sec">USt-Aufschlüsselung</div>
            <div className="card">
              {gb7>0&&<>
                <div className="rl"><span style={{color:'var(--t2)'}}>7 % — Brutto</span><span style={{fontWeight:600}}>{fN(gb7)} €</span></div>
                <div className="rl" style={{paddingLeft:20}}><span style={{color:'var(--t3)',fontSize:11}}>Netto</span><span style={{color:'var(--t2)',fontSize:11}}>{fN(gn7)} €</span></div>
                <div className="rl" style={{paddingLeft:20}}><span style={{color:'var(--t3)',fontSize:11}}>USt 7 %</span><span style={{color:'var(--t2)',fontSize:11}}>{fN(gu7)} €</span></div>
              </>}
              {gb19>0&&<>
                <div className="rl"><span style={{color:'var(--t2)'}}>19 % — Brutto</span><span style={{fontWeight:600}}>{fN(gb19)} €</span></div>
                <div className="rl" style={{paddingLeft:20}}><span style={{color:'var(--t3)',fontSize:11}}>Netto</span><span style={{color:'var(--t2)',fontSize:11}}>{fN(gn19)} €</span></div>
                <div className="rl" style={{paddingLeft:20}}><span style={{color:'var(--t3)',fontSize:11}}>USt 19 %</span><span style={{color:'var(--t2)',fontSize:11}}>{fN(gu19)} €</span></div>
              </>}
              <div className="rtot"><span>Gesamt brutto</span><span style={{color:'var(--text)'}}>{fN(roundCurrency(gb7+gb19))} €</span></div>
            </div>
          </>);
        })()}

        <div className="sec">Warenrabatt {yr} — Jahresstand pro Person</div>
        {personRabatt.map(p=>(
          <div key={p.id} className="card" style={{padding:'12px 14px',marginBottom:6}}>
            <div style={{display:'flex',justifyContent:'space-between',marginBottom:6,fontSize:13}}>
              <span style={{fontWeight:500}}>{p.name}</span>
              <span style={{fontWeight:700}}>{fN(p.yearRabatt)} € <span style={{fontWeight:400,color:'var(--t2)',fontSize:11}}>/ 1.080,00 €</span></span>
            </div>
            <div style={{height:5,borderRadius:3,background:'var(--border)',overflow:'hidden'}}>
              <div style={{height:'100%',width:`${Math.min(100,p.yearRabatt/GMBH_RABATT_FREIBETRAG*100)}%`,background:p.exceeded>0?'var(--red)':'var(--gruen)',borderRadius:3}}/>
            </div>
            {p.exceeded>0&&<div style={{fontSize:11,color:'var(--red)',marginTop:4,fontWeight:600}}>Freibetrag überschritten um {fN(p.exceeded)} €</div>}
            {p.exceeded===0&&<div style={{fontSize:11,color:'var(--t2)',marginTop:4}}>Verbleibend: {fN(p.remaining)} €</div>}
          </div>
        ))}

        {byPerson.map(p=>(p.mList.length===0&&p.wList.length===0)?null:(
          <div key={p.id}>
            <div className="sec">{p.name}</div>
            <div className="card">
              <div className="rl"><span style={{color:'var(--t2)'}}>Sachbezug Mahlzeiten</span><span>{fN(p.mTotal)} €</span></div>
              <div className="rl"><span style={{color:'var(--t2)'}}>Warenrabatt</span><span>{fN(p.wTotal)} €</span></div>
            </div>
          </div>
        ))}

        {mMeals.length===0&&mWith.length===0&&(
          <div className="empty"><div className="empty-i"><Icon name="bar_chart" size={42} color="var(--t3)"/></div>
              <div className="empty-s">Keine Einträge für diesen Monat</div>
              {(meals.length>0||withdrawals.length>0)&&sel&&(
                <div style={{fontSize:11,color:'var(--t3)',marginTop:8}}>
                  Einträge in anderen Monaten vorhanden — Monat oben wechseln
                </div>
              )}
            </div>
        )}

        <div className="sec">Export</div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:12}}>
          <button onClick={exportCSV}
            style={{padding:'12px',borderRadius:10,border:'1.5px solid var(--gruen)',background:'transparent',
              color:'var(--gruen)',fontSize:13,fontWeight:600,cursor:'pointer',
              display:'flex',alignItems:'center',justifyContent:'center',gap:6}}>
            <Icon name="download" size={15} color="var(--gruen)"/> CSV
          </button>
          <button onClick={exportPDF}
            style={{padding:'12px',borderRadius:10,border:'none',background:'var(--gruen)',
              color:'#fff',fontSize:13,fontWeight:600,cursor:'pointer',
              display:'flex',alignItems:'center',justifyContent:'center',gap:6}}>
            <Icon name="download" size={15} color="#fff"/> PDF
          </button>
        </div>
        <button onClick={exportJSON}
          style={{width:'100%',padding:'10px',borderRadius:10,marginBottom:24,
            border:'1.5px solid var(--border)',background:'var(--s2)',
            color:'var(--t2)',fontSize:12,cursor:'pointer',
            display:'flex',alignItems:'center',justifyContent:'center',gap:6}}>
          <Icon name="file_text" size={14} color="var(--t2)"/> JSON (Archiv)
        </button>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// GmbH EINSTELLUNGEN TAB
// ─────────────────────────────────────────────────────────────────────────────
function GmbhSettingsTab({persons,setPersons,firma,setFirma,periodDay,setPeriodDay}){
  const[mv,setMv]=useState(gmbhLoadMV);
  const[newName,setNewName]=useState('');
  const[editMv,setEditMv]=useState(null);
  const[editPerson,setEditPerson]=useState(null);
  const[mvSaved,setMvSaved]=useState(false);
  const[tmpPeriodDay,setTmpPeriodDay]=useState(String(periodDay||20));
  const[editingPeriod,setEditingPeriod]=useState(false);

  const savePersons=ps=>{setPersons(ps);gmbhSavePersons(ps);};
  const saveMv=()=>{gmbhSaveMV(mv);setMvSaved(true);setTimeout(()=>setMvSaved(false),1800);};

  const addPerson=()=>{
    if(!newName.trim())return;
    savePersons([...persons,{id:'gf_'+Date.now(),name:newName.trim(),aktiv:true}]);
    setNewName('');
  };

  return(
    <div>
      <div className="hdr">
        <div className="hdr-eye">GmbH-Modus</div>
        <div className="hdr-title">Einstell<em>ungen</em></div>
      </div>
      <div className="cnt">

        <div className="sec">Unternehmen</div>
        <div className="card" style={{padding:'12px 14px',marginBottom:16}}>
          <div style={{fontSize:12,color:'var(--t2)',marginBottom:6}}>Firmenname (erscheint im Bericht und PDF)</div>
          <input
            value={firma}
            onChange={e=>setFirma(e.target.value)}
            placeholder="z. B. Grüne Küche GmbH"
            style={{width:'100%',padding:'9px 12px',borderRadius:8,border:'1px solid var(--border)',
              fontSize:14,boxSizing:'border-box',background:'var(--s2)',color:'var(--text)'}}/>
        </div>

        <div className="sec" style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <span>Abrechnungsperiode</span>
          <button onClick={()=>{setTmpPeriodDay(String(periodDay||20));setEditingPeriod(s=>!s);}}
            style={{border:'1px solid var(--border)',background:'none',color:'var(--gruen)',
              borderRadius:6,padding:'3px 10px',fontSize:10,cursor:'pointer',
              fontFamily:'Geist Mono,monospace'}}>
            <span style={{display:'flex',alignItems:'center',gap:4}}>{editingPeriod?<><Icon name="x" size={11}/> Schließen</>:<><Icon name="settings" size={11}/> ab {periodDay||20}.</>}</span>
          </button>
        </div>
        {editingPeriod&&<div className="card" style={{padding:'14px 16px',marginBottom:12}}>
          <div style={{fontSize:11,color:'var(--t2)',marginBottom:6,lineHeight:1.6}}>
            Abrechnungsperiode beginnt am <strong style={{color:'var(--gruen)'}}>{tmpPeriodDay}.</strong> jeden Monats.
            {tmpPeriodDay!=='1'&&<span> Endet am {Number(tmpPeriodDay)-1}. des Folgemonats.</span>}
            <br/>
            <span style={{color:'var(--t3)'}}>Empfehlung Lohnabrechnung am 20.: Periode 20. bis 19.</span>
          </div>
          <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:10}}>
            {[1,5,10,15,16,20,25].map(d=>(
              <button key={d} onClick={()=>setTmpPeriodDay(String(d))}
                style={{border:`1px solid ${tmpPeriodDay===String(d)?'var(--lime)':'var(--border)'}`,
                  background:tmpPeriodDay===String(d)?'var(--lm)':'none',
                  color:tmpPeriodDay===String(d)?'var(--lime)':'var(--t2)',
                  borderRadius:6,padding:'5px 10px',fontSize:11,cursor:'pointer',
                  fontFamily:'Geist Mono,monospace'}}>{d}.</button>
            ))}
          </div>
          <button onClick={()=>{if(setPeriodDay)setPeriodDay(Number(tmpPeriodDay));setEditingPeriod(false);}}
            style={{width:'100%',background:'var(--lm)',border:'1px solid var(--lime)',
              borderRadius:8,padding:9,color:'var(--gruen)',fontSize:12,
              fontFamily:'Geist Mono,monospace',cursor:'pointer',fontWeight:600}}>
            Übernehmen
          </button>
        </div>}

        <div className="sec">Gesellschafter-Geschäftsführer</div>
        <div className="card">
          {persons.map((p,i)=>(
            <div key={p.id} className="rl">
              <div style={{display:'flex',alignItems:'center',gap:8}}>
                <Icon name="user" size={16} color="var(--t2)"/>
                {editPerson===p.id
                  ?<input autoFocus defaultValue={p.name}
                      onBlur={e=>{const ps=[...persons];ps[i]={...ps[i],name:e.target.value.trim()||p.name};savePersons(ps);setEditPerson(null);}}
                      onKeyDown={e=>{if(e.key==='Enter'){const ps=[...persons];ps[i]={...ps[i],name:e.target.value.trim()||p.name};savePersons(ps);setEditPerson(null);}}}
                      style={{background:'var(--s1)',border:'1px solid var(--lime)',borderRadius:6,
                        padding:'3px 8px',color:'var(--text)',fontSize:13,
                        fontFamily:'Geist Mono,monospace',outline:'none',width:200}}/>
                  :<div onClick={()=>setEditPerson(p.id)} style={{cursor:'pointer'}} title="Tippe zum Umbenennen">
                    <div style={{display:'flex',alignItems:'center',gap:5}}>
                      <div style={{fontSize:13}}>{p.name}</div>
                      <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="var(--t2)" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" style={{opacity:.5,flexShrink:0}}>
                        <path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/>
                      </svg>
                    </div>
                  </div>
                }
              </div>
              {persons.length>1&&(
                <button onClick={()=>{savePersons(persons.filter((_,j)=>j!==i));setEditPerson(null);}}
                  style={{background:'none',border:'none',color:'var(--t3)',fontSize:18,cursor:'pointer',lineHeight:1}}>×</button>
              )}
            </div>
          ))}
        </div>
        <div style={{display:'flex',gap:8,marginBottom:24}}>
          <input value={newName} onChange={e=>setNewName(e.target.value)}
            onKeyDown={e=>e.key==='Enter'&&addPerson()}
            placeholder="Name hinzufügen …"
            style={{flex:1,padding:'8px 12px',borderRadius:8,border:'1px solid var(--border)',fontSize:13,background:'var(--s2)',color:'var(--text)'}}/>
          <button onClick={addPerson}
            style={{padding:'8px 14px',borderRadius:8,border:'none',background:'var(--gruen)',color:'#fff',cursor:'pointer',display:'flex',alignItems:'center'}}>
            <Icon name="plus_circle" size={16} color="#fff"/>
          </button>
        </div>

        <div className="sec">Marktwerte (Brutto)</div>
        <div style={{fontSize:11,color:'var(--t2)',marginBottom:8}}>Brutto-Richtwerte für die Marktwert-Methode. Anpassen an eigene Kalkulation.</div>
        <div className="card">
          {mv.map((m,i)=>(
            <div key={m.kat} style={{borderBottom:i<mv.length-1?'1px solid var(--border)':'none'}}>
              <div className="row" onClick={()=>setEditMv(editMv===i?null:i)} style={{cursor:'pointer'}}>
                <div className="ri" style={{background:'var(--ld)'}}><Icon name="tag" size={16} color="var(--t2)"/></div>
                <div className="rb"><div className="rn">{m.kat}</div></div>
                <div className="rr">
                  <span style={{fontSize:13,color:'var(--gruen)',fontWeight:600}}>{fN(m.wert)}/{m.einheit}</span>
                  <Icon name={editMv===i?'chevron_up':'chevron_down'} size={14} color="var(--t3)"/>
                </div>
              </div>
              {editMv===i&&(
                <div style={{padding:'0 14px 12px',display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}} onClick={e=>e.stopPropagation()}>
                  <div>
                    <div style={{fontSize:10,color:'var(--t2)',marginBottom:3}}>Wert (€)</div>
                    <input type="number" step="0.1" value={m.wert}
                      onChange={e=>{const n=[...mv];n[i]={...n[i],wert:parseFloat(e.target.value)||0};setMv(n);}}
                      style={{width:'100%',padding:'7px 8px',borderRadius:6,border:'1px solid var(--border)',fontSize:13,boxSizing:'border-box',background:'var(--s2)',color:'var(--text)'}}/>
                  </div>
                  <div>
                    <div style={{fontSize:10,color:'var(--t2)',marginBottom:3}}>Einheit</div>
                    <select value={m.einheit} onChange={e=>{const n=[...mv];n[i]={...n[i],einheit:e.target.value};setMv(n);}}
                      style={{width:'100%',padding:'7px 4px',borderRadius:6,border:'1px solid var(--border)',fontSize:13,background:'var(--s2)',color:'var(--text)'}}>
                      {['kg','l','Stück'].map(u=><option key={u}>{u}</option>)}
                    </select>
                  </div>
                </div>
              )}
            </div>
          ))}
        </div>
        <button onClick={saveMv}
          style={{width:'100%',padding:'12px',borderRadius:10,border:'none',
            background:mvSaved?'var(--lime)':'var(--gruen)',
            color:'#fff',fontSize:14,fontWeight:600,cursor:'pointer',marginTop:8,marginBottom:24,transition:'background .3s'}}>
          {mvSaved?'Gespeichert':'Marktwerte speichern'}
        </button>
      </div>
    </div>
  );
}

// --- GMBH MODULE END ---


</script>
